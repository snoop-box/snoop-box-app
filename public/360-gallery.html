<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Snoop 360 Gallery</title>

<style>

body{
  margin:0;
  font-family:Arial,sans-serif;
  min-height:100vh;
  color:#fff;

  background:
  linear-gradient(
    135deg,
    #071a52,
    #111,
    #5c0b0b
  );
}

.wrap{
  max-width:1200px;
  margin:auto;
  padding:24px;
}

.hero{

  background:
  rgba(255,255,255,.08);

  backdrop-filter:
  blur(12px);

  border-radius:24px;

  padding:28px;

  margin-bottom:24px;

  box-shadow:
  0 18px 40px
  rgba(0,0,0,.25);

  text-align:center;

}

.logo{
  max-width:160px;
  max-height:70px;
  object-fit:contain;
  display:block;
  margin:auto auto 16px auto;
}

.title{
  font-size:54px;
  font-weight:bold;
  margin-bottom:10px;
}

.sub{
  color:#ddd;
  font-size:16px;
}

.grid{

  display:grid;

  grid-template-columns:
  repeat(
    auto-fit,
    minmax(260px,1fr)
  );

  gap:20px;

}

.card{

  background:
  rgba(255,255,255,.08);

  backdrop-filter:
  blur(12px);

  border-radius:22px;

  overflow:hidden;

  cursor:pointer;

  transition:.25s;

  box-shadow:
  0 10px 30px
  rgba(0,0,0,.2);

}

.card:hover{

  transform:
  translateY(-4px)
  scale(1.01);

}

.thumb{

  width:100%;

  aspect-ratio:9/16;

  object-fit:cover;

  background:#000;

}

.info{
  padding:16px;
}

.name{
  font-size:18px;
  font-weight:bold;
}

.date{
  font-size:13px;
  color:#ccc;
  margin-top:6px;
}

/* MODAL */

.modal{

  position:fixed;

  inset:0;

  background:
  rgba(0,0,0,.82);

  display:none;

  align-items:center;

  justify-content:center;

  z-index:999;

  padding:18px;

  box-sizing:border-box;

}

.modalContent{

  width:100%;

  max-width:380px;

  background:
  rgba(20,20,20,.92);

  backdrop-filter:
  blur(12px);

  border-radius:24px;

  overflow:hidden;

  box-shadow:
  0 20px 50px
  rgba(0,0,0,.4);

}

.modal video{
  width:100%;
  display:block;
  background:#000;
}

.modalInfo{
  padding:20px;
}

.download{

  display:block;

  width:100%;

  box-sizing:border-box;

  padding:16px;

  margin-top:14px;

  border:none;

  border-radius:14px;

  background:#ff0055;

  color:#fff;

  font-size:17px;

  font-weight:bold;

  text-align:center;

  text-decoration:none;

  cursor:pointer;

}

.close{

  position:absolute;

  top:18px;
  right:18px;

  width:42px;
  height:42px;

  border-radius:50%;

  border:none;

  background:
  rgba(255,255,255,.15);

  color:#fff;

  font-size:20px;

  cursor:pointer;

}

.empty{

  text-align:center;

  padding:60px 20px;

  color:#ddd;

  background:
  rgba(255,255,255,.08);

  border-radius:22px;

}

.loader{

  text-align:center;
  padding:40px;
  color:#ddd;

}

</style>

</head>
<body>

<div class="wrap">

<div class="hero">

<img
id="logo"
class="logo"
style="display:none;">

<div
class="title"
id="eventTitle">

360 EXPERIENCE

</div>

<div class="sub">

Videos del evento

</div>

</div>

<div
id="gallery"
class="grid">

</div>

</div>

<!-- MODAL -->

<div
class="modal"
id="modal">

<button
class="close"
onclick="closeModal()">

✕

</button>

<div class="modalContent">

<video
id="modalVideo"
controls
playsinline>

</video>

<div class="modalInfo">

<div
class="name"
id="modalName">

</div>

<div
class="date"
id="modalDate">

</div>

<a
id="downloadBtn"
class="download"
download>

⬇ Descargar Video

</a>

</div>

</div>

</div>

<script>

const params =
new URLSearchParams(
window.location.search
);

const eventSlug =
params.get("event");

let eventConfig = null;

/* ====================== */

async function init(){

  await loadEvent();

  await loadVideos();

}

/* ====================== */

async function loadEvent(){

  try{

    const res =
    await fetch(
      "/event-config/" +
      eventSlug
    );

    const data =
    await res.json();

    if(!data.success)
    return;

    eventConfig =
    data.event;

    document
    .getElementById(
      "eventTitle"
    )
    .innerText =

      eventConfig.name
      .toUpperCase();

    if(eventConfig.logo_url){

      const logo =
      document
      .getElementById(
        "logo"
      );

      logo.src =
      eventConfig.logo_url;

      logo.style.display =
      "block";

    }

  }

  catch(err){

    console.error(err);

  }

}

/* ====================== */

async function loadVideos(){

const gallery =
document.getElementById(
"gallery"
);

gallery.innerHTML =

`<div class="loader">
Cargando videos...
</div>`;

try{

const res =
await fetch(
"/360-videos/" +
eventSlug
);

const videos =
await res.json();

if(!videos.length){

gallery.innerHTML = `

<div class="empty">

🎬 Todavía no hay
videos 360 cargados

</div>

`;

return;

}

gallery.innerHTML = "";

videos.forEach(video=>{

gallery.innerHTML += `

<div
class="card"
onclick='openModal(
"${video.video_url}",
"${video.guest_name}",
"${video.created_at}"
)'>

<img
class="thumb"
src="${video.thumbnail}"
loading="lazy">

<div class="info">

<div class="name">

${video.guest_name}

</div>

<div class="date">

${formatDate(
video.created_at
)}

</div>

</div>

</div>

`;

});

}

catch(err){

console.error(
err
);

gallery.innerHTML = `

<div class="empty">

❌ Error cargando
videos

</div>

`;

}

}

/* ====================== */

function openModal(
url,
name,
date
){

  modal.style.display =
  "flex";

  modalVideo.src =
  url;

  modalName.innerText =
  name;

  modalDate.innerText =
  formatDate(date);

  downloadBtn.href =
  url.replace(
    "/upload/",
    "/upload/fl_attachment/"
  );

}

/* ====================== */

function closeModal(){

  modal.style.display =
  "none";

  modalVideo.pause();

}

/* ====================== */

function formatDate(date){

  return new Date(date)
  .toLocaleString();

}

/* ====================== */

window.onclick =
function(e){

  if(e.target===modal){

    closeModal();

  }

}

/* ====================== */

init();

</script>

</body>
</html>
