<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width,initial-scale=1">

<title>Snoop 360 Wall</title>

<link
rel="stylesheet"
href="./wall360.css">

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

</head>

<body>

<div class="wall">

<!-- HEADER -->

<div class="wallHeader">

<img
id="eventLogo"
class="wallLogo"
style="display:none;">

<div
id="eventName"
class="wallTitle">

360 WALL

</div>

<div class="wallSub">

LIVE EXPERIENCE

</div>

</div>

<!-- VIDEO -->

<div class="videoArea">

<video

id="mainVideo"

autoplay

muted

playsinline>

</video>

</div>

<!-- TOAST -->

<div
id="toast"
class="toast">

✨ Nuevo video agregado

</div>

<!-- FOOTER -->

<div class="footer">

<div class="statsCard">

<div class="statsTitle">

🎬 VIDEOS DEL EVENTO

</div>

<div
id="counter"
class="counter">

0

</div>

</div>

<div class="qrCard">

<div
id="qr">

</div>

<div class="qrText">

ESCANEÁ Y<br>
DESCARGÁ

</div>

</div>

</div>

<script src="./wall360.js"></script>

</body>
</html>
