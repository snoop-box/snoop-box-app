<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />

  <title>Snoop Box 360</title>

  <link rel="stylesheet" href="./style.css" />
</head>
<body>

  <!-- HOME -->

 <!-- EVENT LOGIN -->

<div
id="eventScreen"
class="screen active">

  <div class="content">

    <h1>
      🎥 SNOOP<br>360
    </h1>

    <div class="subtitle">
      Seleccionar evento
    </div>

    <input
      id="eventInput"
      placeholder="Nombre del evento"
      style="
      padding:16px;
      border:none;
      border-radius:14px;
      font-size:18px;
      width:260px;
      text-align:center;
      margin-top:20px;
      ">

    <button
      id="enterEventBtn"
      style="
      margin-top:20px;
      ">

      INGRESAR

    </button>

  </div>

</div>

  <!-- CAMERA -->

  <div id="cameraScreen" class="screen">

    <video
      id="preview"
      autoplay
      playsinline
      muted
    ></video>

    <div id="cameraOverlay">

      <!-- REC -->

      <div id="recIndicator">

        <div class="recDot"></div>

        REC

      </div>

      <!-- TIMER -->

      <div id="timer">
        00:08
      </div>

      <!-- FRAME -->

      <div class="frameCorner topLeft"></div>
      <div class="frameCorner topRight"></div>

      <div class="frameCorner bottomLeft"></div>
      <div class="frameCorner bottomRight"></div>

      <!-- COUNTDOWN -->

      <div id="countdown"></div>

      <!-- STATUS -->

      <div id="status"></div>

    </div>

  </div>

  <!-- THANKS -->

  <div id="thanksScreen" class="screen">

    <div class="content">

      <h2>✨ VIDEO CAPTURADO ✨</h2>

      <p>
        Pronto vas a poder descargar tu video
        desde la galería del evento
      </p>

    </div>

  </div>

  <script src="./app.js"></script>

</body>
</html>
