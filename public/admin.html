<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Snoop Box</title>

<style>
body{
  font-family:Arial;
  background:#111;
  color:white;
  text-align:center;
}

input,button{
  padding:12px;
  margin:6px;
  border-radius:8px;
  border:none;
}

button{
  background:#ff0055;
  color:white;
}

.event{
  background:#222;
  margin:10px;
  padding:12px;
  border-radius:10px;
}
</style>

</head>
<body>

<h2>Crear Evento</h2>

<input id="name" placeholder="Nombre del evento (ej: olivia2)"><br>

<div>
  <p>🎨 Fondo DJ (pantalla grande)</p>
  <input type="file" id="bgFile" accept="image/*"><br>
</div>

<div>
  <p>🖼 Frame de impresión (PNG transparente 1200x1800)</p>
  <input type="file" id="frameFile" accept="image/*"><br>
</div>

<label>
<input type="checkbox" id="active"> Evento activo
</label><br>

<button onclick="save()">Guardar</button>

<h2>Eventos creados</h2>
<div id="list"></div>

<script>

async function save(){

  const nameValue = document.getElementById("name").value.trim();

  if(!nameValue){
    alert("Poné un nombre al evento");
    return;
  }

  const fd = new FormData();
  fd.append("name", nameValue);
  fd.append("active", document.getElementById("active").checked);

  if(bgFile.files[0]) fd.append("bg", bgFile.files[0]);
  if(frameFile.files[0]) fd.append("frame", frameFile.files[0]);

  await fetch("/admin/event",{
    method:"POST",
    body: fd
  });

  document.getElementById("name").value = "";

  load();
}

async function load(){

  const res = await fetch("/admin/events");
  const data = await res.json();

  list.innerHTML = "";

  Object.keys(data).forEach(n=>{

    if(!n) return;

    const e = data[n];

    list.innerHTML += `
    <div class="event">
      <strong>${n}</strong><br>
      Activo:
      <input type="checkbox" ${e.active ? "checked" : ""}
      onchange="toggle('${n}', this.checked)">
    </div>`;
  });
}

async function toggle(name, active){
  await fetch("/admin/event/toggle",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({ name, active })
  });
}

load();

</script>

</body>
</html>
