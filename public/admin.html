<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin Snoop Box</title>

<style>
body{
  margin:0;
  background:#111;
  color:#fff;
  font-family:Arial;
  padding:30px;
}

.wrap{
  max-width:700px;
  margin:auto;
}

.box{
  background:#1d1d1d;
  padding:25px;
  border-radius:18px;
  margin-bottom:25px;
}

h1,h2{
  text-align:center;
  margin-top:0;
}

input[type=text]{
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
  margin:10px 0;
  box-sizing:border-box;
}

.fileRow{
  background:#2a2a2a;
  padding:12px;
  border-radius:10px;
  margin:10px 0;
}

button{
  width:100%;
  padding:15px;
  border:none;
  border-radius:12px;
  background:#ff0055;
  color:white;
  font-size:17px;
  cursor:pointer;
  margin-top:10px;
}

button:hover{
  opacity:.9;
}

#status{
  margin-top:15px;
  min-height:24px;
  text-align:center;
}

.eventItem{
  background:#262626;
  padding:14px;
  border-radius:12px;
  margin-bottom:10px;
}

.small{
  font-size:14px;
  color:#ccc;
}

.activeTag{
  color:#00ff99;
  font-weight:bold;
  margin-top:6px;
}

.miniBtn{
  margin-top:10px;
  background:#444;
  padding:10px;
  font-size:14px;
}
</style>
</head>
<body>

<div class="wrap">

<div class="box">

<h1>Admin Evento</h1>

<input type="text" id="eventName" placeholder="Nombre del evento">

<div class="fileRow">
<label>Fondo pantalla DJ</label><br>
<input type="file" id="bgFile">
</div>

<div class="fileRow">
<label>Frame impresión</label><br>
<input type="file" id="frameFile">
</div>

<label>
<input type="checkbox" id="eventActive" checked>
 Evento activo
</label>

<button id="createBtn">Crear Evento</button>

<div id="status"></div>

</div>

<div class="box">

<h2>Eventos creados</h2>

<div id="eventsList">Cargando...</div>

</div>

</div>

<script>

async function loadEvents(){

  const list = document.getElementById("eventsList");

  try{

    const res = await fetch("/events");
    const data = await res.json();

    if(!data.length){
      list.innerHTML = "Sin eventos creados";
      return;
    }

    list.innerHTML = "";

    data.slice().reverse().forEach(ev=>{

      list.innerHTML += `
        <div class="eventItem">
          <strong>${ev.name}</strong>
          <div class="small">ID: ${ev.id}</div>
          <div class="${ev.active ? 'activeTag':''}">
            ${ev.active ? '🟢 ACTIVO':'⚪ Inactivo'}
          </div>
          <button class="miniBtn" onclick="activateEvent(${ev.id})">
            Activar este evento
          </button>
        </div>
      `;

    });

  }catch(err){
    list.innerHTML = "Error cargando eventos";
  }

}

async function createEvent(){

  const status = document.getElementById("status");

  const name = document.getElementById("eventName").value.trim();
  const active = document.getElementById("eventActive").checked;

  if(!name){
    status.innerText = "Poné nombre del evento";
    return;
  }

  status.innerText = "Creando...";

  try{

    const res = await fetch("/create-event",{
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body: JSON.stringify({
        name:name,
        active:active,
        background:"",
        frame:""
      })
    });

    const data = await res.json();

    if(data.success){
      status.innerText = "✅ Evento creado";
      document.getElementById("eventName").value = "";
      loadEvents();
    }else{
      status.innerText = "❌ No se pudo crear";
    }

  }catch(err){
    status.innerText = "❌ Error conexión";
  }

}

async function activateEvent(id){

  await fetch("/activate-event/" + id,{
    method:"POST"
  });

  loadEvents();

}

document.getElementById("createBtn").addEventListener("click",createEvent);

loadEvents();

</script>

</body>
</html>
