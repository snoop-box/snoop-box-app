<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin Snoop Box</title>

<style>
body{
  margin:0;
  background:#111;
  color:#fff;
  font-family:Arial;
  padding:30px;
}

.wrap{
  max-width:760px;
  margin:auto;
}

.box{
  background:#1d1d1d;
  padding:25px;
  border-radius:18px;
  margin-bottom:25px;
}

h1,h2{
  margin-top:0;
  text-align:center;
}

input[type=text], input[type=file]{
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
  margin:10px 0;
  box-sizing:border-box;
}

button{
  width:100%;
  padding:15px;
  border:none;
  border-radius:12px;
  background:#ff0055;
  color:white;
  font-size:17px;
  cursor:pointer;
  margin-top:10px;
}

button:hover{
  opacity:.9;
}

#status{
  margin-top:14px;
  min-height:24px;
  text-align:center;
}

.eventItem{
  background:#262626;
  padding:14px;
  border-radius:12px;
  margin-bottom:10px;
}

.activeTag{
  color:#00ff99;
  font-weight:bold;
  margin-top:6px;
}

.smallBtn{
  background:#444;
  margin-top:10px;
  padding:10px;
  font-size:14px;
}

.preview{
  max-width:100%;
  max-height:140px;
  border-radius:10px;
  margin-top:10px;
}
</style>
</head>
<body>

<div class="wrap">

<div class="box">

<h1>Admin Evento</h1>

<input type="text" id="eventName" placeholder="Nombre del evento">

<label>Imagen fondo DJ</label>
<input type="file" id="bgFile" accept="image/*">
<img id="bgPreview" class="preview" style="display:none;">

<label>Frame impresión</label>
<input type="file" id="frameFile" accept="image/*">
<img id="framePreview" class="preview" style="display:none;">

<label>
<input type="checkbox" id="eventActive" checked>
 Evento activo
</label>

<button onclick="createEvent()">Crear Evento</button>

<div id="status"></div>

</div>

<div class="box">

<h2>Eventos creados</h2>

<div id="eventsList">Cargando...</div>

</div>

</div>

<script>

/* 🔥 CAMBIAR SOLO SI TU PRESET ES OTRO */
const CLOUD_NAME = "demo";
const UPLOAD_PRESET = "unsigned_preset";

let bgUrl = "";
let frameUrl = "";

/* =========================
   PREVIEW
========================= */

document.getElementById("bgFile").onchange = async function(){
  preview(this.files[0],"bgPreview");
  bgUrl = await uploadFile(this.files[0]);
};

document.getElementById("frameFile").onchange = async function(){
  preview(this.files[0],"framePreview");
  frameUrl = await uploadFile(this.files[0]);
};

function preview(file,id){

  if(!file) return;

  const reader = new FileReader();

  reader.onload = e=>{
    const img = document.getElementById(id);
    img.src = e.target.result;
    img.style.display = "block";
  };

  reader.readAsDataURL(file);

}

/* =========================
   CLOUDINARY
========================= */

async function uploadFile(file){

  if(!file) return "";

  const formData = new FormData();
  formData.append("file", file);
  formData.append("upload_preset", UPLOAD_PRESET);

  const res = await fetch(
    `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`,
    {
      method:"POST",
      body:formData
    }
  );

  const data = await res.json();

  return data.secure_url || "";

}

/* =========================
   CREAR EVENTO
========================= */

async function createEvent(){

  const status = document.getElementById("status");

  const name =
    document.getElementById("eventName")
    .value.trim();

  const active =
    document.getElementById("eventActive")
    .checked;

  if(!name){
    status.innerText = "Poné nombre del evento";
    return;
  }

  status.innerText = "Creando...";

  try{

    const res = await fetch("/create-event",{
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body: JSON.stringify({
        name:name,
        active:active,
        background:bgUrl,
        frame:frameUrl
      })
    });

    const data = await res.json();

    if(data.success){
      status.innerText = "✅ Evento creado";
      loadEvents();
    }else{
      status.innerText = "❌ No se pudo crear";
    }

  }catch(err){
    status.innerText = "❌ Error conexión";
  }

}

/* =========================
   LISTA EVENTOS
========================= */

async function loadEvents(){

  const list = document.getElementById("eventsList");

  const res = await fetch("/events");
  const data = await res.json();

  if(!data.length){
    list.innerHTML = "Sin eventos";
    return;
  }

  list.innerHTML = "";

  data.slice().reverse().forEach(ev=>{

    list.innerHTML += `
      <div class="eventItem">
        <strong>${ev.name}</strong>
        <div class="${ev.active ? 'activeTag':''}">
          ${ev.active ? '🟢 ACTIVO':'⚪ Inactivo'}
        </div>
        <button class="smallBtn"
          onclick="activateEvent(${ev.id})">
          Activar
        </button>
      </div>
    `;

  });

}

async function activateEvent(id){

  await fetch("/activate-event/"+id,{
    method:"POST"
  });

  loadEvents();

}

loadEvents();

</script>

</body>
</html>
