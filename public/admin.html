<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Snoop Box</title>

<style>
body{
  font-family:Arial;
  background:#111;
  color:white;
  text-align:center;
}

input,button{
  padding:12px;
  margin:6px;
  border-radius:8px;
  border:none;
}

button{
  background:#ff0055;
  color:white;
}

.event{
  background:#222;
  margin:10px;
  padding:12px;
  border-radius:10px;
}
</style>

</head>
<body>

<h2>Crear Evento</h2>

<input id="name" placeholder="Nombre evento"><br>
<input id="bg" placeholder="URL fondo DJ"><br>
<input id="frame" placeholder="URL frame impresión"><br>

<label>
<input type="checkbox" id="active"> Evento activo
</label><br>

<button onclick="save()">Guardar</button>

<h2>Eventos creados</h2>
<div id="list"></div>

<script>

async function save(){

  const name = document.getElementById("name").value;
  const bg = document.getElementById("bg").value;
  const frame = document.getElementById("frame").value;
  const active = document.getElementById("active").checked;

  await fetch("/admin/event",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({ name, bg, frame, active })
  });

  load();
}

async function load(){

  const res = await fetch("/admin/events");
  const data = await res.json();

  list.innerHTML = "";

  Object.keys(data).forEach(name=>{

    const e = data[name];

    list.innerHTML += `
      <div class="event">
        <strong>${name}</strong><br>
        Activo:
        <input type="checkbox" ${e.active ? "checked" : ""}
        onchange="toggle('${name}', this.checked)">
      </div>
    `;
  });
}

async function toggle(name, active){
  await fetch("/admin/event/toggle",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({ name, active })
  });
}

load();

</script>

</body>
</html>
