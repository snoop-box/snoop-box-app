<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin Core Test</title>

<style>
body{
  margin:0;
  background:#111;
  color:#fff;
  font-family:Arial;
  padding:30px;
}

.wrap{
  max-width:700px;
  margin:auto;
}

.box{
  background:#1d1d1d;
  padding:25px;
  border-radius:18px;
  margin-bottom:25px;
}

input{
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
  margin:10px 0;
  box-sizing:border-box;
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  background:#ff0055;
  color:white;
  font-size:16px;
  cursor:pointer;
  margin-top:10px;
}

.event{
  background:#262626;
  padding:14px;
  border-radius:12px;
  margin-bottom:10px;
}

#status{
  margin-top:12px;
  min-height:24px;
}
</style>
</head>
<body>

<div class="wrap">

<div class="box">

<h1>Crear Evento</h1>

<input type="text" id="eventName" placeholder="Nombre del evento">

<button onclick="saveEvent()">Crear Evento</button>

<div id="status"></div>

</div>

<div class="box">

<h2>Eventos</h2>

<div id="list">Cargando...</div>

</div>

</div>

<script>

async function saveEvent(){

  const name =
    document.getElementById("eventName")
    .value.trim();

  const status =
    document.getElementById("status");

  if(!name){
    status.innerText = "Escribí nombre";
    return;
  }

  status.innerText = "Creando...";

  try{

    const res = await fetch("/create-event",{
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body: JSON.stringify({
        name:name,
        background:"",
        frame:""
      })
    });

    const data = await res.json();

    if(data.success){
      status.innerText = "✅ Evento creado";
      document.getElementById("eventName").value="";
      loadEvents();
    }else{
      status.innerText =
        data.message || "Error";
    }

  }catch(err){

    console.log(err);
    status.innerText = "❌ Error conexión";

  }

}

async function loadEvents(){

  const box =
    document.getElementById("list");

  try{

    const res = await fetch("/events");
    const data = await res.json();

    if(!data.length){
      box.innerHTML = "Sin eventos";
      return;
    }

    box.innerHTML = "";

    data.slice().reverse().forEach(ev=>{

      box.innerHTML += `
        <div class="event">
          <strong>${ev.name}</strong>
          <br>
          ${ev.active ? "🟢 Activo" : "⚪ Inactivo"}
          <br><br>
          <button onclick="toggleEvent(${ev.id})">
            Activar / Desactivar
          </button>
        </div>
      `;

    });

  }catch(err){

    box.innerHTML = "Error cargando";

  }

}

async function toggleEvent(id){

  await fetch("/toggle-event/"+id,{
    method:"POST"
  });

  loadEvents();

}

loadEvents();

</script>

</body>
</html>
