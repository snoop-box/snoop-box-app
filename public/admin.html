<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin</title>

<style>
body{
  margin:0;
  background:#111;
  color:white;
  font-family:Arial;
  text-align:center;
  padding:40px;
}

.box{
  max-width:500px;
  margin:auto;
  background:#1e1e1e;
  padding:25px;
  border-radius:18px;
}

input[type=text]{
  width:100%;
  padding:15px;
  border:none;
  border-radius:10px;
  margin:10px 0;
  box-sizing:border-box;
}

button{
  width:100%;
  padding:16px;
  border:none;
  border-radius:12px;
  background:#ff0055;
  color:white;
  font-size:18px;
  cursor:pointer;
}

#status{
  margin-top:15px;
  min-height:25px;
}
</style>
</head>
<body>

<div class="box">

<h1>Crear Evento</h1>

<input type="text" id="eventName" placeholder="Nombre del evento">

<label>
<input type="checkbox" id="eventActive" checked>
 Evento activo
</label>

<br><br>

<button onclick="createEvent()">Crear Evento</button>

<div id="status"></div>

</div>

<script>

async function createEvent(){

  const status = document.getElementById("status");
  const name = document.getElementById("eventName").value.trim();
  const active = document.getElementById("eventActive").checked;

  if(!name){
    status.innerText = "Escribí nombre del evento";
    return;
  }

  status.innerText = "Creando...";

  try{

    const response = await fetch("/create-event",{
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body: JSON.stringify({
        name:name,
        active:active,
        background:"",
        frame:""
      })
    });

    const data = await response.json();

    if(data.success){
      status.innerText = "✅ Evento creado";
    }else{
      status.innerText = "❌ No se pudo crear";
    }

  }catch(error){
    console.log(error);
    status.innerText = "❌ Error conexión";
  }

}

</script>

</body>
</html>
