<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin Snoop Box</title>

<style>
body{
  margin:0;
  background:#111;
  color:#fff;
  font-family:Arial;
  padding:30px;
  text-align:center;
}

.box{
  max-width:520px;
  margin:auto;
  background:#1e1e1e;
  padding:25px;
  border-radius:18px;
}

input{
  width:100%;
  padding:14px;
  margin:10px 0;
  border:none;
  border-radius:10px;
  box-sizing:border-box;
}

button{
  width:100%;
  padding:16px;
  border:none;
  border-radius:12px;
  background:#ff0055;
  color:white;
  font-size:18px;
  cursor:pointer;
  margin-top:10px;
}

button:hover{
  opacity:.9;
}

#status{
  margin-top:15px;
  min-height:25px;
}

label{
  display:block;
  margin-top:10px;
}
</style>
</head>
<body>

<div class="box">

<h1>Admin Evento</h1>

<input type="text" id="eventName" placeholder="Nombre del evento">

<input type="text" id="bgUrl" placeholder="URL fondo DJ">

<input type="text" id="frameUrl" placeholder="URL frame impresión">

<label>
<input type="checkbox" id="eventActive" checked>
 Evento activo
</label>

<button id="createBtn">Crear Evento</button>

<div id="status"></div>

</div>

<script>

document.getElementById("createBtn").addEventListener("click", async ()=>{

  const status = document.getElementById("status");

  const name = document.getElementById("eventName").value.trim();
  const background = document.getElementById("bgUrl").value.trim();
  const frame = document.getElementById("frameUrl").value.trim();
  const active = document.getElementById("eventActive").checked;

  if(!name){
    status.innerText = "Poné nombre del evento";
    return;
  }

  status.innerText = "Creando...";

  try{

    const res = await fetch("/create-event",{
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body: JSON.stringify({
        name:name,
        active:active,
        background:background,
        frame:frame
      })
    });

    const data = await res.json();

    if(data.success){
      status.innerText = "✅ Evento creado correctamente";
    }else{
      status.innerText = "❌ No se pudo crear";
    }

  }catch(err){
    console.log(err);
    status.innerText = "❌ Error de conexión";
  }

});

</script>

</body>
</html>
