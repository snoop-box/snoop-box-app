<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin Plus</title>

<style>
body{
  margin:0;
  background:#111;
  color:#fff;
  font-family:Arial;
  padding:30px;
}

.wrap{
  max-width:760px;
  margin:auto;
}

.box{
  background:#1d1d1d;
  padding:25px;
  border-radius:18px;
  margin-bottom:25px;
}

input[type=text],
input[type=file]{
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
  margin:10px 0;
  box-sizing:border-box;
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  background:#ff0055;
  color:white;
  font-size:16px;
  cursor:pointer;
  margin-top:10px;
}

.preview{
  max-width:100%;
  max-height:140px;
  border-radius:10px;
  margin-top:8px;
}

.event{
  background:#262626;
  padding:14px;
  border-radius:12px;
  margin-bottom:10px;
}

#status{
  margin-top:12px;
  min-height:24px;
}
</style>
</head>
<body>

<div class="wrap">

<div class="box">

<h1>Admin Plus</h1>

<input type="text" id="eventName" placeholder="Nombre del evento">

<label>Fondo DJ</label>
<input type="file" id="bgFile" accept="image/*">
<img id="bgPreview" class="preview" style="display:none;">

<label>Frame</label>
<input type="file" id="frameFile" accept="image/*">
<img id="framePreview" class="preview" style="display:none;">

<button onclick="saveEvent()">Crear Evento</button>

<div id="status"></div>

</div>

<div class="box">

<h2>Eventos</h2>

<div id="list">Cargando...</div>

</div>

</div>

<script>

const CLOUD_NAME = "daxf4enjn";
const UPLOAD_PRESET = "snoopbox";

let bgUrl = "";
let frameUrl = "";

/* previews */

document.getElementById("bgFile").onchange = async function(){

  const file = this.files[0];
  if(!file) return;

  preview(file,"bgPreview");
  bgUrl = await uploadImage(file);

};

document.getElementById("frameFile").onchange = async function(){

  const file = this.files[0];
  if(!file) return;

  preview(file,"framePreview");
  frameUrl = await uploadImage(file);

};

function preview(file,id){

  const reader = new FileReader();

  reader.onload = e=>{
    const img = document.getElementById(id);
    img.src = e.target.result;
    img.style.display = "block";
  };

  reader.readAsDataURL(file);

}

/* cloudinary */

async function uploadImage(file){

  const form = new FormData();

  form.append("file",file);
  form.append("upload_preset",UPLOAD_PRESET);

  const res = await fetch(
    "https://api.cloudinary.com/v1_1/" +
    CLOUD_NAME +
    "/image/upload",
    {
      method:"POST",
      body:form
    }
  );

  const data = await res.json();

  return data.secure_url || "";

}

/* guardar */

async function saveEvent(){

  const name =
    document.getElementById("eventName")
    .value.trim();

  const status =
    document.getElementById("status");

  if(!name){
    status.innerText = "Escribí nombre";
    return;
  }

  status.innerText = "Creando...";

  try{

    const res = await fetch("/create-event",{
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body: JSON.stringify({
        name:name,
        background:bgUrl,
        frame:frameUrl
      })
    });

    const data = await res.json();

    if(data.success){

      status.innerText = "✅ Evento creado";

      document.getElementById("eventName").value="";
      loadEvents();

    }else{

      status.innerText =
        data.message || "Error";

    }

  }catch(err){

    console.log(err);
    status.innerText = "❌ Error conexión";

  }

}

/* lista */

async function loadEvents(){

  const box =
    document.getElementById("list");

  const res = await fetch("/events");
  const data = await res.json();

  if(!data.length){
    box.innerHTML = "Sin eventos";
    return;
  }

  box.innerHTML = "";

  data.slice().reverse().forEach(ev=>{

    box.innerHTML += `
      <div class="event">
        <strong>${ev.name}</strong>
        <br>
        ${ev.active ? "🟢 Activo":"⚪ Inactivo"}
        <br><br>
        <button onclick="toggleEvent(${ev.id})">
          Activar / Desactivar
        </button>
      </div>
    `;

  });

}

async function toggleEvent(id){

  await fetch("/toggle-event/"+id,{
    method:"POST"
  });

  loadEvents();

}

loadEvents();

</script>

</body>
</html>
