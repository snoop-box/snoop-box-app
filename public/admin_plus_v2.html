<script>
const CLOUD_NAME = "daxf4enjn";
const UPLOAD_PRESET = "snoopbox";

let bgUrl = "";
let frameUrl = "";
let uploading = 0;

/* ======================
   HELPERS
====================== */

function btnState(){

  const btn = document.getElementById("saveBtn");

  if(uploading > 0){
    btn.disabled = true;
    btn.innerText = "Subiendo imágenes...";
  }else{
    btn.disabled = false;
    btn.innerText = "Crear Evento";
  }

}

function preview(file,id){

  const reader = new FileReader();

  reader.onload = e=>{
    const img = document.getElementById(id);
    img.src = e.target.result;
    img.style.display = "block";
  };

  reader.readAsDataURL(file);

}

function resetForm(){

  document.getElementById("eventName").value = "";
  document.getElementById("bgFile").value = "";
  document.getElementById("frameFile").value = "";

  document.getElementById("bgPreview").style.display = "none";
  document.getElementById("framePreview").style.display = "none";

  bgUrl = "";
  frameUrl = "";

}

/* ======================
   CLOUDINARY
====================== */

async function uploadImage(file){

  const form = new FormData();

  form.append("file",file);
  form.append("upload_preset",UPLOAD_PRESET);

  const res = await fetch(
    "https://api.cloudinary.com/v1_1/" +
    CLOUD_NAME +
    "/image/upload",
    {
      method:"POST",
      body:form
    }
  );

  const data = await res.json();

  return data.secure_url || "";

}

/* ======================
   FILE EVENTS
====================== */

document.getElementById("bgFile").onchange =
async function(){

  const file = this.files[0];
  if(!file) return;

  preview(file,"bgPreview");

  uploading++;
  btnState();

  bgUrl = await uploadImage(file);

  uploading--;
  btnState();

};

document.getElementById("frameFile").onchange =
async function(){

  const file = this.files[0];
  if(!file) return;

  preview(file,"framePreview");

  uploading++;
  btnState();

  frameUrl = await uploadImage(file);

  uploading--;
  btnState();

};

/* ======================
   GUARDAR
====================== */

async function saveEvent(){

  if(uploading > 0) return;

  const name =
    document.getElementById("eventName")
    .value.trim();

  const status =
    document.getElementById("status");

  if(!name){
    status.innerText = "Escribí nombre";
    return;
  }

  status.innerText = "Creando...";

  try{

    const res = await fetch("/create-event",{
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body: JSON.stringify({
        name:name,
        background:bgUrl,
        frame:frameUrl
      })
    });

    const data = await res.json();

    if(data.success){

      status.innerText = "✅ Evento creado";

      resetForm();
      loadEvents();

    }else{

      status.innerText =
        data.message || "Error";

    }

  }catch(err){

    status.innerText = "❌ Error conexión";

  }

}

/* ======================
   LISTA
====================== */

async function loadEvents(){

  const box =
    document.getElementById("list");

  const res = await fetch("/events");
  const data = await res.json();

  if(!data.length){
    box.innerHTML = "Sin eventos";
    return;
  }

  box.innerHTML = "";

  data.slice().reverse().forEach(ev=>{

    box.innerHTML += `
      <div class="event">

        <strong>${ev.name}</strong>
        <br>
        ${ev.active ? "🟢 Activo":"⚪ Inactivo"}
        <br>
        Invitados: ${(ev.guests||[]).length}

        <div class="row">

          <button class="smallBtn"
          onclick="toggleEvent(${ev.id})">
          Activar
          </button>

          <button class="smallBtn"
          onclick="openExcel(${ev.id})">
          Excel
          </button>

        </div>

        <input
          type="file"
          id="excel_${ev.id}"
          accept=".xlsx,.xls,.csv"
          style="display:none"
          onchange="processExcel(event,${ev.id})">

      </div>
    `;

  });

}

async function toggleEvent(id){

  await fetch("/toggle-event/"+id,{
    method:"POST"
  });

  loadEvents();

}

/* ======================
   EXCEL FIX V3
====================== */

function openExcel(id){

  document
    .getElementById("excel_"+id)
    .click();

}

function processExcel(e,id){

  const file = e.target.files[0];
  if(!file) return;

  const reader = new FileReader();

  reader.onload = function(evt){

    const data =
      new Uint8Array(evt.target.result);

    const workbook =
      XLSX.read(data,{ type:"array" });

    const sheet =
      workbook.Sheets[
        workbook.SheetNames[0]
      ];

    const rows =
      XLSX.utils.sheet_to_json(sheet);

    const guests = rows.map(r=>{

      const clean = {};

      Object.keys(r).forEach(key=>{

        const k =
          key.toString()
          .trim()
          .toLowerCase();

        clean[k] = r[key];

      });

      return {

        name:
          clean.nombre ||
          clean.name ||
          clean.invitado ||
          "",

        table:
          clean.mesa ||
          clean.table ||
          "",

        phone:
          clean.telefono ||
          clean.teléfono ||
          clean.phone ||
          ""

      };

    });

    uploadGuests(id,guests);

  };

  reader.readAsArrayBuffer(file);

}

async function uploadGuests(id,guests){

  await fetch("/upload-guests/"+id,{
    method:"POST",
    headers:{
      "Content-Type":"application/json"
    },
    body: JSON.stringify({
      guests:guests
    })
  });

  alert("Excel cargado");

  loadEvents();

}

loadEvents();
btnState();

</script>
