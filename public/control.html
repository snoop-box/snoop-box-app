<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width,initial-scale=1">

<title>Control Salón</title>

<link
rel="manifest"
href="/control-manifest.json"
/>

<meta
name="theme-color"
content="#000000"
/>

<link
rel="apple-touch-icon"
href="/icons/control-192.png"
/>

<style>

body{
  margin:0;
  font-family:Arial,sans-serif;
  min-height:100vh;
  color:#fff;
  background:
  linear-gradient(
    135deg,
    #0b1f5e,
    #1e3a8a,
    #7f1d1d,
    #dc2626
  );
}

.wrap{
  max-width:560px;
  margin:auto;
  padding:24px;
}

.card{
  background:rgba(255,255,255,.08);
  backdrop-filter:blur(12px);
  border-radius:24px;
  padding:24px;
  box-shadow:0 18px 40px rgba(0,0,0,.28);
  margin-bottom:18px;
}

.center{
  text-align:center;
}

#eventTitle{
  font-size:36px;
  font-weight:bold;
  margin-bottom:8px;
  animation:glow 2s ease-in-out infinite alternate;
}

.sub{
  color:#ddd;
  font-size:14px;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
  margin-top:16px;
}

.stat{
  background:rgba(255,255,255,.07);
  border-radius:18px;
  padding:18px;
  text-align:center;
}

.label{
  font-size:14px;
  color:#ddd;
}

.value{
  font-size:34px;
  font-weight:bold;
  margin-top:8px;
}

.bigPercent{
  margin-top:18px;
  padding:20px;
  border-radius:20px;
  text-align:center;
  background:rgba(255,0,85,.16);
  border:1px solid rgba(255,255,255,.12);
}

.bigNumber{
  font-size:56px;
  font-weight:bold;
  line-height:1;
}

.footer{
  text-align:center;
  color:#ddd;
  font-size:13px;
  margin-top:10px;
}

#errorBox{
  text-align:center;
  padding:40px;
}

input{
  box-sizing:border-box;
}

button{
  cursor:pointer;
}

@keyframes glow{

  from{
    text-shadow:
    0 0 6px rgba(255,255,255,.2);
  }

  to{
    text-shadow:
    0 0 24px rgba(255,0,90,.6);
  }

}

</style>

</head>

<body>

<!-- LOGIN EVENTO -->

<div
id="loginScreen"
style="
display:none;
min-height:100vh;
justify-content:center;
align-items:center;
padding:24px;
">

  <div class="card center">

    <h1>
      Snoop Box
    </h1>

    <div class="sub">
      Ingresar evento
    </div>

    <input
    id="eventInput"
    placeholder="Nombre evento"
    style="
    margin-top:20px;
    padding:14px;
    width:100%;
    border:none;
    border-radius:14px;
    font-size:18px;
    text-align:center;
    ">

    <button
    id="enterBtn"
    style="
    margin-top:18px;
    width:100%;
    padding:14px;
    border:none;
    border-radius:14px;
    font-size:18px;
    font-weight:bold;
    background:#ff0055;
    color:white;
    ">

      ENTRAR

    </button>

  </div>

</div>

<!-- CONTROL -->

<div
class="wrap"
id="controlScreen">

  <div class="card">

    <div class="center">

      <div id="eventTitle">
        Cargando...
      </div>

      <div class="sub">
        Panel en vivo del evento
      </div>

    </div>

    <div class="grid">

      <div class="stat">

        <div class="label">
          Invitados
        </div>

        <div
        class="value"
        id="total">

          0

        </div>

      </div>

      <div class="stat">

        <div class="label">
          Presentes
        </div>

        <div
        class="value"
        id="arrived">

          0

        </div>

      </div>

      <div class="stat">

        <div class="label">
          Faltan llegar
        </div>

        <div
        class="value"
        id="missing">

          0

        </div>

      </div>

      <div class="stat">

        <div class="label">
          Actualización
        </div>

        <div
        class="value"
        style="font-size:24px;">

          LIVE

        </div>

      </div>

    </div>

    <div class="bigPercent">

      <div class="label">
        Porcentaje ingreso
      </div>

      <div
      class="bigNumber"
      id="percent">

        0%

      </div>

    </div>

    <div class="footer">
      Actualiza automáticamente cada 5 segundos
    </div>

  </div>

  <div id="errorBox"></div>

</div>

<script>

if(
  "serviceWorker"
  in navigator
){

  navigator
  .serviceWorker
  .register("/sw.js");

}

const eventSlug =
new URLSearchParams(
location.search
)
.get("event") || "";

let interval = null;

const loginScreen =
document.getElementById(
"loginScreen"
);

const controlScreen =
document.getElementById(
"controlScreen"
);

const eventInput =
document.getElementById(
"eventInput"
);

const enterBtn =
document.getElementById(
"enterBtn"
);

/* ===================== */

async function init(){

  if(!eventSlug){

    controlScreen.style.display =
    "none";

    loginScreen.style.display =
    "flex";

    return;

  }

  try{

    const res =
    await fetch(

      "/event-config/" +
      encodeURIComponent(
        eventSlug
      )

    );

    const data =
    await res.json();

    if(!data.success){

      document.getElementById(
      "errorBox"
      ).innerHTML =
      "Evento no encontrado";

      return;

    }

    document.getElementById(
    "eventTitle"
    ).innerText =
    data.event.name;

    await loadControl();

    interval =
    setInterval(()=>{

      loadControl();

    },5000);

  }

  catch(err){

    console.error(err);

  }

}

/* ===================== */

async function loadControl(){

  try{

    const res =
    await fetch(

      "/db-guests/" +
      eventSlug

    );

    const guests =
    await res.json();

    const total =
    guests.length;

    const arrived =
    guests.filter(
      g=>g.arrived
    ).length;

    const missing =
    total - arrived;

    const percent =
    total

    ? Math.round(

      (arrived * 100)
      / total

    )

    : 0;

    document.getElementById(
    "total"
    ).innerText =
    total;

    document.getElementById(
    "arrived"
    ).innerText =
    arrived;

    document.getElementById(
    "missing"
    ).innerText =
    missing;

    document.getElementById(
    "percent"
    ).innerText =
    percent + "%";

  }

  catch(err){

    console.error(err);

  }

}

/* ===================== */

enterBtn.onclick = ()=>{

  const value =
  eventInput.value
  .trim()
  .toLowerCase();

  if(!value)return;

  window.location.href =

  "/control?event=" +

  encodeURIComponent(
    value
  );

};

/* ===================== */

init();

</script>

</body>
</html>
