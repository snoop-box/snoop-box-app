<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Control Salón</title>

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  min-height:100vh;
  color:#fff;
  background:
  linear-gradient(
    135deg,
    #0b1f5e,
    #1e3a8a,
    #7f1d1d,
    #dc2626
  );
}

.wrap{
  max-width:560px;
  margin:auto;
  padding:24px;
}

.card{
  background:rgba(255,255,255,.08);
  backdrop-filter:blur(12px);
  border-radius:24px;
  padding:24px;
  box-shadow:0 18px 40px rgba(0,0,0,.28);
  margin-bottom:18px;
}

.center{
  text-align:center;
}

#eventTitle{
  font-size:36px;
  font-weight:bold;
  margin-bottom:8px;
  animation:glow 2s ease-in-out infinite alternate;
}

.sub{
  color:#ddd;
  font-size:14px;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
  margin-top:16px;
}

.stat{
  background:rgba(255,255,255,.07);
  border-radius:18px;
  padding:18px;
  text-align:center;
}

.label{
  font-size:14px;
  color:#ddd;
}

.value{
  font-size:34px;
  font-weight:bold;
  margin-top:8px;
}

.bigPercent{
  margin-top:18px;
  padding:20px;
  border-radius:20px;
  text-align:center;
  background:rgba(255,0,85,.16);
  border:1px solid rgba(255,255,255,.12);
}

.bigNumber{
  font-size:56px;
  font-weight:bold;
  line-height:1;
}

.footer{
  text-align:center;
  color:#ddd;
  font-size:13px;
  margin-top:10px;
}

#errorBox{
  text-align:center;
  padding:40px;
}

@keyframes glow{
  from{
    text-shadow:0 0 6px rgba(255,255,255,.2);
  }
  to{
    text-shadow:0 0 24px rgba(255,0,90,.6);
  }
}
</style>
</head>
<body>

<div class="wrap">

<div class="card">

<div class="center">
<div id="eventTitle">Cargando...</div>
<div class="sub">
Panel en vivo del evento
</div>
</div>

<div class="grid">

<div class="stat">
<div class="label">
Invitados
</div>
<div class="value" id="total">
0
</div>
</div>

<div class="stat">
<div class="label">
Presentes
</div>
<div class="value" id="arrived">
0
</div>
</div>

<div class="stat">
<div class="label">
Faltan llegar
</div>
<div class="value" id="missing">
0
</div>
</div>

<div class="stat">
<div class="label">
Actualización
</div>
<div class="value" style="font-size:24px;">
LIVE
</div>
</div>

</div>

<div class="bigPercent">

<div class="label">
Porcentaje ingreso
</div>

<div class="bigNumber"
id="percent">
0%
</div>

</div>

<div class="footer">
Actualiza automáticamente cada 5 segundos
</div>

</div>

<div id="errorBox"></div>

</div>

<script>

const eventSlug =
new URLSearchParams(location.search)
.get("event") || "";

let interval = null;

/* ===================== */

async function init(){

 if(!eventSlug){

  document.getElementById(
   "errorBox"
  ).innerHTML =
  "Falta ?event=slug";

  return;

 }

 try{

  const res =
  await fetch(
   "/event-config/" +
   encodeURIComponent(eventSlug)
  );

  const data =
  await res.json();

  if(!data.success){

   document.getElementById(
    "errorBox"
   ).innerHTML =
   "Evento no encontrado";

   return;

  }

  document.getElementById(
   "eventTitle"
  ).innerText =
  data.event.name;

  await loadControl();

  interval = setInterval(()=>{
   loadControl();
  },5000);

 }

 catch(err){

  console.error(err);

 }

}

/* ===================== */

async function loadControl(){

 try{

  const res =
  await fetch(
   "/db-guests/" +
   eventSlug
  );

  const guests =
  await res.json();

  const total =
  guests.length;

  const arrived =
  guests.filter(g=>g.arrived)
  .length;

  const missing =
  total - arrived;

  const percent =
  total
  ? Math.round(
     (arrived * 100)
     / total
    )
  : 0;

  document.getElementById(
   "total"
  ).innerText = total;

  document.getElementById(
   "arrived"
  ).innerText = arrived;

  document.getElementById(
   "missing"
  ).innerText = missing;

  document.getElementById(
   "percent"
  ).innerText =
  percent + "%";

 }

 catch(err){

  console.error(err);

 }

}

/* ===================== */

init();

</script>

</body>
</html>
