<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Snoop Box DJ</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial;
  overflow: hidden;
  color: white;
}

/* FONDO */
#bg {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  background-size: cover;
  background-position: center;
  z-index: -1;
}

/* LOGIN DJ */
#login {
  position: absolute;
  width: 100%;
  height: 100%;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  background: black;
}

input, button {
  padding: 15px;
  font-size: 18px;
  border-radius: 10px;
  border: none;
  margin: 10px;
}

button {
  background: #ff0055;
  color: white;
}

/* CONTENIDO */
#app {
  display:none;
}

/* CARRUSEL */
#viewer {
  position:absolute;
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
}

.slide {
  position:absolute;
  max-width:70%;
  max-height:70%;
  object-fit:contain;
  opacity:0;
  transform:translateX(100px) scale(0.9);
  transition: all 0.8s ease;
}

.slide.active {
  opacity:1;
  transform:translateX(0) scale(1);
}

/* NOMBRE */
#name {
  position:absolute;
  bottom:120px;
  width:100%;
  text-align:center;
  font-size:32px;
}

/* RANKING */
#ranking {
  position:absolute;
  top:20px;
  right:20px;
  font-size:24px;
}

/* QR */
#qrBox {
  position:absolute;
  bottom:20px;
  left:20px;
  background:white;
  padding:10px;
  border-radius:12px;
  text-align:center;
  color:black;
}

#qrBox img {
  width:120px;
}

#qrText {
  font-size:14px;
}
</style>
</head>

<body>

<div id="bg"></div>

<!-- LOGIN -->
<div id="login">
  <h2>Ingresar evento</h2>
  <input id="eventInput" placeholder="Ej: olivia2">
  <input id="bgInput" placeholder="URL imagen fondo (opcional)">
  <button onclick="start()">Entrar</button>
</div>

<!-- APP -->
<div id="app">

  <div id="viewer"></div>
  <div id="name"></div>
  <div id="ranking"></div>

  <div id="qrBox">
    <img id="qrImg">
    <div id="qrText">Escaneá y subí tus fotos 📸</div>
  </div>

</div>

<script>

let eventId = "";
let photos = [];
let index = 0;

// INICIAR
function start() {
  eventId = document.getElementById("eventInput").value.trim();
  const bgUrl = document.getElementById("bgInput").value.trim();

  if (!eventId) return alert("Ingresá un evento");

  document.getElementById("login").style.display = "none";
  document.getElementById("app").style.display = "block";

  // fondo
  if (bgUrl) {
    document.getElementById("bg").style.backgroundImage = `url(${bgUrl})`;
  }

  // QR automático
  const link = location.origin + "/?event=" + eventId;
  document.getElementById("qrImg").src =
    "https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=" + encodeURIComponent(link);

  load();
  loadRanking();

  setInterval(load,4000);
  setInterval(loadRanking,4000);
  setInterval(nextSlide,3000);
}

// CARGAR FOTOS
async function load() {
  const res = await fetch("/photos/" + eventId);
  photos = await res.json();
}

// MOSTRAR
function nextSlide() {
  if (photos.length === 0) return;

  const viewer = document.getElementById("viewer");
  const name = document.getElementById("name");

  viewer.innerHTML = "";

  const p = photos[index];

  const img = document.createElement("img");
  img.src = p.url;
  img.className = "slide";

  viewer.appendChild(img);

  setTimeout(()=> img.classList.add("active"), 50);

  name.innerText = p.name;

  index++;
  if (index >= photos.length) index = 0;
}

// RANKING
async function loadRanking() {
  const res = await fetch("/ranking/" + eventId);
  const data = await res.json();

  let html = "🏆 Ranking<br>";
  data.slice(0,3).forEach((r,i)=>{
    html += `${i+1}. Mesa ${r.table} (${r.points})<br>`;
  });

  document.getElementById("ranking").innerHTML = html;
}

</script>

</body>
</html>
