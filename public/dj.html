<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>DJ PRO FINAL</title>

<style>
body{
  margin:0;
  font-family:Arial;
  overflow:hidden;
  background:#000 center center/cover no-repeat;
  color:white;
}

/* LOGIN */

#login{
  position:fixed;
  inset:0;
  background:#111;
  display:flex;
  align-items:center;
  justify-content:center;
}

.loginBox{
  width:420px;
  background:#1d1d1d;
  padding:30px;
  border-radius:18px;
  text-align:center;
}

input{
  width:100%;
  padding:15px;
  border:none;
  border-radius:10px;
  margin:10px 0;
}

button{
  border:none;
  border-radius:12px;
  cursor:pointer;
}

/* APP */

#app{display:none;}

#overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.35);
}

#eventName{
  position:absolute;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  font-size:44px;
  font-weight:bold;
  z-index:3;
}

/* FOTO */

#photoBox{
  position:absolute;
  top:110px;
  left:50%;
  transform:translateX(-50%);
  border-radius:20px;
  overflow:hidden;
  z-index:3;
  display:none;
  backdrop-filter:blur(10px);
  background:rgba(255,255,255,.5);
}

#photoImg{
  width:100%;
  height:100%;
  object-fit:contain;
}

#photoUser{
  position:absolute;
  left:0;
  right:0;
  bottom:0;
  background:rgba(0,0,0,.6);
  padding:14px;
  font-size:24px;
  text-align:center;
}

/* DELETE */

#deleteBtn{
  position:absolute;
  top:10px;
  right:10px;
  width:38px;
  height:38px;
  border-radius:50%;
  background:rgba(0,0,0,.6);
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  z-index:10;
}

#deleteBtn:hover{
  background:#ff0055;
}

/* RANKING */

#ranking{
  position:absolute;
  right:30px;
  top:120px;
  width:260px;
  background:rgba(0,0,0,.45);
  padding:18px;
  border-radius:18px;
  z-index:3;
}

/* QR */

#qrBox{
  position:absolute;
  left:30px;
  bottom:30px;
  background:rgba(0,0,0,.45);
  padding:16px;
  border-radius:16px;
  z-index:3;
}

/* SORTEO */

#sortBtn{
  position:absolute;
  right:30px;
  bottom:30px;
  background:#ff0055;
  color:white;
  padding:16px 24px;
  font-size:22px;
  z-index:3;
}

</style>
</head>

<body>

<div id="login">
  <div class="loginBox">
    <h1>Ingresar Evento</h1>
    <input id="eventInput" placeholder="Nombre del evento">
    <button onclick="loginEvent()">Entrar</button>
    <div id="status"></div>
  </div>
</div>

<div id="app">

<div id="overlay"></div>

<div id="eventName"></div>

<div id="photoBox">
  <img id="photoImg">
  <div id="photoUser"></div>
  <div id="deleteBtn">✖</div>
</div>

<div id="ranking"></div>

<div id="qrBox">
<canvas id="qr"></canvas>
</div>

<button id="sortBtn">🎁 Sorteo</button>

</div>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<script>

let selectedEvent=null;
let photos=[];
let photoIndex=0;
let currentPhoto=null;

/* LOGIN */

async function loginEvent(){

 const name=document.getElementById("eventInput").value.toLowerCase();

 const res=await fetch("/events");
 const events=await res.json();

 const ev=events.find(e=>e.name.toLowerCase()===name);

 if(!ev){
  document.getElementById("status").innerText="Evento no encontrado";
  return;
 }

 selectedEvent=ev;

 document.getElementById("login").style.display="none";
 document.getElementById("app").style.display="block";

 document.getElementById("eventName").innerText=ev.name;

 if(ev.background){
  document.body.style.backgroundImage = `url('${ev.background}')`;
 }

 QRCode.toCanvas(document.getElementById("qr"), window.location.origin);

 loadPhotos();
 loadRanking();

 setInterval(loadPhotos,4000);
 setInterval(rotatePhotos,5000);
 setInterval(loadRanking,5000);
}

/* FOTOS */

async function loadPhotos(){
 const res=await fetch("/photos/"+selectedEvent.name);
 photos=await res.json();
}

function rotatePhotos(){

 if(!photos.length) return;

 if(photoIndex>=photos.length){
  photoIndex=0;
 }

 showPhoto(photos[photoIndex]);
 photoIndex++;
}

function showPhoto(p){

 currentPhoto=p;

 const box=document.getElementById("photoBox");

 const img=new Image();

 img.onload=function(){

  const ratio=img.width/img.height;

  if(ratio>1.2){
    box.style.width="50vw";
    box.style.height="45vh";
  }else if(ratio<0.8){
    box.style.width="28vw";
    box.style.height="60vh";
  }else{
    box.style.width="38vw";
    box.style.height="50vh";
  }

  document.getElementById("photoImg").src=p.url;
  document.getElementById("photoUser").innerText=p.user+" • Mesa "+p.table;

  box.style.display="block";
 }

 img.src=p.url;
}

/* DELETE */

document.getElementById("deleteBtn").onclick=async()=>{

 if(!currentPhoto) return;

 const ok=confirm("¿Eliminar foto?");
 if(!ok) return;

 await fetch("/photo",{
  method:"DELETE",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({url:currentPhoto.url})
 });

 photos=photos.filter(p=>p.url!==currentPhoto.url);

 document.getElementById("photoBox").style.display="none";
};

/* RANKING */

async function loadRanking(){

 const res=await fetch("/ranking/"+selectedEvent.name);
 const data=await res.json();

 let html="<h2>🏆 Ranking</h2>";

 data.slice(0,5).forEach((g,i)=>{
   html+=`${i+1}. Mesa ${g.table} (${g.points})<br>`;
 });

 document.getElementById("ranking").innerHTML=html;
}

/* SORTEO SIMPLE */

document.getElementById("sortBtn").onclick=()=>{

 if(!photos.length) return;

 const winner=photos[Math.floor(Math.random()*photos.length)];

 alert("🎉 Ganador: "+winner.user+" (Mesa "+winner.table+")");
};

</script>

</body>
</html>
