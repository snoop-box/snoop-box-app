<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>DJ PRO FINAL</title>

<style>
body{
  margin:0;
  font-family:Arial;
  overflow:hidden;
  background:#000;
  background-position:center center;
  background-size:contain;
  background-repeat:no-repeat;
  color:white;
}

/* LOGIN */
#login{
  position:fixed;
  inset:0;
  background:#111;
  display:flex;
  align-items:center;
  justify-content:center;
}

.loginBox{
  width:420px;
  background:#1d1d1d;
  padding:30px;
  border-radius:18px;
  text-align:center;
}

input{
  width:100%;
  padding:15px;
  border:none;
  border-radius:10px;
  margin:10px 0;
}

/* APP */
#app{display:none;}

#eventName{
  position:absolute;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  font-size:42px;
  font-weight:bold;
}

/* FOTO */
#photoBox{
  position:absolute;
  top:110px;
  left:50%;
  transform:translateX(-50%);
  border-radius:20px;
  overflow:hidden;
  display:none;
  background:rgba(255,255,255,.5);
  backdrop-filter:blur(10px);
}

#photoImg{
  width:100%;
  height:100%;
  object-fit:contain;
}

#photoUser{
  position:absolute;
  bottom:0;
  left:0;
  right:0;
  background:rgba(0,0,0,.6);
  padding:12px;
  text-align:center;
}

/* DELETE */
#deleteBtn{
  position:absolute;
  top:10px;
  right:10px;
  width:36px;
  height:36px;
  border-radius:50%;
  background:rgba(0,0,0,.6);
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}

/* ========================= */
/* 🔥 RANKING PRO ESTILO CELU */
/* ========================= */

#ranking{
  position:absolute;
  right:30px;
  top:110px;
  width:340px;
  background:rgba(0,0,0,.45);
  padding:20px;
  border-radius:20px;
}

.rankTitle{
  font-size:26px;
  margin-bottom:6px;
}

.rankSub{
  font-size:16px;
  opacity:.7;
  margin-bottom:14px;
}

.top3{
  display:flex;
  gap:10px;
}

.card{
  flex:1;
  border-radius:16px;
  padding:12px;
  text-align:center;
  background:rgba(255,255,255,.08);
  transition:.3s;
}

.card:hover{
  transform:scale(1.05);
}

/* bordes */
.gold{border:3px solid gold;}
.silver{border:3px solid #ccc;}
.bronze{border:3px solid #cd7f32;}

.rankRest{
  margin-top:12px;
  background:rgba(255,255,255,.08);
  padding:10px;
  border-radius:12px;
  display:flex;
  justify-content:space-between;
}

.rankMessage{
  margin-top:12px;
  background:#b3002d;
  padding:14px;
  border-radius:14px;
  text-align:center;
  font-weight:bold;
}

/* ALERT FOTO */
#newPhotoAlert{
  position:fixed;
  top:30px;
  left:50%;
  transform:translateX(-50%);
  background:#ff0055;
  padding:12px 24px;
  border-radius:12px;
  display:none;
}

/* QR */
#qrBox{
  position:absolute;
  left:30px;
  bottom:30px;
}

/* SORTEO */
#sortBtn{
  position:absolute;
  right:30px;
  bottom:30px;
  background:#ff0055;
  color:white;
  padding:16px 24px;
  font-size:20px;
}

/* GANADOR */
#winnerOverlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.85);
  display:none;
  align-items:center;
  justify-content:center;
  flex-direction:column;
}

#winnerText{
  font-size:60px;
}

/* CONFETTI */
.confetti{
  position:fixed;
  width:10px;
  height:10px;
  top:-10px;
  animation:fall linear forwards;
}

@keyframes fall{
  to{transform:translateY(100vh) rotate(720deg);}
}
</style>
</head>

<body>

<div id="login">
  <div class="loginBox">
    <h2>Evento</h2>
    <input id="eventInput">
    <button onclick="loginEvent()">Entrar</button>
  </div>
</div>

<div id="app">

<div id="eventName"></div>

<div id="photoBox">
  <img id="photoImg">
  <div id="photoUser"></div>
  <div id="deleteBtn">✖</div>
</div>

<div id="ranking"></div>

<div id="qrBox"><canvas id="qr"></canvas></div>

<button id="sortBtn">🎁 Sorteo</button>

<div id="winnerOverlay"><div id="winnerText"></div></div>
<div id="newPhotoAlert"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<script>
let selectedEvent=null;
let photos=[];
let photoIndex=0;
let currentPhoto=null;
let lastPhotoCount=0;

async function loginEvent(){

 const name=document.getElementById("eventInput").value.toLowerCase();
 const res=await fetch("/events");
 const events=await res.json();

 const ev=events.find(e=>e.name.toLowerCase()===name);
 if(!ev)return;

 selectedEvent=ev;

 document.getElementById("login").style.display="none";
 document.getElementById("app").style.display="block";

 document.getElementById("eventName").innerText=ev.name;

 if(ev.background){
  document.body.style.backgroundImage=`url('${ev.background}')`;
 }

 QRCode.toCanvas(
   document.getElementById("qr"),
   window.location.origin + "/?event=" + ev.name
 );

 loadPhotos();
 loadRanking();

 setInterval(loadPhotos,4000);
 setInterval(rotatePhotos,5000);
 setInterval(loadRanking,5000);
}

async function loadPhotos(){

 const res=await fetch("/photos/"+selectedEvent.name);
 const data=await res.json();

 if(data.length>lastPhotoCount){
   showNewPhotoAlert(data[0]);
 }

 lastPhotoCount=data.length;
 photos=data;
}

function showNewPhotoAlert(p){

 const box=document.getElementById("newPhotoAlert");
 box.innerText="📸 Nueva foto Mesa "+p.table;
 box.style.display="block";

 setTimeout(()=>box.style.display="none",2000);
}

function rotatePhotos(){

 if(!photos.length)return;

 if(photoIndex>=photos.length)photoIndex=0;

 showPhoto(photos[photoIndex]);
 photoIndex++;
}

function showPhoto(p){

 currentPhoto=p;

 const img=document.getElementById("photoImg");

 img.src=p.url;
 document.getElementById("photoUser").innerText=p.user+" • Mesa "+p.table;

 document.getElementById("photoBox").style.display="block";
}

/* DELETE FIX */
document.getElementById("deleteBtn").onclick=async()=>{

 if(!currentPhoto)return;

 await fetch("/photo",{
  method:"DELETE",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({url:currentPhoto.url})
 });

 photos=photos.filter(p=>p.url!==currentPhoto.url);
 currentPhoto=null;
 photoIndex=0;
};

/* 🔥 RANKING PRO */
async function loadRanking(){

 const res=await fetch("/ranking/"+selectedEvent.name);
 const data=await res.json();

 if(!data.length)return;

 let html=`
 <div class="rankTitle">🏆 Ranking en Vivo</div>
 <div class="rankSub">Cada foto suma puntos</div>
 <div class="top3">
 `;

 const medals=["🥇","🥈","🥉"];
 const classes=["gold","silver","bronze"];

 data.slice(0,3).forEach((g,i)=>{
   html+=`
   <div class="card ${classes[i]}">
     ${medals[i]}<br>
     Mesa ${g.table}<br>
     ${g.points} pts
   </div>`;
 });

 html+="</div>";

 data.slice(3,6).forEach((g,i)=>{
   html+=`
   <div class="rankRest">
     ${i+4}. Mesa ${g.table}
     <span>${g.points} pts</span>
   </div>`;
 });

 const leader=data[0];

 html+=`
 <div class="rankMessage">
   Mesa ${leader.table} va 1° 🔥 ¡Van primeros!
 </div>`;

 document.getElementById("ranking").innerHTML=html;
}

/* SORTEO */
document.getElementById("sortBtn").onclick=()=>{

 if(!photos.length)return;

 let cycles=0;

 const interval=setInterval(()=>{

   const r=photos[Math.floor(Math.random()*photos.length)];
   showPhoto(r);

   cycles++;

   if(cycles>30){
     clearInterval(interval);

     const winner=photos[Math.floor(Math.random()*photos.length)];

     showPhoto(winner);
     showWinner(winner);
     confetti();
   }

 },80);
};

function showWinner(w){

 const overlay=document.getElementById("winnerOverlay");
 overlay.style.display="flex";
 document.getElementById("winnerText").innerHTML=
 `🎉 ${w.user}<br>Mesa ${w.table}`;

 setTimeout(()=>overlay.style.display="none",4000);
}

function confetti(){

 for(let i=0;i<80;i++){

   const d=document.createElement("div");
   d.className="confetti";
   d.style.left=Math.random()*100+"vw";
   d.style.background=`hsl(${Math.random()*360},100%,50%)`;
   d.style.animationDuration=(Math.random()*2+2)+"s";

   document.body.appendChild(d);
   setTimeout(()=>d.remove(),4000);
 }
}

</script>

</body>
</html>
