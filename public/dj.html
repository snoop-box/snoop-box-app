<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>DJ Screen</title>

<style>
body{
  margin:0;
  font-family:Arial;
  overflow:hidden;
  background:#000 center center/cover no-repeat;
  color:white;
}

/* LOGIN */

#login{
  position:fixed;
  inset:0;
  background:#111;
  display:flex;
  align-items:center;
  justify-content:center;
}

.loginBox{
  width:420px;
  background:#1d1d1d;
  padding:30px;
  border-radius:18px;
  text-align:center;
}

input{
  width:100%;
  padding:15px;
  border:none;
  border-radius:10px;
  margin:10px 0;
  box-sizing:border-box;
}

button{
  border:none;
  border-radius:12px;
  cursor:pointer;
}

/* APP */

#app{
  display:none;
}

#overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.35);
}

#eventName{
  position:absolute;
  top:20px;
  left:30px;
  font-size:42px;
  font-weight:bold;
  z-index:3;
}

#photoBox{
  position:absolute;
  top:110px;
  left:50%;
  transform:translateX(-50%);
  width:58vw;
  height:58vh;
  border-radius:20px;
  overflow:hidden;
  z-index:3;
  display:none;
}

#photoBox img{
  width:100%;
  height:100%;
  object-fit:cover;
}

#photoUser{
  position:absolute;
  left:0;
  right:0;
  bottom:0;
  background:rgba(0,0,0,.55);
  padding:14px;
  font-size:26px;
  text-align:center;
}

#ranking{
  position:absolute;
  right:30px;
  top:120px;
  width:250px;
  background:rgba(0,0,0,.45);
  padding:18px;
  border-radius:18px;
  z-index:3;
}

#qrBox{
  position:absolute;
  left:30px;
  bottom:30px;
  background:rgba(0,0,0,.45);
  padding:16px;
  border-radius:16px;
  z-index:3;
}

#sortBtn{
  position:absolute;
  right:30px;
  bottom:30px;
  background:#ff0055;
  color:white;
  padding:16px 24px;
  font-size:22px;
  z-index:3;
}

#newPhotoAlert{
  position:fixed;
  top:30px;
  left:50%;
  transform:translateX(-50%);
  background:#ff0055;
  padding:16px 28px;
  border-radius:16px;
  font-size:28px;
  display:none;
  z-index:10;
}
</style>
</head>
<body>

<div id="login">
  <div class="loginBox">
    <h1>Ingresar Evento</h1>
    <input type="text" id="eventInput" placeholder="Nombre del evento">
    <button onclick="loginEvent()" style="width:100%;padding:15px;background:#ff0055;color:#fff;font-size:18px;">Entrar</button>
    <div id="status"></div>
  </div>
</div>

<div id="app">

<div id="overlay"></div>

<div id="eventName"></div>

<div id="photoBox">
  <img id="photoImg">
  <div id="photoUser"></div>
</div>

<div id="ranking">
<h2>🏆 Ranking</h2>
Mesa 1<br>Mesa 2<br>Mesa 3
</div>

<div id="qrBox">
<div>Escaneá y participá</div>
<canvas id="qr"></canvas>
</div>

<button id="sortBtn">🎁 Sorteo</button>

<div id="newPhotoAlert">📸 Nueva foto subida</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<script>

let selectedEvent=null;
let photos=[];
let photoIndex=0;
let lastCount=0;

/* LOGIN */

async function loginEvent(){

  const name =
    document.getElementById("eventInput")
    .value.trim()
    .toLowerCase();

  const res = await fetch("/events");
  const events = await res.json();

  const found = events.find(ev =>
    ev.name.toLowerCase() === name
  );

  if(!found){
    document.getElementById("status").innerText =
      "Evento no encontrado";
    return;
  }

  selectedEvent = found;

  document.getElementById("login").style.display="none";
  document.getElementById("app").style.display="block";

  document.getElementById("eventName").innerText =
    selectedEvent.name;

  if(selectedEvent.background){
    document.body.style.backgroundImage =
      `url('${selectedEvent.background}')`;
  }

  QRCode.toCanvas(
    document.getElementById("qr"),
    window.location.origin,
    { width:160 }
  );

  loadPhotos();

  setInterval(loadPhotos,4000);
  setInterval(rotatePhotos,5000);

}

/* FOTOS */

async function loadPhotos(){

  const res = await fetch("/photos");
  const data = await res.json();

  if(data.length > lastCount){
    showAlert();
  }

  lastCount = data.length;
  photos = data;

}

function rotatePhotos(){

  if(!photos.length) return;

  document.getElementById("photoBox").style.display =
    "block";

  if(photoIndex >= photos.length){
    photoIndex = 0;
  }

  const p = photos[photoIndex];

  document.getElementById("photoImg").src = p.image;
  document.getElementById("photoUser").innerText =
    "Subió: " + p.user;

  photoIndex++;

}

function showAlert(){

  const box =
    document.getElementById("newPhotoAlert");

  box.style.display="block";

  setTimeout(()=>{
    box.style.display="none";
  },2500);

}

</script>

</body>
</html>
