<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>DJ FINAL WOW PATCH</title>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:Arial,sans-serif;
  overflow:hidden;
  background:#000 center center/cover no-repeat fixed;
  color:#fff;
}

#login{
  position:fixed;
  inset:0;
  background:#111;
  display:flex;
  justify-content:center;
  align-items:center;
}

.loginBox{
  width:420px;
  max-width:92%;
  background:#1c1c1c;
  padding:30px;
  border-radius:24px;
  text-align:center;
}

input{
  width:100%;
  padding:15px;
  border:none;
  border-radius:12px;
  margin:10px 0;
  font-size:16px;
}

button{
  border:none;
  border-radius:14px;
  cursor:pointer;
}

.mainBtn{
  width:100%;
  padding:15px;
  background:#ff0055;
  color:#fff;
  font-size:18px;
}

#app{display:none;}

#overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.38);
}

#eventName{
  position:absolute;
  top:18px;
  left:50%;
  transform:translateX(-50%);
  font-size:48px;
  font-weight:bold;
  z-index:10;
}

/* FOTO */

#photoBox{
  position:absolute;
  top:105px;
  left:50%;
  transform:translateX(-50%);
  width:60vw;
  height:62vh;
  background:rgba(255,255,255,.50);
  backdrop-filter:blur(12px);
  border-radius:26px;
  overflow:hidden;
  display:none;
  z-index:5;
  box-shadow:0 25px 55px rgba(0,0,0,.40);
}

#photoImg{
  width:100%;
  height:100%;
  object-fit:contain;

  /* FIX PEDIDO */
  background:rgba(0,0,0,.50);

  opacity:0;
  transform:scale(1.08) translateX(35px);
  filter:blur(12px) brightness(.8);

  transition:
    opacity .8s ease,
    transform 1s ease,
    filter .9s ease;
}

#photoImg.show{
  opacity:1;
  transform:scale(1) translateX(0);
  filter:blur(0) brightness(1);
}

#photoUser{
  position:absolute;
  left:0;
  right:0;
  bottom:0;
  padding:16px;
  font-size:26px;
  text-align:center;
  background:linear-gradient(to top,rgba(0,0,0,.72),rgba(0,0,0,0));
}

/* RANKING */

#ranking{
  position:absolute;
  right:24px;
  top:120px;
  width:280px;
  background:rgba(0,0,0,.45);
  padding:18px;
  border-radius:22px;
  z-index:10;
}

#ranking h2{
  margin:0 0 12px 0;
  text-align:center;
}

.rankRow{
  display:flex;
  justify-content:space-between;
  padding:10px;
  margin-bottom:10px;
  border-radius:12px;
  background:rgba(255,255,255,.06);
}

/* QR */

#qrBox{
  position:absolute;
  left:24px;
  bottom:24px;
  background:rgba(0,0,0,.45);
  padding:16px;
  border-radius:18px;
  text-align:center;
  z-index:10;
}

/* BOTON */

#sortBtn{
  position:absolute;
  right:24px;
  bottom:24px;
  background:#ff0055;
  color:#fff;
  padding:16px 26px;
  font-size:24px;
  z-index:10;
}

#alertBox{
  position:fixed;
  top:90px;
  left:50%;
  transform:translateX(-50%);
  background:#ff0055;
  padding:14px 24px;
  border-radius:16px;
  font-size:24px;
  display:none;
  z-index:50;
}

/* GANADOR */

#winnerBox{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.88);
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
  z-index:100;
}

#winnerBox h1{
  font-size:78px;
  margin:0;
}

#winnerName{
  font-size:62px;
  margin-top:18px;
}

#winnerMesa{
  font-size:38px;
  margin-top:10px;
}

/* CONFETTI */

.confetti{
  position:fixed;
  top:-20px;
  width:12px;
  height:12px;
  z-index:150;
  animation:fall 3s linear forwards;
}

@keyframes fall{
  to{
    transform:translateY(110vh) rotate(720deg);
    opacity:0;
  }
}
</style>
</head>
<body>

<div id="login">
  <div class="loginBox">
    <h1>DJ Screen</h1>
    <input id="eventInput" placeholder="Nombre del evento">
    <button class="mainBtn" id="enterBtn">Entrar</button>
    <div id="status"></div>
  </div>
</div>

<div id="app">

<div id="overlay"></div>
<div id="eventName"></div>

<div id="photoBox">
  <img id="photoImg">
  <div id="photoUser"></div>
</div>

<div id="ranking">
<h2>🏆 Ranking</h2>
<div id="rankingBox"></div>
</div>

<div id="qrBox">
<div style="margin-bottom:8px;">Escaneá y participá</div>
<canvas id="qr"></canvas>
</div>

<button id="sortBtn">🎁 Sorteo</button>

<div id="alertBox">📸 Nueva foto subida</div>

</div>

<div id="winnerBox">
<h1>🎉 GANADOR 🎉</h1>
<div id="winnerName"></div>
<div id="winnerMesa"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<script>
let selectedEvent=null;
let photos=[];
let photoIndex=0;
let lastCount=0;
let spinning=false;

const login=document.getElementById("login");
const app=document.getElementById("app");
const eventInput=document.getElementById("eventInput");
const enterBtn=document.getElementById("enterBtn");
const status=document.getElementById("status");
const eventName=document.getElementById("eventName");
const photoBox=document.getElementById("photoBox");
const photoImg=document.getElementById("photoImg");
const photoUser=document.getElementById("photoUser");
const rankingBox=document.getElementById("rankingBox");
const qr=document.getElementById("qr");
const sortBtn=document.getElementById("sortBtn");
const alertBox=document.getElementById("alertBox");
const winnerBox=document.getElementById("winnerBox");
const winnerName=document.getElementById("winnerName");
const winnerMesa=document.getElementById("winnerMesa");

enterBtn.onclick=loginEvent;
sortBtn.onclick=runDraw;

async function loginEvent(){

 const name=eventInput.value.trim().toLowerCase();

 const res=await fetch("/events");
 const events=await res.json();

 const found=events.find(e =>
 e.name.toLowerCase()===name);

 if(!found){
  status.innerText="Evento no encontrado";
  return;
 }

 selectedEvent=found;

 login.style.display="none";
 app.style.display="block";

 eventName.innerText=found.name;

 if(found.background){
  document.body.style.backgroundImage=
  `url('${found.background}')`;
 }

 QRCode.toCanvas(
  qr,
  location.origin + "/?event=" +
  encodeURIComponent(found.name),
  {width:170}
 );

 loadPhotos();
 loadRanking();

 setInterval(loadPhotos,4000);
 setInterval(loadRanking,5000);
 setInterval(()=>{
  if(!spinning) rotatePhotos();
 },6500);
}

async function loadPhotos(){

 const res=await fetch(
 "/photos/" +
 encodeURIComponent(selectedEvent.name)
 );

 const data=await res.json();

 if(data.length > lastCount){
  showAlert();
 }

 lastCount=data.length;
 photos=data;

 if(photos.length &&
 photoBox.style.display==="none"){
  rotatePhotos();
 }
}

function rotatePhotos(){

 if(!photos.length) return;

 if(photoIndex>=photos.length){
  photoIndex=0;
 }

 showPhoto(photos[photoIndex]);
 photoIndex++;
}

function showPhoto(p){

 photoBox.style.display="block";

 photoImg.classList.remove("show");

 setTimeout(()=>{

  photoImg.src=
  p.url || p.image || "";

  photoUser.innerText=
  (p.user||"Invitado")+
  " • Mesa "+
  (p.table||"-");

  photoImg.classList.add("show");

 },180);
}

async function loadRanking(){

 const res=await fetch(
 "/ranking/" +
 encodeURIComponent(selectedEvent.name)
 );

 const data=await res.json();

 rankingBox.innerHTML="";

 data.slice(0,5).forEach((r,i)=>{

 rankingBox.innerHTML += `
 <div class="rankRow">
   <div>${i+1}. Mesa ${r.table}</div>
   <div>${r.points||0}</div>
 </div>
 `;

 });
}

function showAlert(){

 alertBox.style.display="block";

 setTimeout(()=>{
  alertBox.style.display="none";
 },2200);
}

/* =======================
   SORTEO EXCLUYE MESA 00
======================= */

function runDraw(){

 if(spinning) return;

 const validPhotos =
 photos.filter(p =>
 String(p.table||"") !== "00"
 );

 if(!validPhotos.length){
  alert("No hay participantes válidos");
  return;
 }

 spinning=true;

 let duration=4000;
 let start=Date.now();
 let delay=70;
 let i=0;

 function spin(){

  const elapsed=
  Date.now()-start;

  if(elapsed>=duration){

   const winner =
   validPhotos[
    Math.floor(
     Math.random() *
     validPhotos.length
    )
   ];

   showPhoto(winner);
   showWinner(winner);

   spinning=false;
   return;
  }

  showPhoto(
   validPhotos[
    i % validPhotos.length
   ]
  );

  i++;
  delay += 12;

  setTimeout(spin,delay);

 }

 spin();
}

function showWinner(w){

 winnerName.innerText=
 w.user || "Invitado";

 winnerMesa.innerText=
 "Mesa " +
 (w.table||"-");

 winnerBox.style.display="flex";

 launchConfetti();

 winnerBox.onclick=()=>{
  winnerBox.style.display="none";
 };
}

function launchConfetti(){

 for(let i=0;i<120;i++){

  const c=
  document.createElement("div");

  c.className="confetti";

  c.style.left=
  Math.random()*100+"vw";

  c.style.background=
  `hsl(${Math.random()*360},90%,60%)`;

  c.style.animationDelay=
  (Math.random()*1.1)+"s";

  document.body.appendChild(c);

  setTimeout(()=>{
   c.remove();
  },3200);
 }
}
</script>
</body>
</html>
