<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Snoop Box DJ PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  background: radial-gradient(circle,#000,#111);
  font-family: Arial;
  color:white;
  overflow:hidden;
}

/* CONTENEDOR */
#stage {
  position: relative;
  width:100vw;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* IMAGEN */
#photo {
  max-width:85%;
  max-height:80%;
  object-fit: contain;
  opacity:0;
  transform: scale(1.05);
  transition: opacity 0.8s, transform 2s;
}

#photo.show {
  opacity:1;
  transform: scale(1);
}

/* NOMBRE */
#name {
  position:absolute;
  bottom:40px;
  font-size:40px;
  font-weight:bold;
  text-shadow:0 0 15px black;
}

/* RANKING */
#ranking {
  position:absolute;
  right:30px;
  top:30px;
  background: rgba(0,0,0,0.7);
  padding:20px;
  border-radius:15px;
  font-size:26px;
  line-height:1.6;
}

/* NUEVA FOTO */
#newBadge {
  position:absolute;
  top:30px;
  left:30px;
  background:#ff0055;
  padding:10px 20px;
  border-radius:10px;
  font-size:22px;
  opacity:0;
  transition: opacity 0.5s;
}

#newBadge.show {
  opacity:1;
}
</style>
</head>

<body>

<div id="stage">
  <img id="photo">
  <div id="name"></div>
  <div id="ranking"></div>
  <div id="newBadge">📸 Nueva foto</div>
</div>

<script>

const eventId = new URLSearchParams(location.search).get("event") || "default";

let photos = [];
let lastCount = 0;
let index = 0;

/* ================= CARGAR FOTOS ================= */
async function loadPhotos() {
  const res = await fetch("/photos/" + eventId);
  const data = await res.json();

  // detectar nuevas
  if (data.length > lastCount) {
    showNewBadge();
  }

  lastCount = data.length;
  photos = data.reverse();
}

/* ================= RANKING ================= */
async function loadRanking() {
  const res = await fetch("/ranking/" + eventId);
  const data = await res.json();

  let html = "<strong>🏆 Ranking</strong><br>";

  data.slice(0,5).forEach((r,i)=>{
    html += `${i+1}. Mesa ${r.table} (${r.points})<br>`;
  });

  document.getElementById("ranking").innerHTML = html;
}

/* ================= SLIDE ================= */
function showSlide() {
  if (photos.length === 0) return;

  const img = document.getElementById("photo");
  const name = document.getElementById("name");

  img.classList.remove("show");

  setTimeout(()=>{
    img.src = photos[index].url;
    name.innerText = photos[index].name;
    img.classList.add("show");

    index++;
    if (index >= photos.length) index = 0;

  },300);
}

/* ================= NUEVA FOTO ================= */
function showNewBadge() {
  const badge = document.getElementById("newBadge");

  badge.classList.add("show");

  setTimeout(()=>{
    badge.classList.remove("show");
  },2000);
}

/* ================= LOOP ================= */
setInterval(showSlide, 3000);
setInterval(loadPhotos, 4000);
setInterval(loadRanking, 5000);

/* ================= INIT ================= */
loadPhotos();
loadRanking();

</script>

</body>
</html>
