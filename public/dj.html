<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:radial-gradient(circle,#111,#000);
  color:#fff;
  overflow-x:hidden;
}

header{
  padding:18px;
  text-align:center;
  background:rgba(255,255,255,.04);
  backdrop-filter:blur(8px);
}

#eventTitle{
  font-size:34px;
  font-weight:bold;
}

#cameraBtn{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#ff0055;
  color:#fff;
  border:none;
  border-radius:16px;
  padding:18px 24px;
  font-size:20px;
  cursor:pointer;
  z-index:100;
}

#grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:14px;
  padding:18px;
  padding-right:270px;
}

/* CAMBIO PEDIDO */

.card{
  background:rgba(255,255,255,.50);
  backdrop-filter:blur(10px);
  border-radius:18px;
  overflow:hidden;
  box-shadow:0 10px 25px rgba(0,0,0,.35);
  cursor:pointer;
  transition:.25s;
}

.card:hover{
  transform:translateY(-4px) scale(1.01);
}

.card img{
  width:100%;
  height:280px;
  object-fit:cover;
}

.info{
  padding:12px;
}

.user{
  font-size:22px;
  font-weight:bold;
  color:#111;
}

.table{
  color:#222;
  margin-top:4px;
}

/* SIDE PANEL */

#side{
  position:fixed;
  top:0;
  right:0;
  width:250px;
  height:100%;
  background:rgba(0,0,0,.82);
  backdrop-filter:blur(10px);
  padding:16px;
  box-sizing:border-box;
  overflow:auto;
}

#rankTitle{
  text-align:center;
  font-size:26px;
  font-weight:bold;
  margin-bottom:14px;
}

.rankRow{
  display:flex;
  justify-content:space-between;
  padding:12px;
  border-radius:14px;
  background:rgba(255,255,255,.06);
  margin-bottom:10px;
}

.gold{border:1px solid gold;}
.silver{border:1px solid silver;}
.bronze{border:1px solid #cd7f32;}

#qrBox{
  margin-top:20px;
  text-align:center;
  background:#fff;
  color:#000;
  padding:12px;
  border-radius:16px;
}

#qrBox img{
  width:140px;
}

#qrText{
  font-size:14px;
  margin-top:8px;
}

/* CAMERA */

#cameraModal{
  position:fixed;
  inset:0;
  display:none;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,.92);
  z-index:500;
}

#video{
  width:70%;
  max-width:800px;
  border-radius:20px;
  transform:scaleX(-1);
}

#countdown{
  position:absolute;
  font-size:140px;
  font-weight:bold;
}

#flash{
  position:fixed;
  inset:0;
  background:#fff;
  opacity:0;
  pointer-events:none;
  z-index:600;
}

#canvas{
  display:none;
}

/* POPUP */

#printModal{
  position:fixed;
  inset:0;
  display:none;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,.88);
  z-index:900;
}

#printInner{
  background:rgba(255,255,255,.5);
  backdrop-filter:blur(12px);
  border-radius:24px;
  padding:24px;
  text-align:center;
}

#printFrame{
  position:relative;
  width:260px;
  height:390px;
  overflow:hidden;
  border-radius:18px;
  background:#000;
}

#printFrame img{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
}

#printPhoto{
  object-fit:contain;
}

#printFrameOverlay{
  object-fit:cover;
}

.printBtn{
  border:none;
  padding:14px 18px;
  border-radius:12px;
  margin-top:14px;
  cursor:pointer;
  font-size:16px;
}

.primary{
  background:#ff0055;
  color:#fff;
}

.dark{
  background:#333;
  color:#fff;
}
