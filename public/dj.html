<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>DJ PRO FINAL</title>

<style>
body{
  margin:0;
  font-family:Arial;
  overflow:hidden;
  background:#000;
  color:white;
}

/* 🔥 LOGO FONDO PRO */
#bgLogo{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  max-width:90vw;
  max-height:90vh;
  object-fit:contain;
  opacity:.25;
  z-index:0;
}

/* APP */
#app{display:none; position:relative; z-index:2;}

#eventName{
  position:absolute;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  font-size:42px;
  font-weight:bold;
}

/* FOTO */
#photoBox{
  position:absolute;
  top:110px;
  left:50%;
  transform:translateX(-50%);
  border-radius:20px;
  overflow:hidden;
  display:none;
  background:rgba(255,255,255,.5);
  backdrop-filter:blur(10px);
}

#photoImg{
  width:100%;
  height:100%;
  object-fit:contain;
}

#photoUser{
  position:absolute;
  bottom:0;
  left:0;
  right:0;
  background:rgba(0,0,0,.6);
  padding:12px;
  text-align:center;
}

/* DELETE */
#deleteBtn{
  position:absolute;
  top:10px;
  right:10px;
  width:36px;
  height:36px;
  border-radius:50%;
  background:rgba(0,0,0,.6);
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}

/* RANKING */
#ranking{
  position:absolute;
  right:30px;
  top:110px;
  width:340px;
  background:rgba(0,0,0,.45);
  padding:20px;
  border-radius:20px;
}

/* QR */
#qrBox{
  position:absolute;
  left:30px;
  bottom:30px;
}

/* SORTEO */
#sortBtn{
  position:absolute;
  right:30px;
  bottom:30px;
  background:#ff0055;
  color:white;
  padding:16px 24px;
  font-size:20px;
}

/* GANADOR */
#winnerOverlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.85);
  display:none;
  align-items:center;
  justify-content:center;
}

#winnerText{
  font-size:60px;
}

/* ALERT */
#newPhotoAlert{
  position:fixed;
  top:30px;
  left:50%;
  transform:translateX(-50%);
  background:#ff0055;
  padding:12px 24px;
  border-radius:12px;
  display:none;
}

/* CONFETTI */
.confetti{
  position:fixed;
  width:10px;
  height:10px;
  top:-10px;
  animation:fall linear forwards;
}

@keyframes fall{
  to{transform:translateY(100vh) rotate(720deg);}
}
</style>
</head>

<body>

<img id="bgLogo">

<div id="login">
  <div class="loginBox">
    <h2>Evento</h2>
    <input id="eventInput">
    <button onclick="loginEvent()">Entrar</button>
  </div>
</div>

<div id="app">

<div id="eventName"></div>

<div id="photoBox">
  <img id="photoImg">
  <div id="photoUser"></div>
  <div id="deleteBtn">✖</div>
</div>

<div id="ranking"></div>
<div id="qrBox"><canvas id="qr"></canvas></div>
<button id="sortBtn">🎁 Sorteo</button>

<div id="winnerOverlay"><div id="winnerText"></div></div>
<div id="newPhotoAlert"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<script>
let selectedEvent=null;
let photos=[];
let photoIndex=0;
let currentPhoto=null;
let lastPhotoCount=0;

async function loginEvent(){

 const name=document.getElementById("eventInput").value.toLowerCase();
 const res=await fetch("/events");
 const events=await res.json();

 const ev=events.find(e=>e.name.toLowerCase()===name);
 if(!ev)return;

 selectedEvent=ev;

 document.getElementById("login").style.display="none";
 document.getElementById("app").style.display="block";

 document.getElementById("eventName").innerText=ev.name;

 /* 🔥 FIX LOGO */
 if(ev.background){
   document.getElementById("bgLogo").src = ev.background;
 }

 QRCode.toCanvas(
   document.getElementById("qr"),
   window.location.origin + "/?event=" + ev.name
 );

 loadPhotos();
 loadRanking();

 setInterval(loadPhotos,4000);
 setInterval(rotatePhotos,5000);
 setInterval(loadRanking,5000);
}
</script>

</body>
</html>
