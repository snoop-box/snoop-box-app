<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>DJ Screen</title>

<style>
body{
  margin:0;
  overflow:hidden;
  font-family:Arial;
  background:#000 center center/cover no-repeat;
  color:white;
}

#overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.45);
}

#eventName{
  position:absolute;
  top:20px;
  left:30px;
  font-size:42px;
  font-weight:bold;
  z-index:2;
}

#photoBox{
  position:absolute;
  top:110px;
  left:50%;
  transform:translateX(-50%);
  width:60vw;
  height:60vh;
  border-radius:20px;
  overflow:hidden;
  z-index:2;
  box-shadow:0 0 25px rgba(255,255,255,.15);
}

#photoBox img{
  width:100%;
  height:100%;
  object-fit:cover;
}

#ranking{
  position:absolute;
  right:30px;
  top:120px;
  width:260px;
  background:rgba(0,0,0,.55);
  padding:18px;
  border-radius:18px;
  z-index:2;
}

#ranking h2{
  margin-top:0;
  font-size:24px;
}

.rankItem{
  padding:8px 0;
  border-bottom:1px solid rgba(255,255,255,.1);
}

#qrBox{
  position:absolute;
  left:30px;
  bottom:30px;
  background:rgba(0,0,0,.55);
  padding:18px;
  border-radius:18px;
  z-index:2;
  text-align:center;
}

#sortBtn{
  position:absolute;
  right:30px;
  bottom:30px;
  z-index:2;
  background:#ff0055;
  border:none;
  color:white;
  padding:18px 26px;
  font-size:22px;
  border-radius:16px;
  cursor:pointer;
}

#sortWinner{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.88);
  display:none;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  z-index:10;
  font-size:64px;
  font-weight:bold;
}

#sortWinner small{
  font-size:28px;
  margin-bottom:20px;
}
</style>
</head>
<body>

<div id="overlay"></div>

<div id="eventName">Cargando...</div>

<div id="photoBox">
  <img id="mainPhoto" src="https://picsum.photos/1200/800?1">
</div>

<div id="ranking">
  <h2>🏆 Ranking</h2>
  <div class="rankItem">Mesa 1 - 120 pts</div>
  <div class="rankItem">Mesa 4 - 110 pts</div>
  <div class="rankItem">Mesa 2 - 95 pts</div>
</div>

<div id="qrBox">
  <div>Escaneá y participá</div>
  <canvas id="qr"></canvas>
</div>

<button id="sortBtn">🎁 Sorteo</button>

<div id="sortWinner">
  <small>GANADOR</small>
  <div id="winnerName">JUAN</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<script>

let photos = [];
let photoIndex = 0;

// cargar evento
async function loadEvent(){

  const res = await fetch("/event");
  const ev = await res.json();

  document.getElementById("eventName").innerText =
    ev.name || "Evento";

  if(ev.background){
    document.body.style.backgroundImage =
      `url('${ev.background}')`;
  }

  QRCode.toCanvas(
    document.getElementById("qr"),
    window.location.origin,
    { width:160 }
  );

}

// cargar fotos
async function loadPhotos(){

  const res = await fetch("/photos");
  photos = await res.json();

}

function rotatePhotos(){

  if(!photos.length) return;

  photoIndex++;

  if(photoIndex >= photos.length){
    photoIndex = 0;
  }

  document.getElementById("mainPhoto").src =
    photos[photoIndex].image;

}

// sorteo base
async function runSort(){

  const res = await fetch("/guests");
  const guests = await res.json();

  if(!guests.length) return;

  const random =
    guests[Math.floor(Math.random()*guests.length)];

  document.getElementById("winnerName").innerText =
    random.name.toUpperCase();

  const box = document.getElementById("sortWinner");
  box.style.display = "flex";

  setTimeout(()=>{
    box.style.display = "none";
  },4000);

}

document.getElementById("sortBtn")
.addEventListener("click",runSort);

loadEvent();
loadPhotos();

setInterval(loadPhotos,5000);
setInterval(rotatePhotos,4000);

</script>

</body>
</html>
