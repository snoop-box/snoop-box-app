<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Snoop Box DJ</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial;
  overflow: hidden;
  color: white;
}

/* FONDO */
#bg {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  background-size: cover;
  background-position: center;
  z-index: -1;
  filter: brightness(0.6);
}

/* LOGIN */
#login {
  position: absolute;
  width: 100%;
  height: 100%;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  background: black;
}

input, button {
  padding: 15px;
  font-size: 18px;
  border-radius: 10px;
  border: none;
  margin: 10px;
}

button {
  background: #ff0055;
  color: white;
}

/* APP */
#app { display:none; }

/* SLIDES */
#viewer {
  position:absolute;
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
}

.slide {
  position:absolute;
  max-width:75%;
  max-height:75%;
  object-fit:contain;
  opacity:0;
  transform:translateX(200px) scale(0.8);
  transition: all 0.8s ease;
}

.slide.active {
  opacity:1;
  transform:translateX(0) scale(1);
}

/* NOMBRE */
#name {
  position:absolute;
  bottom:140px;
  width:100%;
  text-align:center;
  font-size:36px;
  font-weight:bold;
}

/* QR GRANDE */
#qrBox {
  position:absolute;
  bottom:20px;
  left:20px;
  background:white;
  padding:15px;
  border-radius:16px;
  text-align:center;
  color:black;
}

#qrBox img {
  width:160px;
}

#qrText {
  font-size:16px;
  margin-top:5px;
}

/* RANKING PRO */
#rankingBox {
  position:absolute;
  top:20px;
  right:20px;
  background: rgba(0,0,0,0.8);
  padding:20px;
  border-radius:16px;
  font-size:26px;
  border: 3px solid gold;
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0% { box-shadow:0 0 10px gold; }
  50% { box-shadow:0 0 25px gold; }
  100% { box-shadow:0 0 10px gold; }
}

/* NUEVA FOTO */
#newBadge {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(0);
  background:#00ff88;
  color:black;
  padding:20px 40px;
  font-size:40px;
  border-radius:20px;
  font-weight:bold;
  opacity:0;
  transition: all 0.5s ease;
}

#newBadge.show {
  transform:translate(-50%,-50%) scale(1);
  opacity:1;
}
</style>
</head>

<body>

<div id="bg"></div>

<!-- LOGIN -->
<div id="login">
  <h2>Ingresar evento</h2>
  <input id="eventInput" placeholder="Ej: olivia2">
  <input id="bgInput" placeholder="URL imagen fondo (opcional)">
  <button onclick="start()">Entrar</button>
</div>

<!-- APP -->
<div id="app">

  <div id="viewer"></div>
  <div id="name"></div>

  <div id="rankingBox"></div>

  <div id="qrBox">
    <img id="qrImg">
    <div id="qrText">Escaneá y subí tus fotos 📸</div>
  </div>

  <div id="newBadge">📸 Nueva foto</div>

</div>

<script>

let eventId = "";
let photos = [];
let index = 0;
let lastCount = 0;

// START
function start() {
  eventId = document.getElementById("eventInput").value.trim();
  const bgUrl = document.getElementById("bgInput").value.trim();

  if (!eventId) return alert("Ingresá un evento");

  document.getElementById("login").style.display = "none";
  document.getElementById("app").style.display = "block";

  if (bgUrl) {
    document.getElementById("bg").style.backgroundImage = `url(${bgUrl})`;
  }

  // QR
  const link = location.origin + "/?event=" + eventId;
  document.getElementById("qrImg").src =
    "https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=" + encodeURIComponent(link);

  load();
  loadRanking();

  setInterval(load,4000);
  setInterval(loadRanking,4000);
  setInterval(nextSlide,3000);
}

// LOAD PHOTOS
async function load() {
  const res = await fetch("/photos/" + eventId);
  const newPhotos = await res.json();

  if (newPhotos.length > lastCount) {
    showNew();
  }

  lastCount = newPhotos.length;
  photos = newPhotos;
}

// SLIDE
function nextSlide() {
  if (photos.length === 0) return;

  const viewer = document.getElementById("viewer");
  const name = document.getElementById("name");

  viewer.innerHTML = "";

  const p = photos[index];

  const img = document.createElement("img");
  img.src = p.url;
  img.className = "slide";

  viewer.appendChild(img);

  setTimeout(()=> img.classList.add("active"), 50);

  name.innerText = p.name;

  index++;
  if (index >= photos.length) index = 0;
}

// RANKING
async function loadRanking() {
  const res = await fetch("/ranking/" + eventId);
  const data = await res.json();

  let html = "🏆 Ranking<br>";
  data.slice(0,3).forEach((r,i)=>{
    html += `${i+1}. Mesa ${r.table} (${r.points})<br>`;
  });

  document.getElementById("rankingBox").innerHTML = html;
}

// NUEVA FOTO
function showNew() {
  const badge = document.getElementById("newBadge");
  badge.classList.add("show");

  setTimeout(()=>{
    badge.classList.remove("show");
  },2000);
}

</script>

</body>
</html>
