<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>DJ Screen PRO</title>

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  overflow:hidden;
  background:#000 center center/cover no-repeat;
  color:#fff;
}

#login{
  position:fixed;
  inset:0;
  background:#111;
  display:flex;
  justify-content:center;
  align-items:center;
}

.loginBox{
  width:420px;
  background:#1c1c1c;
  padding:30px;
  border-radius:22px;
  text-align:center;
}

input{
  width:100%;
  padding:15px;
  border:none;
  border-radius:12px;
  margin:10px 0;
  box-sizing:border-box;
}

button{
  border:none;
  border-radius:14px;
  cursor:pointer;
}

#app{
  display:none;
}

#overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.38);
}

#eventName{
  position:absolute;
  top:24px;
  left:30px;
  font-size:46px;
  font-weight:bold;
  z-index:3;
}

#photoBox{
  position:absolute;
  top:110px;
  left:50%;
  transform:translateX(-50%);
  width:58vw;
  height:58vh;
  border-radius:22px;
  overflow:hidden;
  display:none;
  z-index:3;
  box-shadow:0 20px 45px rgba(0,0,0,.45);
}

#photoBox img{
  width:100%;
  height:100%;
  object-fit:cover;
}

#photoUser{
  position:absolute;
  left:0;
  right:0;
  bottom:0;
  background:rgba(0,0,0,.55);
  padding:14px;
  font-size:28px;
  text-align:center;
}

#ranking{
  position:absolute;
  right:30px;
  top:120px;
  width:280px;
  background:rgba(0,0,0,.48);
  padding:18px;
  border-radius:22px;
  z-index:3;
}

#ranking h2{
  margin-top:0;
  text-align:center;
}

.rankRow{
  display:flex;
  justify-content:space-between;
  padding:12px;
  border-radius:14px;
  background:rgba(255,255,255,.06);
  margin-bottom:10px;
  font-size:20px;
}

.gold{border:1px solid gold;}
.silver{border:1px solid silver;}
.bronze{border:1px solid #cd7f32;}

#qrBox{
  position:absolute;
  left:30px;
  bottom:30px;
  background:rgba(0,0,0,.45);
  padding:16px;
  border-radius:18px;
  z-index:3;
  text-align:center;
}

#sortBtn{
  position:absolute;
  right:30px;
  bottom:30px;
  background:#ff0055;
  color:#fff;
  padding:16px 26px;
  font-size:24px;
  z-index:3;
}

#newPhotoAlert{
  position:fixed;
  top:28px;
  left:50%;
  transform:translateX(-50%);
  background:#ff0055;
  padding:16px 28px;
  border-radius:16px;
  font-size:28px;
  display:none;
  z-index:10;
}

#winnerBox{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.88);
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:50;
  font-size:64px;
  font-weight:bold;
}
</style>
</head>
<body>

<!-- LOGIN -->

<div id="login">

<div class="loginBox">

<h1>DJ Screen</h1>

<input
type="text"
id="eventInput"
placeholder="Nombre del evento">

<button
onclick="loginEvent()"
style="width:100%;padding:15px;background:#ff0055;color:#fff;font-size:18px;">
Entrar
</button>

<div id="status"></div>

</div>

</div>

<!-- APP -->

<div id="app">

<div id="overlay"></div>

<div id="eventName"></div>

<div id="photoBox">
<img id="photoImg">
<div id="photoUser"></div>
</div>

<div id="ranking">
<h2>🏆 Ranking</h2>
<div id="rankingBox"></div>
</div>

<div id="qrBox">
<div style="margin-bottom:8px;">
Escaneá y participá
</div>
<canvas id="qr"></canvas>
</div>

<button id="sortBtn"
onclick="runDraw()">
🎁 Sorteo
</button>

<div id="newPhotoAlert">
📸 Nueva foto subida
</div>

</div>

<div id="winnerBox"></div>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<script>

let selectedEvent = null;
let photos = [];
let photoIndex = 0;
let lastCount = 0;

/* ===================== */

async function loginEvent(){

 const name =
 eventInput.value.trim()
 .toLowerCase();

 const res =
 await fetch("/events");

 const events =
 await res.json();

 const found =
 events.find(ev =>
 ev.name.toLowerCase() === name
 );

 if(!found){

  status.innerText =
  "Evento no encontrado";

  return;

 }

 selectedEvent = found;

 login.style.display =
 "none";

 app.style.display =
 "block";

 eventName.innerText =
 selectedEvent.name;

 if(selectedEvent.background){

  document.body.style.backgroundImage =
  `url('${selectedEvent.background}')`;

 }

 const qrLink =
 location.origin +
 "/?event=" +
 encodeURIComponent(
 selectedEvent.name
 );

 QRCode.toCanvas(
 qr,
 qrLink,
 {width:170}
 );

 loadPhotos();
 loadRanking();

 setInterval(loadPhotos,4000);
 setInterval(loadRanking,5000);
 setInterval(rotatePhotos,6000);

}

/* ===================== */

async function loadPhotos(){

 const res =
 await fetch(
 "/photos/" +
 encodeURIComponent(
 selectedEvent.name
 ));

 const data =
 await res.json();

 if(data.length > lastCount){

  showAlert();

 }

 lastCount =
 data.length;

 photos =
 data;

}

/* ===================== */

function rotatePhotos(){

 if(!photos.length) return;

 photoBox.style.display =
 "block";

 if(photoIndex >= photos.length){

  photoIndex = 0;

 }

 const p =
 photos[photoIndex];

 const img =
 p.url || p.image;

 photoImg.src = img;

 photoUser.innerText =
 (p.user || "Invitado") +
 " • Mesa " +
 (p.table || "-");

 photoIndex++;

}

/* ===================== */

function showAlert(){

 newPhotoAlert.style.display =
 "block";

 setTimeout(()=>{

  newPhotoAlert.style.display =
  "none";

 },2500);

}

/* ===================== */

async function loadRanking(){

 const res =
 await fetch(
 "/ranking/" +
 encodeURIComponent(
 selectedEvent.name
 ));

 const data =
 await res.json();

 rankingBox.innerHTML =
 "";

 data.slice(0,5)
 .forEach((r,i)=>{

 let cls="";

 if(i===0) cls="gold";
 if(i===1) cls="silver";
 if(i===2) cls="bronze";

 rankingBox.innerHTML += `
 <div class="rankRow ${cls}">
  <div>${i+1}. Mesa ${r.table}</div>
  <div>${r.points||0}</div>
 </div>
 `;

 });

}

/* ===================== */

function runDraw(){

 if(!photos.length){

  alert(
   "Todavía no hay participantes"
  );

  return;

 }

 const random =
 photos[
 Math.floor(
 Math.random() *
 photos.length
 )];

 winnerBox.innerHTML = `
 <div>🎉 GANADOR 🎉</div>
 <div style="font-size:72px;margin-top:20px;">
 ${random.user || "Invitado"}
 </div>
 <div style="font-size:44px;margin-top:10px;">
 Mesa ${random.table || "-"}
 </div>
 <div style="font-size:22px;margin-top:30px;">
 Tocá para cerrar
 </div>
 `;

 winnerBox.style.display =
 "flex";

 winnerBox.onclick =
 ()=>{
  winnerBox.style.display =
  "none";
 };

}

</script>

</body>
</html>
