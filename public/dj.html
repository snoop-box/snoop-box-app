<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>DJ Screen</title>

<style>
body{
  margin:0;
  background:#000;
  color:#fff;
  font-family:Arial;
  overflow:hidden;
}

#login{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#111;
}

.loginBox{
  width:420px;
  background:#1d1d1d;
  padding:30px;
  border-radius:18px;
  text-align:center;
}

input{
  width:100%;
  padding:15px;
  border:none;
  border-radius:10px;
  margin:10px 0;
  box-sizing:border-box;
}

button{
  width:100%;
  padding:15px;
  border:none;
  border-radius:12px;
  background:#ff0055;
  color:white;
  font-size:18px;
  cursor:pointer;
}

#status{
  margin-top:12px;
}

#app{
  display:none;
}

#eventName{
  position:absolute;
  top:20px;
  left:30px;
  font-size:42px;
  font-weight:bold;
}

#photoBox{
  position:absolute;
  top:110px;
  left:50%;
  transform:translateX(-50%);
  width:60vw;
  height:60vh;
  background:#111;
  border-radius:20px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:30px;
}

#ranking{
  position:absolute;
  right:30px;
  top:120px;
  width:250px;
  background:rgba(0,0,0,.5);
  padding:18px;
  border-radius:16px;
}

#qrBox{
  position:absolute;
  left:30px;
  bottom:30px;
  background:rgba(0,0,0,.5);
  padding:16px;
  border-radius:16px;
}

#sortBtn{
  position:absolute;
  right:30px;
  bottom:30px;
  background:#ff0055;
  border:none;
  color:white;
  padding:18px 24px;
  border-radius:14px;
  font-size:22px;
}
</style>
</head>
<body>

<div id="login">
  <div class="loginBox">
    <h1>Ingresar Evento</h1>
    <input type="text" id="eventInput" placeholder="Nombre del evento">
    <button onclick="loginEvent()">Entrar</button>
    <div id="status"></div>
  </div>
</div>

<div id="app">

<div id="eventName"></div>

<div id="photoBox">
  📸 Esperando fotos...
</div>

<div id="ranking">
<h2>🏆 Ranking</h2>
Mesa 1<br>
Mesa 2<br>
Mesa 3
</div>

<div id="qrBox">
<div>Escaneá y participá</div>
<canvas id="qr"></canvas>
</div>

<button id="sortBtn">🎁 Sorteo</button>

</div>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<script>

let selectedEvent = null;

async function loginEvent(){

  const name =
    document.getElementById("eventInput")
    .value.trim()
    .toLowerCase();

  const status =
    document.getElementById("status");

  status.innerText = "Buscando...";

  const res = await fetch("/events");
  const events = await res.json();

  const found = events.find(ev =>
    ev.name.toLowerCase() === name
  );

  if(!found){
    status.innerText = "Evento no encontrado";
    return;
  }

  selectedEvent = found;

  startDJ();

}

function startDJ(){

  document.getElementById("login").style.display="none";
  document.getElementById("app").style.display="block";

  document.getElementById("eventName").innerText =
    selectedEvent.name;

  if(selectedEvent.background){
    document.body.style.backgroundImage =
      `url('${selectedEvent.background}')`;
    document.body.style.backgroundSize = "cover";
  }

  QRCode.toCanvas(
    document.getElementById("qr"),
    window.location.origin,
    { width:160 }
  );

}

</script>

</body>
</html>
