<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>DJ PRO FINAL</title>

<style>
body{
  margin:0;
  font-family:Arial;
  overflow:hidden;
  background:#000;
  background-position:center center;
  background-size:cover;
  background-repeat:no-repeat;
  color:white;
}

/* LOGIN */
#login{
  position:fixed;
  inset:0;
  background:#111;
  display:flex;
  align-items:center;
  justify-content:center;
}

.loginBox{
  width:420px;
  background:#1d1d1d;
  padding:30px;
  border-radius:18px;
  text-align:center;
}

input{
  width:100%;
  padding:15px;
  border:none;
  border-radius:10px;
  margin:10px 0;
}

button{
  border:none;
  border-radius:12px;
  cursor:pointer;
}

/* APP */
#app{display:none;}

#overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.35);
}

#eventName{
  position:absolute;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  font-size:44px;
  font-weight:bold;
}

/* FOTO */
#photoBox{
  position:absolute;
  top:110px;
  left:50%;
  transform:translateX(-50%);
  border-radius:20px;
  overflow:hidden;
  display:none;
  background:rgba(255,255,255,.5);
  backdrop-filter:blur(10px);
  transition:.5s;
}

#photoImg{
  width:100%;
  height:100%;
  object-fit:contain;
  transition:.5s;
}

.fadeOut{opacity:0; transform:scale(.95);}
.fadeIn{opacity:1; transform:scale(1);}

#photoUser{
  position:absolute;
  bottom:0;
  left:0;
  right:0;
  background:rgba(0,0,0,.6);
  padding:14px;
  text-align:center;
}

/* DELETE */
#deleteBtn{
  position:absolute;
  top:10px;
  right:10px;
  width:36px;
  height:36px;
  border-radius:50%;
  background:rgba(0,0,0,.6);
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}

/* RANKING WOW */
#ranking{
  position:absolute;
  right:30px;
  top:120px;
  width:260px;
  background:rgba(0,0,0,.45);
  padding:18px;
  border-radius:18px;
  animation:fadeInUp .8s ease;
}

.rankItem{
  margin:6px 0;
  padding:6px;
  border-radius:8px;
  transition:.3s;
}

.rankItem:hover{
  background:rgba(255,255,255,.1);
  transform:scale(1.05);
}

@keyframes fadeInUp{
  from{transform:translateY(30px); opacity:0;}
  to{transform:translateY(0); opacity:1;}
}

/* QR */
#qrBox{
  position:absolute;
  left:30px;
  bottom:30px;
}

/* SORTEO */
#sortBtn{
  position:absolute;
  right:30px;
  bottom:30px;
  background:#ff0055;
  color:white;
  padding:16px 24px;
  font-size:22px;
}

/* GANADOR */
#winnerOverlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.85);
  display:none;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  z-index:20;
}

#winnerText{
  font-size:60px;
  text-align:center;
  animation:pop .6s ease;
}

@keyframes pop{
  from{transform:scale(.6);opacity:0;}
  to{transform:scale(1);opacity:1;}
}

/* CONFETTI */
.confetti{
  position:fixed;
  width:10px;
  height:10px;
  top:-10px;
  animation:fall linear forwards;
}

@keyframes fall{
  to{transform:translateY(100vh) rotate(720deg);}
}
</style>
</head>

<body>

<div id="login">
  <div class="loginBox">
    <h1>DJ</h1>
    <input id="eventInput" placeholder="Evento">
    <button onclick="loginEvent()">Entrar</button>
    <div id="status"></div>
  </div>
</div>

<div id="app">

<div id="overlay"></div>
<div id="eventName"></div>

<div id="photoBox">
  <img id="photoImg">
  <div id="photoUser"></div>
  <div id="deleteBtn">✖</div>
</div>

<div id="ranking"></div>

<div id="qrBox">
<canvas id="qr"></canvas>
</div>

<button id="sortBtn">🎁 Sorteo</button>

<div id="winnerOverlay">
  <div id="winnerText"></div>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<script>

let selectedEvent=null;
let photos=[];
let photoIndex=0;
let currentPhoto=null;

/* LOGIN */
async function loginEvent(){

 const name=document.getElementById("eventInput").value.toLowerCase();

 const res=await fetch("/events");
 const events=await res.json();

 const ev=events.find(e=>e.name.toLowerCase()===name);

 if(!ev){
  document.getElementById("status").innerText="No existe";
  return;
 }

 selectedEvent=ev;

 document.getElementById("login").style.display="none";
 document.getElementById("app").style.display="block";

 document.getElementById("eventName").innerText=ev.name;

 if(ev.background){
  document.body.style.backgroundImage=`url('${ev.background}')`;
 }

 QRCode.toCanvas(document.getElementById("qr"), window.location.origin);

 loadPhotos();
 loadRanking();

 setInterval(loadPhotos,4000);
 setInterval(rotatePhotos,5000);
 setInterval(loadRanking,5000);
}

/* FOTOS */
async function loadPhotos(){
 const res=await fetch("/photos/"+selectedEvent.name);
 photos=await res.json();
}

function rotatePhotos(){

 if(!photos.length) return;

 if(photoIndex>=photos.length){
  photoIndex=0;
 }

 showPhoto(photos[photoIndex]);
 photoIndex++;
}

function showPhoto(p){

 currentPhoto=p;

 const img=document.getElementById("photoImg");

 img.classList.remove("fadeIn");
 img.classList.add("fadeOut");

 setTimeout(()=>{

  const box=document.getElementById("photoBox");

  document.getElementById("photoUser").innerText=p.user+" • Mesa "+p.table;

  img.src=p.url;

  img.onload=()=>{
    const ratio=img.naturalWidth/img.naturalHeight;

    if(ratio>1.2){
      box.style.width="50vw";
      box.style.height="45vh";
    }else if(ratio<0.8){
      box.style.width="28vw";
      box.style.height="60vh";
    }else{
      box.style.width="38vw";
      box.style.height="50vh";
    }

    box.style.display="block";

    img.classList.remove("fadeOut");
    img.classList.add("fadeIn");
  };

 },300);
}

/* DELETE FIX */
document.getElementById("deleteBtn").onclick=async()=>{

 if(!currentPhoto) return;

 await fetch("/photo",{
  method:"DELETE",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({url:currentPhoto.url})
 });

 photos = photos.filter(p=>p.url!==currentPhoto.url);

 currentPhoto=null;
 photoIndex=0;

 document.getElementById("photoBox").style.display="none";
};

/* RANKING */
async function loadRanking(){

 const res=await fetch("/ranking/"+selectedEvent.name);
 const data=await res.json();

 let html="<h2>🏆 Ranking</h2>";

 data.slice(0,5).forEach((g,i)=>{
   html+=`<div class="rankItem">${i+1}. Mesa ${g.table} (${g.points})</div>`;
 });

 document.getElementById("ranking").innerHTML=html;
}

/* SORTEO WOW */
document.getElementById("sortBtn").onclick=()=>{

 if(!photos.length) return;

 let cycles=0;

 const interval=setInterval(()=>{

   const random=photos[Math.floor(Math.random()*photos.length)];
   showPhoto(random);

   cycles++;

   if(cycles>30){
     clearInterval(interval);

     const winner=photos[Math.floor(Math.random()*photos.length)];

     showPhoto(winner);
     showWinner(winner);
     launchConfetti();
   }

 },80);
};

/* WINNER */
function showWinner(w){

 const overlay=document.getElementById("winnerOverlay");
 const text=document.getElementById("winnerText");

 text.innerHTML=`🎉 ${w.user}<br>Mesa ${w.table}`;

 overlay.style.display="flex";

 setTimeout(()=>{
   overlay.style.display="none";
 },4000);
}

/* CONFETTI */
function launchConfetti(){

 for(let i=0;i<80;i++){

   const div=document.createElement("div");
   div.className="confetti";

   div.style.left=Math.random()*100+"vw";
   div.style.background=`hsl(${Math.random()*360},100%,50%)`;
   div.style.animationDuration=(Math.random()*2+2)+"s";

   document.body.appendChild(div);

   setTimeout(()=>div.remove(),4000);
 }
}

</script>

</body>
</html>
