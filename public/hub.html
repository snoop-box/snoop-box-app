<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Snoop Box Hub</title>

<style>

body{
  margin:0;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:Arial,sans-serif;
  background:
  linear-gradient(135deg,#0b1f5e,#111,#7f1d1d);
  color:white;
}

.wrap{
  width:90%;
  max-width:520px;
}

.card{
  background:rgba(255,255,255,.08);
  backdrop-filter:blur(12px);
  border-radius:24px;
  padding:28px;
  box-shadow:0 18px 40px rgba(0,0,0,.25);
}

.logo{
  text-align:center;
  font-size:42px;
  font-weight:bold;
  margin-bottom:8px;
}

.sub{
  text-align:center;
  color:#ddd;
  margin-bottom:24px;
}

input{
  width:100%;
  padding:16px;
  border:none;
  border-radius:14px;
  margin-bottom:20px;
  font-size:16px;
  box-sizing:border-box;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
}

button{
  padding:20px;
  border:none;
  border-radius:18px;
  cursor:pointer;
  font-size:18px;
  font-weight:bold;
  color:white;
  transition:.2s;
}

button:hover{
  transform:scale(1.03);
}

.recepcion{
  background:#ff0055;
}

.control{
  background:#7b1fa2;
}

.totem{
  background:#00897b;
}

.dj{
  background:#ff6f00;
}

.footer{
  text-align:center;
  margin-top:18px;
  color:#bbb;
  font-size:13px;
}

</style>
</head>

<body>

<div class="wrap">

<div class="card">

<div class="logo">
🎉 SNOOP BOX
</div>

<div class="sub">
Panel de acceso rápido
</div>

<input
id="eventInput"
placeholder="Nombre del evento">

<div class="grid">

<button
class="recepcion"
onclick="go('recepcion')">
🎟 Recepción
</button>

<button
class="control"
onclick="go('control')">
📊 Control
</button>

<button
class="totem"
onclick="go('totem')">
📸 Tótem
</button>

<button
class="dj"
onclick="go('dj')">
🎧 DJ
</button>

</div>

<div class="footer">
Snoop Box Interactive Experience
</div>

</div>

</div>

<script>

function go(type){

 const event =
 document.getElementById("eventInput")
 .value
 .trim();

 if(!event){

   alert("Ingresá un evento");
   return;

 }

 const url =
 "/" + type + ".html?event=" +
 encodeURIComponent(event);

 window.location.href = url;

}

</script>

</body>
</html>
