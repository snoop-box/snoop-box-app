<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Snoop Box</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<style>
* {
  box-sizing: border-box;
}

body {
  background: #111;
  color: white;
  font-family: Arial;
  text-align: center;
  margin: 0;
  padding: 20px;
}

.container {
  max-width: 400px;
  margin: auto;
}

input, button {
  padding: 15px;
  margin: 8px 0;
  width: 100%;
  border-radius: 10px;
  border: none;
  font-size: 16px;
}

button {
  background: #ff0055;
  color: white;
}

.hidden {
  display: none;
}

img {
  width: 100%;
  border-radius: 10px;
  margin-top: 10px;
}

/* Botón tipo grande */
.big-button {
  font-size: 18px;
  padding: 18px;
}
</style>
</head>

<body>

<div class="container">

<!-- LOGIN -->
<div id="login">
<h2>Ingresar</h2>
<input id="name" placeholder="Apodo">
<input id="table" placeholder="Mesa">
<button onclick="enterApp()">Entrar</button>
</div>

<!-- MENU -->
<div id="menu" class="hidden">
<h3 id="welcome"></h3>

<button class="big-button" onclick="show('upload')">📸 Sacar foto</button>
<button class="big-button" onclick="show('gallery')">🖼 Ver fotos</button>
</div>

<!-- SUBIR FOTO -->
<div id="upload" class="hidden">
<h3>Sacar foto</h3>

<input type="file" id="file" accept="image/*" capture="environment" style="display:none" onchange="previewImage()">

<button class="big-button" onclick="openCamera()">📸 Abrir cámara</button>

<div id="previewContainer"></div>

<button onclick="sendPhoto()">Subir</button>
<button onclick="back()">Volver</button>
</div>

<!-- GALERIA -->
<div id="gallery" class="hidden">
<h3>Galería</h3>
<div id="photos"></div>
<button onclick="back()">Volver</button>
</div>

</div>

<script>
let user = {};

function enterApp() {
  const name = document.getElementById("name").value;
  const table = document.getElementById("table").value;

  if (!name || !table) return alert("Completá");

  user = { name, table };

  login.classList.add("hidden");
  menu.classList.remove("hidden");

  welcome.innerText = name + " - Mesa " + table;
}

function show(sec) {
  menu.classList.add("hidden");
  document.getElementById(sec).classList.remove("hidden");

  if (sec === "gallery") loadGallery();
}

function back() {
  upload.classList.add("hidden");
  gallery.classList.add("hidden");
  menu.classList.remove("hidden");
}

// Abrir cámara desde botón
function openCamera() {
  document.getElementById("file").click();
}

function previewImage() {
  const file = document.getElementById("file").files[0];
  if (!file) return;

  const reader = new FileReader();

  reader.onload = function(e) {
    const img = document.createElement("img");
    img.src = e.target.result;

    const container = document.getElementById("previewContainer");
    container.innerHTML = "";
    container.appendChild(img);
  };

  reader.readAsDataURL(file);
}

async function sendPhoto() {
  const file = document.getElementById("file").files[0];
  if (!file) return;

  const formData = new FormData();
  formData.append("photo", file);

  await fetch("/upload", {
    method: "POST",
    body: formData
  });

  // limpiar
  document.getElementById("previewContainer").innerHTML = "";
  document.getElementById("file").value = "";

  // volver directo al menú
  back();
}

async function loadGallery() {
  const res = await fetch("/photos");
  const data = await res.json();

  const container = document.getElementById("photos");
  container.innerHTML = "";

  data.forEach(url => {
    const img = document.createElement("img");
    img.src = url;
    container.appendChild(img);
  });
}
</script>

</body>
</html>
