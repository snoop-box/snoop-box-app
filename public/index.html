<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Snoop Box</title>

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  min-height:100vh;
  color:#fff;
  background:linear-gradient(135deg,#0b1f5e,#111,#7f1d1d);
}

.wrap{
  max-width:520px;
  margin:auto;
  padding:24px;
}

.card{
  background:rgba(255,255,255,.08);
  backdrop-filter:blur(10px);
  border-radius:22px;
  padding:22px;
  box-shadow:0 18px 40px rgba(0,0,0,.25);
  margin-bottom:18px;
}

.center{text-align:center;}

#eventTitle,#eventTitleApp{
  font-size:34px;
  font-weight:bold;
  margin-bottom:8px;
}

input,select{
  width:100%;
  padding:15px;
  margin:8px 0;
  border:none;
  border-radius:14px;
  font-size:16px;
  box-sizing:border-box;
}

button{
  width:100%;
  padding:16px;
  margin-top:10px;
  border:none;
  border-radius:14px;
  font-size:17px;
  cursor:pointer;
}

.primary{background:#ff0055;color:#fff;}
.dark{background:#263238;color:#fff;}

#login,#app{display:none;}

.badge{
  display:inline-block;
  padding:8px 12px;
  border-radius:30px;
  background:rgba(255,255,255,.08);
  margin-top:8px;
  font-size:14px;
}

#photoInput{display:none;}
#status{margin-top:12px;font-size:14px;}

.rankRow{
  display:flex;
  justify-content:space-between;
  padding:12px;
  margin-top:8px;
  border-radius:12px;
  background:rgba(255,255,255,.06);
}

.small{
  color:#ddd;
  font-size:14px;
}
</style>
</head>
<body>

<div class="wrap">

<!-- LOGIN -->

<div class="card" id="login">

<div class="center">
<div id="eventTitle">Evento</div>
</div>

<input id="nameInput" placeholder="Tu nombre">

<select id="tableInput">
<option value="">Seleccioná tu mesa</option>
</select>

<button class="primary" onclick="enterApp()">
Ingresar
</button>

</div>

<!-- APP -->

<div id="app">

<div class="card">

<div class="center">
<div id="eventTitleApp"></div>
<div class="badge" id="userInfo"></div>
</div>

<button class="primary" onclick="openCamera()">
📸 Subir Foto
</button>

<button class="dark"
onclick="alert('Trivia próxima etapa')">
🎮 Trivia
</button>

<input
type="file"
accept="image/*"
capture="environment"
id="photoInput"
onchange="uploadPhoto(event)">

<div id="status"></div>

</div>

<!-- RANKING -->

<div class="card">

<div class="center">
<h2>🏆 Ranking Mesas</h2>
<div class="small">
Actualización automática
</div>
</div>

<div id="rankingBox"></div>

</div>

</div>

</div>

<script>

let eventName="";
let eventData=null;
let user=null;

async function init(){

 const params=
 new URLSearchParams(location.search);

 eventName=
 params.get("event")||"";

 if(!eventName)return;

 const res=
 await fetch("/event/"+encodeURIComponent(eventName));

 const data=
 await res.json();

 if(!data.success)return;

 eventData=data.event;

 const qrName=params.get("name");
 const qrTable=params.get("table");

 if(qrName && qrTable){

   user={
    name:qrName,
    table:qrTable
   };

   localStorage.setItem(
   "snoop_"+eventName,
   JSON.stringify(user));

   showApp();
   return;
 }

 renderLogin();

}

function renderLogin(){

 login.style.display="block";
 app.style.display="none";

 eventTitle.innerText=
 eventData.name;

 buildTables();

 const saved=
 localStorage.getItem(
 "snoop_"+eventName);

 if(saved){

  user=JSON.parse(saved);
  showApp();

 }

}

function buildTables(){

 for(let i=1;i<=40;i++){

  const n=
  String(i).padStart(2,"0");

  tableInput.innerHTML+=
  `<option value="${n}">
   Mesa ${n}
   </option>`;
 }

}

function enterApp(){

 const name=
 nameInput.value.trim();

 const table=
 tableInput.value;

 if(!name || !table)return;

 user={name,table};

 localStorage.setItem(
 "snoop_"+eventName,
 JSON.stringify(user));

 showApp();

}

function showApp(){

 login.style.display="none";
 app.style.display="block";

 eventTitleApp.innerText=
 eventData.name;

 userInfo.innerText=
 user.name+
 " • Mesa "+
 user.table;

 loadRanking();

}

function openCamera(){
 photoInput.click();
}

function uploadPhoto(e){

 const file=e.target.files[0];
 if(!file)return;

 status.innerText=
 "Subiendo foto...";

 const reader=
 new FileReader();

 reader.onload=
 async function(ev){

  await fetch("/upload-photo",{
   method:"POST",
   headers:{
    "Content-Type":"application/json"
   },
   body:JSON.stringify({
    eventName:eventName,
    user:user.name,
    image:ev.target.result
   })
  });

  status.innerText=
  "✅ Foto subida";

  loadRanking();

  setTimeout(()=>{
   status.innerText="";
  },2500);

 };

 reader.readAsDataURL(file);

}

async function loadRanking(){

 const res=
 await fetch("/ranking/"+encodeURIComponent(eventName));

 const data=
 await res.json();

 rankingBox.innerHTML="";

 if(!data.length){

  rankingBox.innerHTML=
  "Sin puntos todavía";

  return;
 }

 data.slice(0,5).forEach((r,i)=>{

 rankingBox.innerHTML+=`
 <div class="rankRow">
   <div>${i+1}. Mesa ${r.table}</div>
   <div>${r.points||0} pts</div>
 </div>
 `;

 });

}

setInterval(()=>{
 if(app.style.display==="block"){
  loadRanking();
 }
},5000);

init();

</script>
</body>
</html>
