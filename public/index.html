<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Snoop Box</title>

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  min-height:100vh;
  color:#fff;
  background:linear-gradient(135deg,#0b1f5e,#111,#7f1d1d);
}

.wrap{
  max-width:520px;
  margin:auto;
  padding:24px;
}

.card{
  background:rgba(255,255,255,.08);
  backdrop-filter:blur(12px);
  border-radius:22px;
  padding:22px;
  box-shadow:0 18px 40px rgba(0,0,0,.25);
  margin-bottom:18px;
}

.center{text-align:center;}

#eventTitle,#eventTitleApp{
  font-size:34px;
  font-weight:bold;
  margin-bottom:8px;
}

.sub{
  color:#ddd;
  font-size:14px;
}

input,select{
  width:100%;
  padding:15px;
  margin:8px 0;
  border:none;
  border-radius:14px;
  font-size:16px;
  box-sizing:border-box;
}

button{
  width:100%;
  padding:16px;
  margin-top:10px;
  border:none;
  border-radius:14px;
  font-size:17px;
  cursor:pointer;
}

.primary{
  background:#ff0055;
  color:#fff;
}

.dark{
  background:#263238;
  color:#fff;
}

#login,#app{
  display:none;
}

.badge{
  display:inline-block;
  padding:8px 12px;
  border-radius:30px;
  background:rgba(255,255,255,.08);
  margin-top:8px;
  font-size:14px;
}

#photoInput{
  display:none;
}

#status{
  margin-top:12px;
  font-size:14px;
}

.podium{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:10px;
  margin-top:12px;
}

.place{
  text-align:center;
  padding:14px 8px;
  border-radius:18px;
  background:rgba(255,255,255,.06);
}

.first{
  border:2px solid gold;
  transform:scale(1.04);
}

.second{
  border:2px solid silver;
}

.third{
  border:2px solid #cd7f32;
}

.medal{
  font-size:28px;
}

.placeMesa{
  font-size:18px;
  font-weight:bold;
  margin-top:6px;
}

.placePts{
  font-size:14px;
  color:#ddd;
}

.rankRow{
  display:flex;
  justify-content:space-between;
  padding:12px;
  margin-top:8px;
  border-radius:12px;
  background:rgba(255,255,255,.06);
}

#myRank{
  margin-top:14px;
  padding:14px;
  border-radius:16px;
  background:rgba(255,0,85,.18);
  border:1px solid rgba(255,255,255,.12);
  text-align:center;
  font-weight:bold;
}

.small{
  color:#ddd;
  font-size:14px;
}
</style>
</head>
<body>

<div class="wrap">

<!-- LOGIN -->

<div class="card" id="login">

<div class="center">
<div id="eventTitle">Evento</div>
<div class="sub">Ingresá para participar</div>
</div>

<input id="nameInput" placeholder="Tu nombre">

<select id="tableInput">
<option value="">Seleccioná tu mesa</option>
</select>

<button class="primary" onclick="enterApp()">
Ingresar
</button>

</div>

<!-- APP -->

<div id="app">

<div class="card">

<div class="center">
<div id="eventTitleApp"></div>
<div class="badge" id="userInfo"></div>
</div>

<button class="primary" onclick="openCamera()">
📸 Subir Foto
</button>

<!-- 🔥 BOTÓN TRIVIA -->
<button class="dark" onclick="goTrivia()">
🎮 Trivia
</button>

<input
type="file"
accept="image/*"
capture="environment"
id="photoInput"
onchange="uploadPhoto(event)">

<div id="status"></div>

</div>

<!-- RANKING -->

<div class="card">

<div class="center">
<div style="font-size:28px;font-weight:bold;">
🏆 Ranking en Vivo
</div>
<div class="sub">
Cada foto suma puntos
</div>
</div>

<div id="podium"></div>

<div id="rankingBox"></div>

<div id="myRank"></div>

</div>

</div>

</div>

<script>

let eventName="";
let eventData=null;
let user=null;

/* ===================== */

async function init(){

 const params =
 new URLSearchParams(location.search);

 eventName =
 params.get("event") || "";

 if(!eventName) return;

 const res =
 await fetch("/event/" +
 encodeURIComponent(eventName));

 const data =
 await res.json();

 if(!data.success) return;

 eventData = data.event;

 const qrName =
 params.get("name");

 const qrTable =
 params.get("table");

 if(qrName && qrTable){

  user = {
   name:qrName,
   table:qrTable
  };

  localStorage.setItem(
   "snoop_" + eventName,
   JSON.stringify(user)
  );

  showApp();
  return;

 }

 renderLogin();

}

/* ===================== */

function renderLogin(){

 login.style.display="block";
 app.style.display="none";

 eventTitle.innerText =
 eventData.name;

 buildTables();

 const saved =
 localStorage.getItem(
 "snoop_" + eventName
 );

 if(saved){

  user =
  JSON.parse(saved);

  showApp();

 }

}

function buildTables(){

 for(let i=1;i<=40;i++){

  const n =
  String(i).padStart(2,"0");

  tableInput.innerHTML += `
  <option value="${n}">
  Mesa ${n}
  </option>`;

 }

}

function enterApp(){

 const name =
 nameInput.value.trim();

 const table =
 tableInput.value;

 if(!name || !table) return;

 user = {name,table};

 localStorage.setItem(
 "snoop_" + eventName,
 JSON.stringify(user)
 );

 showApp();

}

/* ===================== */

function showApp(){

 login.style.display="none";
 app.style.display="block";

 eventTitleApp.innerText =
 eventData.name;

 userInfo.innerText =
 user.name +
 " • Mesa " +
 user.table;

 loadRanking();

}

/* ===================== */

function openCamera(){
 photoInput.click();
}

function uploadPhoto(e){

 const file =
 e.target.files[0];

 if(!file) return;

 status.innerText =
 "Subiendo foto...";

 const reader =
 new FileReader();

 reader.onload =
 async function(ev){

  await fetch("/upload-photo",{
   method:"POST",
   headers:{
    "Content-Type":"application/json"
   },
   body:JSON.stringify({
    eventName:eventName,
    user:user.name,
    table:user.table,
    image:ev.target.result
   })
  });

  status.innerText =
  "✅ Foto subida +1 punto";

  loadRanking();

  setTimeout(()=>{
   status.innerText="";
  },2500);

 };

 reader.readAsDataURL(file);

}

/* ===================== */

async function loadRanking(){

 const res =
 await fetch("/ranking/" +
 encodeURIComponent(eventName));

 const data =
 await res.json();

 renderRanking(data);

}

function renderRanking(data){

 podium.innerHTML="";
 rankingBox.innerHTML="";
 myRank.innerHTML="";

 if(!data.length){

  rankingBox.innerHTML =
  "Sin puntos todavía";

  return;

 }

 const top =
 data.slice(0,3);

 const medals =
 ["🥇","🥈","🥉"];

 const cls =
 ["first","second","third"];

 let html =
 `<div class="podium">`;

 top.forEach((r,i)=>{

 html += `
 <div class="place ${cls[i]}">
   <div class="medal">${medals[i]}</div>
   <div class="placeMesa">
   Mesa ${r.table}
   </div>
   <div class="placePts">
   ${r.points||0} pts
   </div>
 </div>
 `;

 });

 html += `</div>`;

 podium.innerHTML = html;

 data.slice(3,6).forEach((r,i)=>{

 rankingBox.innerHTML += `
 <div class="rankRow">
   <div>${i+4}. Mesa ${r.table}</div>
   <div>${r.points||0} pts</div>
 </div>
 `;

 });

 const pos =
 data.findIndex(r =>
 String(r.table) ===
 String(user.table)
 );

 if(pos >= 0){

  const leader =
  data[0].points || 0;

  const mine =
  data[pos].points || 0;

  const diff =
  leader - mine;

  let msg =
  "Mesa " + user.table +
  " va " + (pos+1) + "°";

  if(pos===0){

   msg +=
   " 🔥 ¡Van primeros!";

  }else if(diff===1){

   msg +=
   " 🔥 A 1 punto del líder";

  }else{

   msg +=
   " • A " + diff +
   " pts del líder";

  }

  myRank.innerText =
  msg;

 }

}

/* ===================== */

function goTrivia(){
  window.location.href =
    "/trivia.html?event=" + eventName;
}

/* ===================== */

setInterval(()=>{
 if(app.style.display==="block"){
  loadRanking();
 }
},5000);

init();

</script>

</body>
</html>
