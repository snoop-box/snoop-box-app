<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snoop Box</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#111;
  color:white;
  text-align:center;
}

#login, #app {
  padding:20px;
}

input, select, button {
  width:90%;
  padding:15px;
  margin:10px;
  font-size:18px;
  border-radius:10px;
  border:none;
}

button {
  background:#00c853;
  color:white;
}

.menu button {
  background:#2962ff;
}

#preview {
  width:90%;
  margin-top:10px;
  border-radius:10px;
}

.option {
  display:block;
  margin:10px;
  padding:15px;
  background:#333;
  border-radius:10px;
}

.correct { background:green; }
.wrong { background:red; }

#gallery img {
  width:100%;
  margin-top:10px;
  border-radius:10px;
}
</style>
</head>

<body>

<div id="login">
  <h2>Ingresar</h2>
  <input id="name" placeholder="Tu apodo">

  <select id="table">
    <option value="">Seleccionar mesa</option>
    <option>1</option><option>2</option><option>3</option>
    <option>4</option><option>5</option><option>6</option>
    <option>7</option><option>8</option><option>9</option>
    <option>10</option>
  </select>

  <button id="btnLogin">Entrar</button>
</div>

<div id="app" style="display:none">

  <h3 id="welcome"></h3>

  <div class="menu">
    <button id="btnPhoto">📸 Foto</button>
    <button id="btnGallery">🖼 Galería</button>
    <button id="btnTrivia">🧠 Trivia</button>
  </div>

  <div id="photo" style="display:none">
    <input type="file" accept="image/*" capture="environment" id="camera">
    <img id="preview">
    <button id="btnUpload">Subir Foto</button>
  </div>

  <div id="gallery" style="display:none"></div>

  <div id="trivia" style="display:none">
    <h3 id="question"></h3>
    <div id="options"></div>
  </div>

  <div id="ranking"></div>

</div>

<script>

/* ===== ELEMENTOS ===== */
const loginDiv = document.getElementById("login");
const app = document.getElementById("app");
const welcome = document.getElementById("welcome");

const btnLogin = document.getElementById("btnLogin");
const btnPhoto = document.getElementById("btnPhoto");
const btnGallery = document.getElementById("btnGallery");
const btnTrivia = document.getElementById("btnTrivia");

const camera = document.getElementById("camera");
const preview = document.getElementById("preview");
const btnUpload = document.getElementById("btnUpload");

const gallery = document.getElementById("gallery");
const question = document.getElementById("question");
const options = document.getElementById("options");
const ranking = document.getElementById("ranking");

/* ===== VARIABLES ===== */
const eventId = new URLSearchParams(location.search).get("event") || "default";
let user = {};
let previewFile = null;

/* ===== LOGIN ===== */
btnLogin.onclick = () => {
  const name = document.getElementById("name").value;
  const table = document.getElementById("table").value;

  if (!name || !table) {
    alert("Completar datos");
    return;
  }

  user = { name, table };

  loginDiv.style.display = "none";
  app.style.display = "block";

  welcome.innerText = `Hola ${name} (Mesa ${table})`;
};

/* ===== MENU ===== */
function showSection(id) {
  ["photo","gallery","trivia"].forEach(s=>{
    document.getElementById(s).style.display="none";
  });
  document.getElementById(id).style.display="block";
}

btnPhoto.onclick = ()=>showSection("photo");
btnGallery.onclick = ()=>{ showSection("gallery"); loadGallery(); };
btnTrivia.onclick = ()=>{ showSection("trivia"); loadTrivia(); };

/* ===== FOTO ===== */
camera.onchange = (e)=>{
  previewFile = e.target.files[0];

  const reader = new FileReader();
  reader.onload = e=>{
    preview.src = e.target.result;
  };
  reader.readAsDataURL(previewFile);
};

btnUpload.onclick = async () => {
  if (!previewFile) return;

  const formData = new FormData();
  formData.append("photo", previewFile);
  formData.append("name", user.name);
  formData.append("table", user.table);
  formData.append("eventId", eventId);

  await fetch("/upload", {
    method: "POST",
    body: formData
  });

  preview.src = "";
  camera.value = "";
};

/* ===== GALERIA ===== */
async function loadGallery() {
  const res = await fetch("/photos/" + eventId);
  const data = await res.json();

  gallery.innerHTML = "";

  data.reverse().forEach(p=>{
    gallery.innerHTML += `
      <img src="${p.url}">
      <p>${p.name} (Mesa ${p.table})</p>
    `;
  });
}

/* ===== TRIVIA ===== */
const questions = [
  { q:"¿De qué color era el vestido?", o:["Rojo","Azul","Blanco"], a:2 },
  { q:"¿Cuántos años cumple?", o:["30","40","50"], a:2 }
];

function loadTrivia() {

  const q = questions[Math.floor(Math.random()*questions.length)];

  question.innerText = q.q;
  options.innerHTML = "";

  q.o.forEach((opt,i)=>{
    const btn = document.createElement("div");
    btn.className = "option";
    btn.innerText = opt;

    btn.onclick = ()=>{
      if (i === q.a) {
        btn.classList.add("correct");
        addPoints(10);
      } else {
        btn.classList.add("wrong");
      }
    };

    options.appendChild(btn);
  });
}

/* ===== RANKING ===== */
async function loadRanking() {
  const res = await fetch("/ranking/" + eventId);
  const data = await res.json();

  let html = "<h3>🏆 Ranking</h3>";

  data.slice(0,5).forEach((r,i)=>{
    html += `${i+1}. Mesa ${r.table} (${r.points})<br>`;
  });

  ranking.innerHTML = html;
}

async function addPoints(points) {
  await fetch("/points", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      eventId,
      table: user.table,
      points
    })
  });

  loadRanking();
}

setInterval(loadRanking, 5000);

</script>

</body>
</html>
