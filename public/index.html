<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snoop Box</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background: linear-gradient(135deg,#111,#000);
  color:white;
  text-align:center;
}

.btn {
  background:#ff0055;
  border:none;
  color:white;
  padding:18px;
  font-size:18px;
  border-radius:12px;
  width:80%;
  margin:10px auto;
  display:block;
  transition: transform 0.1s, box-shadow 0.1s;
}

.btn:active {
  transform: scale(0.92);
  box-shadow:0 0 20px #ff0055;
}

input, select {
  width:80%;
  padding:15px;
  margin:10px;
  border-radius:10px;
  border:none;
  font-size:16px;
}

.screen { display:none; }
.active { display:block; }

/* TOAST */
#toast {
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:#00c853;
  padding:15px 20px;
  border-radius:10px;
  display:none;
}

/* RANKING */
#ranking {
  margin-top:20px;
  background:rgba(255,255,255,0.1);
  padding:15px;
  border-radius:12px;
}

/* PUNTOS FLOTANTES */
.points {
  position: fixed;
  bottom: 120px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 28px;
  color: #00e676;
  animation: floatUp 1.5s ease forwards;
}

@keyframes floatUp {
  0% { opacity:1; transform: translate(-50%,0); }
  100% { opacity:0; transform: translate(-50%,-120px); }
}

/* TRIVIA */
#triviaBox {
  margin-top:20px;
}

h1 { margin-top:40px; }
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="screen active">
  <h1>Sumate al evento 🎉</h1>

  <input id="name" placeholder="Tu nombre">

  <select id="table">
    <option value="">Seleccioná tu mesa</option>
  </select>

  <button class="btn" onclick="login()">Ingresar</button>
</div>

<!-- APP -->
<div id="app" class="screen">

  <h1 id="welcome"></h1>

  <button class="btn" onclick="upload()">📸 Subir foto</button>

  <input type="file" id="fileInput" accept="image/*" capture="environment" style="display:none">

  <button class="btn" onclick="showTrivia()">🎮 Jugar trivia</button>

  <div id="triviaBox"></div>

  <div id="ranking"></div>

</div>

<div id="toast"></div>

<script>

const eventId = new URLSearchParams(location.search).get("event") || "default";

let user = { name:"", table:"" };

// 🔥 MESAS
function loadTables(){
  const select = document.getElementById("table");
  for(let i=1;i<=20;i++){
    const opt = document.createElement("option");
    opt.value = i;
    opt.innerText = "Mesa " + i;
    select.appendChild(opt);
  }
}

// LOGIN
function login(){
  const name = nameInput.value;
  const table = table.value;

  if(!name || !table){
    showToast("Completá los datos");
    return;
  }

  user = { name, table };

  localStorage.setItem("user", JSON.stringify(user));

  goApp();
}

// APP
function goApp(){
  loginDiv.classList.remove("active");
  app.classList.add("active");

  const saved = JSON.parse(localStorage.getItem("user"));
  if(saved) user = saved;

  welcome.innerText = "Hola " + user.name + " 👋";

  loadRanking();
}

// 📸 SUBIR FOTO
function upload(){
  fileInput.click();
}

fileInput.onchange = async () => {

  const file = fileInput.files[0];
  if(!file) return;

  showToast("Subiendo foto...");

  const fd = new FormData();
  fd.append("photo", file);
  fd.append("name", user.name);
  fd.append("table", user.table);
  fd.append("event", eventId);

  const res = await fetch("/upload",{ method:"POST", body:fd });
  const result = await res.json();

  if(result.success){
    showToast("¡Foto subida!");
    showPoints("+5 🔥");
    vibrate();
    loadRanking();
  }else{
    showToast("Error");
  }

  fileInput.value="";
};

// 🔥 PUNTOS FLOTANTES
function showPoints(text){
  const div = document.createElement("div");
  div.className = "points";
  div.innerText = text;

  document.body.appendChild(div);

  setTimeout(()=>div.remove(),1500);
}

// 📳 VIBRACIÓN
function vibrate(){
  if(navigator.vibrate){
    navigator.vibrate(100);
  }
}

// 🎮 TRIVIA SIMPLE
const trivia = [
  {q:"¿De qué color es el cielo?", a:["Azul","Rojo","Verde"], c:0},
  {q:"¿Cuánto es 2+2?", a:["3","4","5"], c:1}
];

let current = 0;

function showTrivia(){
  renderQuestion();
}

function renderQuestion(){

  const t = trivia[current];

  let html = `<h3>${t.q}</h3>`;

  t.a.forEach((opt,i)=>{
    html += `<button class="btn" onclick="answer(${i})">${opt}</button>`;
  });

  triviaBox.innerHTML = html;
}

function answer(i){

  const t = trivia[current];

  if(i === t.c){
    showToast("Correcto 🔥");
    showPoints("+10 🏆");
    vibrate();
  }else{
    showToast("Incorrecto");
  }

  current = (current+1) % trivia.length;

  setTimeout(renderQuestion,1000);
}

// 🏆 RANKING
async function loadRanking(){
  const res = await fetch("/ranking/"+eventId);
  const data = await res.json();

  let html = "<h3>🏆 Ranking</h3>";

  data.slice(0,5).forEach((r,i)=>{
    html += `${i+1}. Mesa ${r.table} (${r.points})<br>`;
  });

  ranking.innerHTML = html;
}

// TOAST
function showToast(msg){
  toast.innerText = msg;
  toast.style.display="block";
  setTimeout(()=>toast.style.display="none",2000);
}

// INIT
window.onload = ()=>{
  loadTables();

  const saved = localStorage.getItem("user");
  if(saved) goApp();
}

</script>

</body>
</html>
