<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Snoop Box</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* { box-sizing: border-box; }

body {
  background: #111;
  color: white;
  font-family: Arial;
  margin: 0;
  padding: 10px;
}

.container {
  max-width: 420px;
  margin: auto;
}

input, select, button {
  padding: 14px;
  margin: 6px 0;
  width: 100%;
  border-radius: 10px;
  border: none;
  font-size: 16px;
}

button {
  background: #ff0055;
  color: white;
}

.hidden { display: none; }

.card {
  margin-bottom: 12px;
}

img {
  width: 100%;
  border-radius: 10px;
}

.info {
  font-size: 13px;
  opacity: 0.7;
  margin-top: 4px;
}
</style>
</head>

<body>

<div class="container">

<!-- LOGIN -->
<div id="login">
<h3>Ingresar</h3>
<input id="name" placeholder="Apodo">

<select id="table">
<option value="">Mesa</option>
<option>1</option><option>2</option><option>3</option>
<option>4</option><option>5</option><option>6</option>
<option>7</option><option>8</option><option>9</option>
<option>10</option>
</select>

<button onclick="enterApp()">Entrar</button>
</div>

<!-- MENU -->
<div id="menu" class="hidden">
<h4 id="welcome"></h4>
<button onclick="show('upload')">📸 Sacar foto</button>
<button onclick="show('gallery')">🖼 Ver fotos</button>
<button onclick="show('trivia')">🧠 Trivia</button>
</div>

<!-- UPLOAD -->
<div id="upload" class="hidden">
<input type="file" id="file" accept="image/*" capture="environment" style="display:none" onchange="previewImage()">
<button onclick="openCamera()">📸 Abrir cámara</button>
<div id="preview"></div>
<button onclick="sendPhoto()">Subir</button>
<button onclick="back()">Volver</button>
</div>

<!-- GALERIA -->
<div id="gallery" class="hidden">
<div id="photos"></div>
<button onclick="back()">Volver</button>
</div>

<!-- TRIVIA -->
<div id="trivia" class="hidden">
<h3>Trivia</h3>
<div id="question"></div>
<div id="answers"></div>
<button onclick="back()">Volver</button>
</div>

</div>

<script>

// EVENTO DESDE URL
function getEventId() {
  const params = new URLSearchParams(window.location.search);
  return params.get("event") || "default";
}

const eventId = getEventId();

let user = {};

function enterApp() {
  const name = document.getElementById("name").value;
  const table = document.getElementById("table").value;

  if (!name || !table) return alert("Completá");

  user = { name, table };

  login.classList.add("hidden");
  menu.classList.remove("hidden");

  welcome.innerText = name + " - Mesa " + table;
}

function show(sec) {
  menu.classList.add("hidden");
  document.getElementById(sec).classList.remove("hidden");

  if (sec === "gallery") loadGallery();
  if (sec === "trivia") loadTrivia();
}

function back() {
  upload.classList.add("hidden");
  gallery.classList.add("hidden");
  trivia.classList.add("hidden");
  menu.classList.remove("hidden");
}

function openCamera() {
  document.getElementById("file").click();
}

function previewImage() {
  const file = document.getElementById("file").files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = e => {
    document.getElementById("preview").innerHTML =
      "<img src='" + e.target.result + "'>";
  };
  reader.readAsDataURL(file);
}

async function sendPhoto() {
  const file = document.getElementById("file").files[0];
  if (!file) return;

  const formData = new FormData();
  formData.append("photo", file);
  formData.append("name", user.name);
  formData.append("table", user.table);
  formData.append("event", eventId);

  await fetch("/upload", {
    method: "POST",
    body: formData
  });

  document.getElementById("preview").innerHTML = "";
  document.getElementById("file").value = "";

  back();
}

async function loadGallery() {
  const res = await fetch("/photos/" + eventId);
  const data = await res.json();

  const container = document.getElementById("photos");
  container.innerHTML = "";

  if (data.length === 0) {
    container.innerHTML = "<p>No hay fotos todavía</p>";
    return;
  }

  data.reverse().forEach(p => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <img src="${p.url}">
      <div class="info">${p.name} - Mesa ${p.table}</div>
    `;

    container.appendChild(div);
  });
}

// TRIVIA
const questions = [
  {
    q: "¿Dónde se conocieron?",
    a: ["Escuela", "Trabajo", "Fiesta"],
    correct: 1
  },
  {
    q: "¿Quién dio el primer beso?",
    a: ["Él", "Ella", "Ambos"],
    correct: 0
  },
  {
    q: "¿Destino favorito?",
    a: ["Playa", "Montaña", "Europa"],
    correct: 2
  }
];

function loadTrivia() {
  const random = questions[Math.floor(Math.random() * questions.length)];

  document.getElementById("question").innerText = random.q;

  const answersDiv = document.getElementById("answers");
  answersDiv.innerHTML = "";

  random.a.forEach((ans, i) => {
    const btn = document.createElement("button");
    btn.innerText = ans;

    btn.onclick = () => {
      alert(i === random.correct ? "Correcto!" : "Incorrecto");
    };

    answersDiv.appendChild(btn);
  });
}

</script>

</body>
</html>
