<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Snoop Box</title>

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  min-height:100vh;
  color:#fff;
  background:linear-gradient(135deg,#0b1f5e,#111,#7f1d1d);
}

.wrap{
  max-width:520px;
  margin:auto;
  padding:24px;
}

.card{
  background:rgba(255,255,255,.08);
  backdrop-filter:blur(10px);
  border-radius:22px;
  padding:22px;
  box-shadow:0 18px 40px rgba(0,0,0,.25);
}

.center{
  text-align:center;
}

#eventTitle,
#eventTitleApp{
  font-size:34px;
  font-weight:bold;
  margin-bottom:8px;
}

#subText{
  color:#ddd;
  margin-bottom:18px;
}

input{
  width:100%;
  padding:15px;
  margin:8px 0;
  border:none;
  border-radius:14px;
  font-size:16px;
  box-sizing:border-box;
}

button{
  width:100%;
  padding:16px;
  margin-top:10px;
  border:none;
  border-radius:14px;
  font-size:17px;
  cursor:pointer;
}

.primary{
  background:#ff0055;
  color:#fff;
}

.dark{
  background:#263238;
  color:#fff;
}

.menuBtn{
  margin-top:12px;
  font-size:18px;
}

#app{
  display:none;
}

#login{
  display:none;
}

.badge{
  display:inline-block;
  padding:8px 12px;
  border-radius:30px;
  background:rgba(255,255,255,.08);
  margin-top:8px;
  font-size:14px;
}

.small{
  font-size:14px;
  color:#ddd;
}

.section{
  margin-top:18px;
}

#photoInput{
  display:none;
}

#status{
  margin-top:12px;
  font-size:14px;
  color:#fff;
}
</style>
</head>
<body>

<div class="wrap">

<!-- LOGIN -->

<div class="card" id="login">

<div class="center">
<div id="eventTitle">Evento</div>
<div id="subText">Ingresá para participar</div>
</div>

<input id="nameInput" placeholder="Tu nombre">

<input
id="tableInput"
type="number"
inputmode="numeric"
placeholder="Mesa">

<button class="primary"
onclick="enterApp()">
Ingresar
</button>

</div>

<!-- APP -->

<div class="card" id="app">

<div class="center">

<div id="eventTitleApp"></div>

<div class="badge"
id="userInfo"></div>

</div>

<div class="section">

<button class="primary menuBtn"
onclick="openCamera()">
📸 Subir Foto
</button>

<button class="dark menuBtn"
onclick="openRanking()">
🏆 Ranking Mesas
</button>

<button class="dark menuBtn"
onclick="alert('Próximo paso: trivia')">
🎮 Trivia
</button>

<input
type="file"
accept="image/*"
capture="environment"
id="photoInput"
onchange="uploadPhoto(event)">

<div id="status"></div>

</div>

<div class="section center small">
Snoop Box Experience
</div>

</div>

</div>

<script>

let eventName = "";
let eventData = null;
let user = null;

/* ===================== */

async function init(){

 const params =
 new URLSearchParams(location.search);

 eventName =
 params.get("event") || "";

 if(!eventName){

  document.body.innerHTML =
  "<div style='padding:30px;color:white;font-family:Arial'>Falta ?event=nombre</div>";

  return;

 }

 const res =
 await fetch("/event/" +
 encodeURIComponent(eventName));

 const data =
 await res.json();

 if(!data.success){

  document.body.innerHTML =
  "<div style='padding:30px;color:white;font-family:Arial'>Evento no encontrado</div>";

  return;

 }

 eventData = data.event;

 /* AUTOLOGIN QR */

 const qrName =
 params.get("name");

 const qrTable =
 params.get("table");

 if(qrName && qrTable){

  user = {
   name: qrName,
   table: qrTable
  };

  localStorage.setItem(
   "snoop_" + eventName,
   JSON.stringify(user)
  );

  showApp();
  return;

 }

 renderLogin();

}

/* ===================== */

function renderLogin(){

 login.style.display =
 "block";

 app.style.display =
 "none";

 eventTitle.innerText =
 eventData.name;

 const saved =
 localStorage.getItem(
 "snoop_" + eventName
 );

 if(saved){

  user =
  JSON.parse(saved);

  showApp();

 }

}

/* ===================== */

function enterApp(){

 const name =
 nameInput.value.trim();

 const table =
 tableInput.value.trim();

 if(!name || !table){

  alert(
   "Completá nombre y mesa"
  );

  return;

 }

 user = {
  name,
  table
 };

 localStorage.setItem(
 "snoop_" + eventName,
 JSON.stringify(user)
 );

 showApp();

}

/* ===================== */

function showApp(){

 login.style.display =
 "none";

 app.style.display =
 "block";

 eventTitleApp.innerText =
 eventData.name;

 userInfo.innerText =
 user.name +
 " • Mesa " +
 user.table;

}

/* ===================== */

function openCamera(){

 photoInput.click();

}

/* ===================== */

function uploadPhoto(e){

 const file =
 e.target.files[0];

 if(!file) return;

 status.innerText =
 "Subiendo foto...";

 const reader =
 new FileReader();

 reader.onload =
 async function(ev){

  await fetch(
   "/upload-photo",
   {
    method:"POST",
    headers:{
     "Content-Type":
     "application/json"
    },
    body:JSON.stringify({
      eventName:eventName,
      user:user.name,
      image:ev.target.result
    })
   }
  );

  status.innerText =
  "✅ Foto subida";

  setTimeout(()=>{
   status.innerText = "";
  },2500);

 };

 reader.readAsDataURL(file);

}

/* ===================== */

function openRanking(){

 location.href =
 "/ranking.html?event=" +
 encodeURIComponent(eventName);

}

/* ===================== */

init();

</script>

</body>
</html>
