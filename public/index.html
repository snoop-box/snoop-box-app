<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Snoop Box</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  background: #111;
  color: white;
  font-family: Arial;
  text-align: center;
}

input, button {
  padding: 15px;
  margin: 10px;
  width: 80%;
  max-width: 300px;
  border-radius: 10px;
  border: none;
}

button {
  background: #ff0055;
  color: white;
}

.hidden {
  display: none;
}

img {
  width: 90%;
  max-width: 400px;
  margin: 10px;
  border-radius: 10px;
}
</style>
</head>

<body>

<div id="login">
<h1>Ingresar</h1>
<input id="name" placeholder="Apodo">
<input id="table" placeholder="Mesa">
<button onclick="enterApp()">Entrar</button>
</div>

<div id="menu" class="hidden">
<h2 id="welcome"></h2>
<button onclick="show('upload')">📸 Subir</button>
<button onclick="show('gallery')">🖼 Galería</button>
</div>

<div id="upload" class="hidden">
<h2>Subir foto</h2>

<input type="file" id="file" accept="image/*" capture="environment" onchange="previewImage()">

<div id="previewContainer"></div>

<button onclick="sendPhoto()">Subir</button>
<button onclick="back()">Volver</button>
</div>

<div id="gallery" class="hidden">
<h2>Galería</h2>
<div id="photos"></div>
<button onclick="back()">Volver</button>
</div>

<script>
let user = {};

function enterApp() {
  const name = document.getElementById("name").value;
  const table = document.getElementById("table").value;

  if (!name || !table) return alert("Completá");

  user = { name, table };

  login.classList.add("hidden");
  menu.classList.remove("hidden");

  welcome.innerText = name + " - Mesa " + table;
}

function show(sec) {
  menu.classList.add("hidden");
  document.getElementById(sec).classList.remove("hidden");

  if (sec === "gallery") loadGallery();
}

function back() {
  upload.classList.add("hidden");
  gallery.classList.add("hidden");
  menu.classList.remove("hidden");
}

function previewImage() {
  const file = document.getElementById("file").files[0];
  if (!file) return;

  const reader = new FileReader();

  reader.onload = function(e) {
    const img = document.createElement("img");
    img.src = e.target.result;

    const container = document.getElementById("previewContainer");
    container.innerHTML = "";
    container.appendChild(img);
  };

  reader.readAsDataURL(file);
}

async function sendPhoto() {
  const file = document.getElementById("file").files[0];
  if (!file) return alert("Elegí foto");

  const formData = new FormData();
  formData.append("photo", file);

  await fetch("/upload", {
    method: "POST",
    body: formData
  });

  alert("Subida!");

  // limpiar preview
  document.getElementById("previewContainer").innerHTML = "";
  document.getElementById("file").value = "";

  // volver al menú automáticamente
  back();
}

async function loadGallery() {
  const res = await fetch("/photos");
  const data = await res.json();

  const container = document.getElementById("photos");
  container.innerHTML = "";

  data.forEach(url => {
    const img = document.createElement("img");
    img.src = url;
    container.appendChild(img);
  });
}
</script>

</body>
</html>
