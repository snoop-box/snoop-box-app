<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Snoop Box</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  background: #111;
  color: white;
  font-family: Arial;
  padding: 10px;
}

.container {
  max-width: 420px;
  margin: auto;
}

button, input, select {
  width: 100%;
  padding: 14px;
  margin: 6px 0;
  border-radius: 10px;
  border: none;
}

button {
  background: #ff0055;
  color: white;
}

.hidden { display:none; }

img { width:100%; border-radius:10px; }

.rank {
  padding:10px;
  border-bottom:1px solid #333;
}
</style>
</head>

<body>

<div class="container">

<div id="login">
<input id="name" placeholder="Apodo">
<select id="table">
<option value="">Mesa</option>
<option>1</option><option>2</option><option>3</option>
<option>4</option><option>5</option><option>6</option>
<option>7</option><option>8</option><option>9</option>
<option>10</option>
</select>
<button onclick="enterApp()">Entrar</button>
</div>

<div id="menu" class="hidden">
<h3 id="welcome"></h3>
<button onclick="show('upload')">📸 Foto</button>
<button onclick="show('gallery')">🖼 Galería</button>
<button onclick="show('trivia')">🧠 Trivia</button>
<button onclick="show('ranking')">🏆 Ranking</button>
</div>

<div id="upload" class="hidden">
<input type="file" id="file" accept="image/*" capture="environment" style="display:none" onchange="previewImage()">
<button onclick="openCamera()">📸 Cámara</button>
<div id="preview"></div>
<button onclick="sendPhoto()">Subir</button>
<button onclick="back()">Volver</button>
</div>

<div id="gallery" class="hidden">
<div id="photos"></div>
<button onclick="back()">Volver</button>
</div>

<div id="trivia" class="hidden">
<h3 id="question"></h3>
<div id="answers"></div>
<button onclick="back()">Volver</button>
</div>

<div id="ranking" class="hidden">
<h3>Ranking</h3>
<div id="rankList"></div>
<button onclick="back()">Volver</button>
</div>

</div>

<script>

const eventId = new URLSearchParams(location.search).get("event") || "default";
let user = {};

function enterApp() {
  user.name = name.value;
  user.table = table.value;
  if (!user.name || !user.table) return;
  login.classList.add("hidden");
  menu.classList.remove("hidden");
  welcome.innerText = user.name + " - Mesa " + user.table;
}

function show(sec) {
  menu.classList.add("hidden");
  document.getElementById(sec).classList.remove("hidden");

  if (sec=="gallery") loadGallery();
  if (sec=="trivia") loadTrivia();
  if (sec=="ranking") loadRanking();
}

function back() {
  upload.classList.add("hidden");
  gallery.classList.add("hidden");
  trivia.classList.add("hidden");
  ranking.classList.add("hidden");
  menu.classList.remove("hidden");
}

function openCamera() {
  file.click();
}

function previewImage() {
  const reader = new FileReader();
  reader.onload = e => preview.innerHTML = "<img src='"+e.target.result+"'>";
  reader.readAsDataURL(file.files[0]);
}

async function sendPhoto() {
  const fd = new FormData();
  fd.append("photo", file.files[0]);
  fd.append("name", user.name);
  fd.append("table", user.table);
  fd.append("event", eventId);

  await fetch("/upload", { method:"POST", body:fd });

  preview.innerHTML="";
  file.value="";
  back();
}

async function loadGallery() {
  const res = await fetch("/photos/"+eventId);
  const data = await res.json();

  photos.innerHTML="";
  data.reverse().forEach(p=>{
    photos.innerHTML += `
      <div>
        <img src="${p.url}">
        <small>${p.name} - Mesa ${p.table}</small>
      </div>`;
  });
}

// TRIVIA
const questions = [
{q:"¿Dónde se conocieron?",a:["Escuela","Trabajo","Fiesta"],c:1},
{q:"¿Quién dio el primer beso?",a:["Él","Ella","Ambos"],c:0},
{q:"¿Destino favorito?",a:["Playa","Montaña","Europa"],c:2}
];

function loadTrivia() {
  const q = questions[Math.floor(Math.random()*questions.length)];
  question.innerText = q.q;
  answers.innerHTML="";

  q.a.forEach((txt,i)=>{
    const b=document.createElement("button");
    b.innerText=txt;

    b.onclick=async ()=>{
      document.querySelectorAll("#answers button").forEach(x=>x.disabled=true);

      const correct = i===q.c;

      const res=document.createElement("div");
      res.innerText = correct ? "✔️" : "❌";
      res.style.fontSize="30px";
      res.style.marginTop="10px";
      answers.appendChild(res);

      await fetch("/trivia",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          table:user.table,
          event:eventId,
          correct:correct
        })
      });
    };

    answers.appendChild(b);
  });
}

// RANKING
async function loadRanking() {
  const res = await fetch("/ranking/"+eventId);
  const data = await res.json();

  rankList.innerHTML="";

  data.forEach((r,i)=>{
    rankList.innerHTML += `
      <div class="rank">
        ${i+1}° Mesa ${r.table} - ${r.points} pts
      </div>`;
  });
}

</script>

</body>
</html>
