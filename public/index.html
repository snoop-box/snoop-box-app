<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snoop Box</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background: linear-gradient(135deg,#111,#000);
  color:white;
  text-align:center;
}

.screen { display:none; }
.active { display:block; }

.btn {
  background:#ff0055;
  border:none;
  color:white;
  padding:18px;
  font-size:18px;
  border-radius:12px;
  width:80%;
  margin:10px auto;
  display:block;
}

input {
  width:80%;
  padding:15px;
  margin:10px;
  border-radius:10px;
  border:none;
}

#blocked {
  display:none;
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  justify-content:center;
  align-items:center;
}
</style>
</head>

<body>

<div id="blocked">🚫 Evento no disponible</div>

<div id="login" class="screen active">
  <h1>Ingresar</h1>
  <input id="nameInput" placeholder="Nombre">
  <input id="tableInput" placeholder="Mesa">
  <button class="btn" onclick="login()">Ingresar</button>
</div>

<div id="app" class="screen">
  <h1 id="welcome"></h1>
</div>

<script>

let user = {};

fetch("/event-status")
.then(r=>r.json())
.then(data=>{
  if(!data.active){
    document.getElementById("blocked").style.display="flex";
    return;
  }

  const token = new URLSearchParams(location.search).get("token");

  if(token){
    fetch("/guest/"+token)
    .then(r=>r.json())
    .then(data=>{
      if(data.success){
        user = data.guest;
        localStorage.setItem("user", JSON.stringify(user));
        goApp();
      }
    });
  }
});

function login(){
  user = {
    name: document.getElementById("nameInput").value,
    table: document.getElementById("tableInput").value
  };

  localStorage.setItem("user", JSON.stringify(user));
  goApp();
}

function goApp(){
  document.getElementById("login").classList.remove("active");
  document.getElementById("app").classList.add("active");

  const saved = JSON.parse(localStorage.getItem("user"));
  if(saved) user = saved;

  document.getElementById("welcome").innerText = "Hola " + user.name;
}

</script>
</body>
</html>
