<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Snoop Box</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* { box-sizing: border-box; }

body {
  background: #111;
  color: white;
  font-family: Arial;
  text-align: center;
  margin: 0;
  padding: 20px;
}

.container {
  max-width: 400px;
  margin: auto;
}

input, select, button {
  padding: 15px;
  margin: 8px 0;
  width: 100%;
  border-radius: 10px;
  border: none;
}

button {
  background: #ff0055;
  color: white;
}

.hidden { display: none; }

img {
  width: 100%;
  border-radius: 10px;
}

.card {
  margin-bottom: 15px;
}

.info {
  font-size: 14px;
  opacity: 0.7;
}
</style>
</head>

<body>

<div class="container">

<div id="login">
<h2>Ingresar</h2>

<input id="name" placeholder="Apodo">

<select id="table">
  <option value="">Mesa</option>
  <option>1</option><option>2</option><option>3</option>
  <option>4</option><option>5</option><option>6</option>
  <option>7</option><option>8</option><option>9</option>
  <option>10</option>
</select>

<button onclick="enterApp()">Entrar</button>
</div>

<div id="menu" class="hidden">
<h3 id="welcome"></h3>

<button onclick="show('upload')">📸 Sacar foto</button>
<button onclick="show('gallery')">🖼 Ver fotos</button>
</div>

<div id="upload" class="hidden">
<input type="file" id="file" accept="image/*" capture="environment" style="display:none" onchange="previewImage()">
<button onclick="openCamera()">📸 Abrir cámara</button>
<div id="preview"></div>
<button onclick="sendPhoto()">Subir</button>
<button onclick="back()">Volver</button>
</div>

<div id="gallery" class="hidden">
<div id="photos"></div>
<button onclick="back()">Volver</button>
</div>

</div>

<script>

// 🔥 OBTENER EVENTO DESDE URL
function getEventId() {
  const params = new URLSearchParams(window.location.search);
  return params.get("event") || "default";
}

const eventId = getEventId();

let user = {};

function enterApp() {
  const name = document.getElementById("name").value;
  const table = document.getElementById("table").value;

  if (!name || !table) return alert("Completá");

  user = { name, table };

  login.classList.add("hidden");
  menu.classList.remove("hidden");

  welcome.innerText = name + " - Mesa " + table;
}

function show(sec) {
  menu.classList.add("hidden");
  document.getElementById(sec).classList.remove("hidden");

  if (sec === "gallery") loadGallery();
}

function back() {
  upload.classList.add("hidden");
  gallery.classList.add("hidden");
  menu.classList.remove("hidden");
}

function openCamera() {
  document.getElementById("file").click();
}

function previewImage() {
  const file = document.getElementById("file").files[0];
  if (!file) return;

  const reader = new FileReader();

  reader.onload = function(e) {
    document.getElementById("preview").innerHTML =
      "<img src='" + e.target.result + "'>";
  };

  reader.readAsDataURL(file);
}

async function sendPhoto() {
  const file = document.getElementById("file").files[0];
  if (!file) return;

  const formData = new FormData();
  formData.append("photo", file);
  formData.append("name", user.name);
  formData.append("table", user.table);
  formData.append("event", eventId);

  await fetch("/upload", {
    method: "POST",
    body: formData
  });

  document.getElementById("preview").innerHTML = "";
  document.getElementById("file").value = "";

  back();
}

async function loadGallery() {
  const res = await fetch("/photos/" + eventId);
  const data = await res.json();

  const container = document.getElementById("photos");
  container.innerHTML = "";

  data.reverse().forEach(p => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <img src="/uploads/${p.file}">
      <div class="info">${p.name} - Mesa ${p.table}</div>
    `;

    container.appendChild(div);
  });
}

</script>

</body>
</html>
