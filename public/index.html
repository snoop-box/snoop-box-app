<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snoop Box</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#111;
  color:white;
  text-align:center;
}

/* LOGIN */
#login, #app {
  padding:20px;
}

input, select, button {
  width:90%;
  padding:15px;
  margin:10px;
  font-size:18px;
  border-radius:10px;
  border:none;
}

button {
  background:#00c853;
  color:white;
}

/* MENU */
.menu button {
  background:#2962ff;
}

/* FOTO */
#preview {
  width:90%;
  margin-top:10px;
  border-radius:10px;
}

/* GALERIA */
#gallery img {
  width:100%;
  margin-top:10px;
  border-radius:10px;
}

/* TRIVIA */
.option {
  display:block;
  margin:10px;
  padding:15px;
  background:#333;
  border-radius:10px;
}

.correct { background:green; }
.wrong { background:red; }

#ranking {
  margin-top:20px;
}
</style>
</head>

<body>

<div id="login">
  <h2>Ingresar</h2>
  <input id="name" placeholder="Tu apodo">

  <select id="table">
    <option value="">Seleccionar mesa</option>
    <option>1</option><option>2</option><option>3</option>
    <option>4</option><option>5</option><option>6</option>
    <option>7</option><option>8</option><option>9</option>
    <option>10</option>
  </select>

  <button onclick="login()">Entrar</button>
</div>

<div id="app" style="display:none">

  <h3 id="welcome"></h3>

  <div class="menu">
    <button onclick="showSection('photo')">📸 Foto</button>
    <button onclick="showSection('gallery')">🖼 Galería</button>
    <button onclick="showSection('trivia')">🧠 Trivia</button>
  </div>

  <!-- FOTO -->
  <div id="photo" style="display:none">
    <input type="file" accept="image/*" capture="environment" id="camera">
    <img id="preview">

    <button onclick="uploadPhoto()">Subir Foto</button>
  </div>

  <!-- GALERIA -->
  <div id="gallery" style="display:none"></div>

  <!-- TRIVIA -->
  <div id="trivia" style="display:none">
    <h3 id="question"></h3>
    <div id="options"></div>
  </div>

  <!-- RANKING -->
  <div id="ranking"></div>

</div>

<script>

/* ================= SONIDOS ================= */
const sounds = {
  click: new Audio("/sounds/click.mp3"),
  camera: new Audio("/sounds/camera.mp3"),
  success: new Audio("/sounds/success.mp3"),
  error: new Audio("/sounds/error.mp3")
};

function playSound(type) {
  if (!sounds[type]) return;
  sounds[type].pause();
  sounds[type].currentTime = 0;
  sounds[type].play().catch(()=>{});
}

/* ================= VARIABLES ================= */
const eventId = new URLSearchParams(location.search).get("event") || "default";

let user = {};
let previewFile = null;

/* ================= LOGIN ================= */
function login() {
  const name = document.getElementById("name").value;
  const table = document.getElementById("table").value;

  if (!name || !table) return alert("Completar datos");

  playSound("click");

  user = { name, table };

  loginDiv.style.display = "none";
  app.style.display = "block";

  welcome.innerText = `Hola ${name} (Mesa ${table})`;
}

/* ================= MENU ================= */
function showSection(id) {
  playSound("click");

  ["photo","gallery","trivia"].forEach(s=>{
    document.getElementById(s).style.display="none";
  });

  document.getElementById(id).style.display="block";

  if (id === "gallery") loadGallery();
  if (id === "trivia") loadTrivia();
}

/* ================= FOTO ================= */
camera.onchange = (e)=>{
  previewFile = e.target.files[0];

  const reader = new FileReader();
  reader.onload = e=>{
    preview.src = e.target.result;
  };
  reader.readAsDataURL(previewFile);

  playSound("camera");
};

async function uploadPhoto() {
  if (!previewFile) return;

  playSound("click");

  const formData = new FormData();
  formData.append("photo", previewFile);
  formData.append("name", user.name);
  formData.append("table", user.table);
  formData.append("eventId", eventId);

  await fetch("/upload", {
    method: "POST",
    body: formData
  });

  preview.src = "";
  camera.value = "";

  showSection("photo");
}

/* ================= GALERIA ================= */
async function loadGallery() {
  const res = await fetch("/photos/" + eventId);
  const data = await res.json();

  gallery.innerHTML = "";

  data.reverse().forEach(p=>{
    gallery.innerHTML += `
      <img src="${p.url}">
      <p>${p.name} (Mesa ${p.table})</p>
    `;
  });
}

/* ================= TRIVIA ================= */

let answered = false;

const questions = [
  { q:"¿De qué color era el vestido?", o:["Rojo","Azul","Blanco"], a:2 },
  { q:"¿Cuántos años cumple?", o:["30","40","50"], a:2 }
];

function loadTrivia() {

  answered = false;

  const q = questions[Math.floor(Math.random()*questions.length)];

  question.innerText = q.q;
  options.innerHTML = "";

  q.o.forEach((opt,i)=>{
    const btn = document.createElement("div");
    btn.className = "option";
    btn.innerText = opt;

    btn.onclick = ()=>{
      if (answered) return;

      if (i === q.a) {
        btn.classList.add("correct");
        playSound("success");
        addPoints(10);
      } else {
        btn.classList.add("wrong");
        playSound("error");
      }

      answered = true;
    };

    options.appendChild(btn);
  });
}

/* ================= RANKING ================= */
async function loadRanking() {
  const res = await fetch("/ranking/" + eventId);
  const data = await res.json();

  let html = "<h3>🏆 Ranking</h3>";

  data.slice(0,5).forEach((r,i)=>{
    html += `${i+1}. Mesa ${r.table} (${r.points})<br>`;
  });

  ranking.innerHTML = html;
}

async function addPoints(points) {
  await fetch("/points", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      eventId,
      table: user.table,
      points
    })
  });

  loadRanking();
}

/* ================= INIT ================= */
setInterval(loadRanking, 5000);

</script>

</body>
</html>
