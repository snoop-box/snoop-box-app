<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snoop Box</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background: linear-gradient(135deg,#111,#000);
  color:white;
  text-align:center;
}

/* ANIMACIÓN BOTONES */
.btn {
  background:#ff0055;
  border:none;
  color:white;
  padding:18px;
  font-size:18px;
  border-radius:12px;
  width:80%;
  margin:10px auto;
  display:block;
  transition: transform 0.1s, box-shadow 0.1s;
}

.btn:active {
  transform: scale(0.92);
  box-shadow:0 0 20px #ff0055;
}

/* INPUTS */
input {
  width:80%;
  padding:15px;
  margin:10px;
  border-radius:10px;
  border:none;
  font-size:16px;
}

/* PANTALLAS */
.screen {
  display:none;
}

.active {
  display:block;
}

/* FEEDBACK */
#toast {
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:#00c853;
  padding:15px 20px;
  border-radius:10px;
  display:none;
}

/* RANKING */
#ranking {
  margin-top:20px;
  background:rgba(255,255,255,0.1);
  padding:15px;
  border-radius:12px;
}

/* TITULOS */
h1 {
  margin-top:40px;
}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="screen active">
  <h1>Sumate al evento 🎉</h1>

  <input id="name" placeholder="Tu nombre">
  <input id="table" placeholder="Mesa">

  <button class="btn" onclick="login()">Ingresar</button>
</div>

<!-- APP -->
<div id="app" class="screen">

  <h1 id="welcome"></h1>

  <button class="btn" onclick="upload()">📸 Subir foto</button>

  <input type="file" id="fileInput" accept="image/*" capture="environment" style="display:none">

  <button class="btn" onclick="playTrivia()">🎮 Jugar trivia</button>

  <div id="ranking"></div>

</div>

<div id="toast"></div>

<script>

const eventId = new URLSearchParams(location.search).get("event") || "default";

let user = {
  name:"",
  table:""
};

// LOGIN
function login(){
  const name = document.getElementById("name").value;
  const table = document.getElementById("table").value;

  if(!name || !table){
    showToast("Completá los datos");
    return;
  }

  user.name = name;
  user.table = table;

  localStorage.setItem("user", JSON.stringify(user));

  goApp();
}

// IR A APP
function goApp(){
  document.getElementById("login").classList.remove("active");
  document.getElementById("app").classList.add("active");

  const saved = JSON.parse(localStorage.getItem("user"));

  if(saved){
    user = saved;
  }

  document.getElementById("welcome").innerText = "Hola " + user.name + " 👋";

  loadRanking();
}

// SUBIR FOTO
function upload(){
  document.getElementById("fileInput").click();
}

fileInput.onchange = async () => {

  const file = fileInput.files[0];
  if(!file) return;

  showToast("Subiendo foto...");

  const fd = new FormData();
  fd.append("photo", file);
  fd.append("name", user.name);
  fd.append("table", user.table);
  fd.append("event", eventId);

  const res = await fetch("/upload", {
    method:"POST",
    body: fd
  });

  const result = await res.json();

  if(result.success){
    showToast("¡Foto subida! 🔥 + puntos");
    loadRanking();
  }else{
    showToast("Error subiendo foto");
  }

  fileInput.value = "";
};

// TRIVIA (simple placeholder)
function playTrivia(){
  showToast("Próximamente 😎");
}

// RANKING
async function loadRanking(){

  const res = await fetch("/ranking/"+eventId);
  const data = await res.json();

  let html = "<h3>🏆 Ranking</h3>";

  data.slice(0,5).forEach((r,i)=>{
    html += `${i+1}. Mesa ${r.table} (${r.points})<br>`;
  });

  document.getElementById("ranking").innerHTML = html;
}

// TOAST
function showToast(msg){
  const t = document.getElementById("toast");
  t.innerText = msg;
  t.style.display = "block";

  setTimeout(()=>{
    t.style.display = "none";
  },2000);
}

// AUTO LOGIN
window.onload = ()=>{
  const saved = localStorage.getItem("user");
  if(saved){
    goApp();
  }
}

</script>

</body>
</html>
