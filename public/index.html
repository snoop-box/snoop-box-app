<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Snoop Box</title>

<style>

body{
  margin:0;
  min-height:100vh;

  font-family:Arial,sans-serif;
  color:#fff;

  background:
  linear-gradient(
    135deg,
    #071a52,
    #111,
    #5c0b0b
  );
}

.wrap{
  max-width:520px;
  margin:auto;
  padding:22px;
}

.card{

  background:
  rgba(255,255,255,.08);

  backdrop-filter:
  blur(12px);

  border-radius:28px;

  padding:26px;

  margin-bottom:22px;

  box-shadow:
  0 20px 50px
  rgba(0,0,0,.25);

}

.logo{
  display:block;
  margin:auto;
  max-width:180px;
  max-height:90px;
  object-fit:contain;
  margin-bottom:14px;
}

.title{
  text-align:center;
  font-size:54px;
  font-weight:bold;
  margin-bottom:6px;
}

.sub{
  text-align:center;
  color:#ddd;
  margin-bottom:18px;
}

.user{
  text-align:center;
  margin-bottom:22px;
}

.user span{

  background:
  rgba(255,255,255,.1);

  padding:10px 16px;

  border-radius:999px;

  display:inline-block;

  font-size:18px;

}

.btn{

  width:100%;

  padding:20px;

  border:none;

  border-radius:18px;

  font-size:22px;
  font-weight:bold;

  color:#fff;

  cursor:pointer;

  margin-bottom:16px;

  transition:.2s;

}

.btn:hover{

  transform:
  scale(1.01);

}

.photo{
  background:#ff0055;
}

.dark{
  background:
  rgba(255,255,255,.08);
}

.rankTitle{
  font-size:30px;
  font-weight:bold;
  text-align:center;
}

.rankSub{
  text-align:center;
  color:#ddd;
  margin-bottom:20px;
}

.rankGrid{

  display:grid;

  grid-template-columns:
  repeat(3,1fr);

  gap:14px;

}

.rankCard{

  border-radius:20px;

  padding:18px;

  text-align:center;

  background:
  rgba(255,255,255,.08);

  border:
  2px solid
  rgba(255,255,255,.2);

}

.gold{
  border-color:#ffd700;
}

.silver{
  border-color:#c0c0c0;
}

.bronze{
  border-color:#cd7f32;
}

.rankTable{
  font-size:20px;
  font-weight:bold;
}

.rankPts{
  font-size:15px;
  color:#ddd;
}

.highlight{

  margin-top:18px;

  padding:18px;

  border-radius:18px;

  text-align:center;

  background:
  rgba(255,0,85,.2);

  border:
  1px solid
  rgba(255,255,255,.1);

  font-size:18px;
  font-weight:bold;

}

.loading{

  text-align:center;
  padding:80px 20px;

}

</style>

</head>
<body>

<div
id="loading"
class="loading">

Cargando invitado...

</div>

<div
id="app"
style="display:none;">

<div class="wrap">

<!-- HERO -->

<div class="card">

<img
id="logo"
class="logo"
style="display:none;">

<div
class="title"
id="eventTitle">

EVENTO

</div>

<div class="sub">
Event Experience
</div>

<div class="user">

<span id="guestInfo">

Invitado

</span>

</div>

<button
class="btn photo"
onclick="uploadPhoto()">

📸 Subir Foto

</button>

<button
id="btnTrivia"
class="btn dark"
style="display:none"
onclick="openTrivia()">

🧠 Trivia

</button>

<button
id="btn360"
class="btn dark"
style="display:none"
onclick="open360()">

🎬 360

</button>

</div>

<!-- RANKING -->

<div class="card">

<div class="rankTitle">

🏆 Ranking en Vivo

</div>

<div class="rankSub">

Cada foto suma puntos

</div>

<div
id="ranking"
class="rankGrid">

</div>

<div
id="highlight"
class="highlight">

Sin puntos todavía

</div>

</div>

</div>

</div>

<script>

const session =
JSON.parse(

  localStorage.getItem(
    "snoopGuest"
  )

);

if(!session){

  window.location.href =
  "/login.html";

}

const guest =
session.guest;

const eventSlug =
session.event;

/* ====================== */

async function init(){

  await loadEvent();

  await loadRanking();

  setInterval(
    loadRanking,
    5000
  );

  document
  .getElementById(
    "loading"
  )
  .style.display =
  "none";

  document
  .getElementById(
    "app"
  )
  .style.display =
  "block";

}

/* ====================== */

async function loadEvent(){

  try{

    const res =
    await fetch(

      "/event-config/" +
      eventSlug

    );

    const data =
    await res.json();

    if(!data.success){

     localStorage.removeItem(
  "snoopGuest"
);

window.location.href =
"/login.html";
      return;

    }

    const ev =
    data.event;

    document
    .getElementById(
      "eventTitle"
    )
    .innerText =
    ev.name.toUpperCase();

    document
    .getElementById(
      "guestInfo"
    )
    .innerText =

      guest.guest_name +
      " • Mesa " +
      guest.guest_table;

    if(ev.logo_url){

      const logo =
      document
      .getElementById(
        "logo"
      );

      logo.src =
      ev.logo_url;

      logo.style.display =
      "block";

    }

    if(ev.has360){

      document
      .getElementById(
        "btn360"
      )
      .style.display =
      "block";

    }

    if(ev.hastrivia){

      document
      .getElementById(
        "btnTrivia"
      )
      .style.display =
      "block";

    }

  }

  catch(err){

    console.error(err);
    document.getElementById(
  "loading"
).innerText =
"Error cargando evento";

  }

}

/* ====================== */

async function loadRanking(){

  try{

    const res =
    await fetch(

      "/ranking/" +
      eventSlug

    );

    const ranking =
    await res.json();

    const container =
    document.getElementById(
      "ranking"
    );

    container.innerHTML =
    "";

    const medals = [

      "gold",
      "silver",
      "bronze"

    ];

    ranking
    .slice(0,3)
    .forEach((r,i)=>{

      container.innerHTML += `

      <div class="
      rankCard
      ${medals[i]||""}
      ">

      <div style="
      font-size:34px;
      margin-bottom:10px;
      ">

      ${
        i===0 ? "🥇" :
        i===1 ? "🥈" :
        "🥉"
      }

      </div>

      <div class="rankTable">

      Mesa ${r.table}

      </div>

      <div class="rankPts">

      ${r.points} pts

      </div>

      </div>

      `;

    });

    const top =
    ranking[0];

    if(top){

      document
      .getElementById(
        "highlight"
      )
      .innerText =

      `Mesa ${top.table}
      va 1°
      🔥 ¡Van primeros!`;

    }

  }

  catch(err){

    console.error(err);

  }

}

/* ====================== */

async function uploadPhoto(){

  const input =
  document.createElement(
    "input"
  );

  input.type = "file";

  input.accept =

  "image/*";

  input.capture =

  "environment";


  input.onchange =
  async(e)=>{

    const file =
    e.target.files[0];
    if(!file){
  return;
}

    const reader =
    new FileReader();

    reader.onload =
    async()=>{

      try{

        const res =
        await fetch(

          "/upload-photo",

          {

            method:"POST",

            headers:{
              "Content-Type":
              "application/json"
            },

            body:JSON.stringify({

              image:
              reader.result,

              eventName:
              eventSlug,

              user:
              guest.guest_name

            })

          }

        );

        const data =
        await res.json();

        if(data.success){

          showToast("📸 Foto subida");

          loadRanking();

        }

      }

      catch(err){

        console.error(err);

      }

    };

    reader.readAsDataURL(
      file
    );

  };

  input.click();

}

/* ====================== */

function open360(){

  window.location.href =

  "/360-gallery.html?event=" +
  eventSlug;

}

/* ====================== */

function openTrivia(){

  window.location.href =
  "/trivia.html";

}

/* ====================== */

function showToast(text){

  const toast =
  document.createElement(
    "div"
  );

  toast.innerText = text;

  toast.style.position =
  "fixed";

  toast.style.bottom =
  "30px";

  toast.style.left =
  "50%";

  toast.style.transform =
  "translateX(-50%)";

  toast.style.background =
  "rgba(0,0,0,.85)";

  toast.style.color =
  "#fff";

  toast.style.padding =
  "14px 22px";

  toast.style.borderRadius =
  "999px";

  toast.style.fontSize =
  "16px";

  toast.style.zIndex =
  "9999";

  toast.style.boxShadow =
  "0 10px 30px rgba(0,0,0,.3)";

  toast.style.opacity =
  "0";

  toast.style.transition =
  ".25s";

  document.body.appendChild(
    toast
  );

  requestAnimationFrame(()=>{

    toast.style.opacity =
    "1";

  });

  setTimeout(()=>{

    toast.style.opacity =
    "0";

    setTimeout(()=>{

      toast.remove();

    },250);

  },2000);

}


init();

</script>

</body>
</html>
