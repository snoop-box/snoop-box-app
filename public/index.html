<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snoop Box</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background: linear-gradient(135deg,#111,#000);
  color:white;
  text-align:center;
}

.screen { display:none; }
.active { display:block; }

.btn {
  background:#ff0055;
  border:none;
  color:white;
  padding:18px;
  font-size:18px;
  border-radius:12px;
  width:80%;
  margin:10px auto;
  display:block;
}

input {
  width:80%;
  padding:15px;
  margin:10px;
  border-radius:10px;
  border:none;
}

#blocked {
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  font-size:22px;
}
</style>
</head>

<body>

<!-- BLOQUEO -->
<div id="blocked">
  🚫 Evento no disponible<br><br>
  Volvé más tarde
</div>

<!-- LOGIN -->
<div id="login" class="screen active">
  <h1>Ingresar</h1>
  <input id="nameInput" placeholder="Nombre">
  <input id="tableInput" placeholder="Mesa">
  <button class="btn" onclick="login()">Ingresar</button>
</div>

<!-- APP -->
<div id="app" class="screen">
  <h1 id="welcome"></h1>
</div>

<script>

let user = {};

// 🔥 CHEQUEAR ESTADO DEL EVENTO
function checkEvent(){
  return fetch("/event-status")
  .then(r=>r.json())
  .then(data=>{
    if(!data.active){
      document.getElementById("blocked").style.display = "flex";
      return false;
    }
    return true;
  });
}

// 🔥 INICIO
checkEvent().then(active=>{
  if(!active) return;

  const params = new URLSearchParams(location.search);
  const token = params.get("token");

  if(token){
    fetch("/guest/"+token)
    .then(r=>r.json())
    .then(data=>{
      if(data.success){
        user = {
          name: data.guest.name,
          table: data.guest.table
        };
        localStorage.setItem("user", JSON.stringify(user));
        goApp();
      }
    });
  }
});

// LOGIN MANUAL
function login(){
  user = {
    name: document.getElementById("nameInput").value,
    table: document.getElementById("tableInput").value
  };

  localStorage.setItem("user", JSON.stringify(user));
  goApp();
}

// ENTRAR A APP
function goApp(){
  document.getElementById("login").classList.remove("active");
  document.getElementById("app").classList.add("active");

  const saved = JSON.parse(localStorage.getItem("user"));
  if(saved) user = saved;

  document.getElementById("welcome").innerText = "Hola " + user.name;
}

</script>

</body>
</html>
