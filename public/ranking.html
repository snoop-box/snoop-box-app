<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ranking Mesas</title>

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  color:#fff;
  min-height:100vh;
  background:
  linear-gradient(135deg,#0b1f5e,#111,#7f1d1d);
}

.wrap{
  max-width:760px;
  margin:auto;
  padding:24px;
}

.topTitle{
  text-align:center;
  font-size:38px;
  font-weight:bold;
  margin-bottom:8px;
}

.sub{
  text-align:center;
  color:#ddd;
  margin-bottom:28px;
}

.podium{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:14px;
  margin-bottom:28px;
}

.place{
  border-radius:22px;
  padding:20px;
  text-align:center;
  background:rgba(255,255,255,.08);
  backdrop-filter:blur(10px);
  box-shadow:0 15px 35px rgba(0,0,0,.25);
}

.first{
  transform:scale(1.08);
  border:2px solid gold;
}

.second{
  border:2px solid silver;
}

.third{
  border:2px solid #cd7f32;
}

.medal{
  font-size:36px;
}

.tableName{
  font-size:28px;
  font-weight:bold;
  margin-top:8px;
}

.points{
  font-size:20px;
  margin-top:6px;
  color:#f8fafc;
}

.list{
  margin-top:10px;
}

.row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:rgba(255,255,255,.06);
  margin-bottom:10px;
  padding:16px;
  border-radius:16px;
}

.left{
  font-size:22px;
  font-weight:bold;
}

.right{
  font-size:18px;
  color:#ddd;
}

.empty{
  text-align:center;
  padding:40px;
  color:#ddd;
}
</style>
</head>
<body>

<div class="wrap">

<div class="topTitle">
🏆 Ranking Mesas
</div>

<div class="sub" id="eventName">
Cargando...
</div>

<div class="podium" id="podium"></div>

<div class="list" id="list"></div>

</div>

<script>

const eventName =
new URLSearchParams(location.search)
.get("event") || "";

async function loadRanking(){

 if(!eventName){
  document.body.innerHTML =
  "<div style='padding:30px;color:white'>Falta ?event=</div>";
  return;
 }

 document.getElementById(
 "eventName"
 ).innerText =
 eventName;

 const res =
 await fetch(
 "/ranking/" +
 encodeURIComponent(eventName)
 );

 const data =
 await res.json();

 renderRanking(data);

}

/* ===================== */

function renderRanking(data){

 const podium =
 document.getElementById(
 "podium"
 );

 const list =
 document.getElementById(
 "list"
 );

 podium.innerHTML = "";
 list.innerHTML = "";

 if(!data.length){

  list.innerHTML =
  `<div class="empty">
   Aún no hay puntos cargados
   </div>`;

  return;

 }

 /* TOP 3 */

 const top =
 data.slice(0,3);

 const medals =
 ["🥇","🥈","🥉"];

 const classes =
 ["first","second","third"];

 top.forEach((r,i)=>{

  podium.innerHTML += `
  <div class="place ${classes[i]}">

   <div class="medal">
   ${medals[i]}
   </div>

   <div class="tableName">
   Mesa ${r.table || "-"}
   </div>

   <div class="points">
   ${r.points || 0} pts
   </div>

  </div>
  `;

 });

 /* RESTO */

 data.slice(3).forEach((r,i)=>{

  list.innerHTML += `
  <div class="row">

   <div class="left">
   ${i+4}. Mesa ${r.table || "-"}
   </div>

   <div class="right">
   ${r.points || 0} pts
   </div>

  </div>
  `;

 });

}

/* ===================== */

loadRanking();

setInterval(()=>{
 loadRanking();
},5000);

</script>

</body>
</html>
