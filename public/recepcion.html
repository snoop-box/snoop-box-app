<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recepción</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#111;
  color:white;
}

#top{
  padding:15px;
  text-align:center;
  background:#000;
  border-bottom:2px solid #222;
}

#counter{
  font-size:20px;
  color:#0f0;
}

#search{
  width:90%;
  padding:15px;
  margin:10px auto;
  display:block;
  border-radius:10px;
  border:none;
  font-size:18px;
}

#list{
  padding:10px;
}

.guest{
  background:#222;
  margin:8px 0;
  padding:15px;
  border-radius:12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  transition:0.3s;
}

.checked{
  background:#063;
}

.name{
  font-size:18px;
}

.table{
  font-size:14px;
  color:#ccc;
}

.btn{
  background:#ff0055;
  border:none;
  color:white;
  padding:10px 14px;
  border-radius:8px;
  margin-left:5px;
  font-size:14px;
}

#qrModal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:999;
}

#qrModal.active{
  display:flex;
}

#qrText{
  margin-bottom:15px;
  font-size:20px;
}
</style>
</head>

<body>

<div id="top">
  <h2>Recepción</h2>
  <div id="counter">0 / 0 invitados</div>
</div>

<input id="search" placeholder="Buscar invitado...">

<div id="list"></div>

<div id="qrModal" onclick="closeQR()">
  <div id="qrText">Escaneá para ingresar 📱</div>
  <canvas id="qr"></canvas>
</div>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<script>

let guests = [];

// 🔥 CHEQUEAR ESTADO DEL EVENTO
function checkEvent(){
  return fetch("/event-status")
  .then(r=>r.json())
  .then(data=>{
    if(!data.active){
      document.body.innerHTML = "<h1 style='text-align:center;margin-top:50px'>🚫 Evento cerrado</h1>";
      return false;
    }
    return true;
  });
}

// 🔥 INICIO
checkEvent().then(active=>{
  if(active) loadGuests();
});

// 🔥 CARGAR INVITADOS
function loadGuests(){
  fetch("/guests")
  .then(r=>r.json())
  .then(data=>{
    guests = data;
    render();
    updateCounter();
  });
}

// 🔍 BUSCADOR
document.getElementById("search").addEventListener("input",render);

// 🎯 CONTADOR
function updateCounter(){
  const total = guests.length;
  const checked = guests.filter(g=>g.checked).length;

  document.getElementById("counter").innerText =
    checked + " / " + total + " invitados";
}

// 🎨 RENDER
function render(){
  const search = document.getElementById("search").value.toLowerCase();
  const list = document.getElementById("list");
  list.innerHTML = "";

  guests
  .filter(g=>g.name.toLowerCase().includes(search))
  .sort((a,b)=>a.checked - b.checked)
  .forEach(g=>{
    const div = document.createElement("div");
    div.className = "guest" + (g.checked ? " checked" : "");

    div.innerHTML = `
      <div>
        <div class="name">${g.name}</div>
        <div class="table">Mesa ${g.table}</div>
      </div>

      <div>
        <button class="btn" onclick="checkin('${g.token}')">✔</button>
        <button class="btn" onclick="showQR('${g.token}')">QR</button>
      </div>
    `;

    list.appendChild(div);
  });
}

// ✔ CHECK-IN
function checkin(token){
  fetch("/checkin/"+token,{method:"POST"})
  .then(()=>{
    showQR(token);
    loadGuests();
  });
}

// 📱 MOSTRAR QR
function showQR(token){
  const url = location.origin + "/?token=" + token;

  const modal = document.getElementById("qrModal");
  modal.classList.add("active");

  const canvas = document.getElementById("qr");
  QRCode.toCanvas(canvas, url, { width:300 });
}

// ❌ CERRAR QR
function closeQR(){
  document.getElementById("qrModal").classList.remove("active");
}

</script>

</body>
</html>
