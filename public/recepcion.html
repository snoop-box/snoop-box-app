<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Admin</title>
<style>
body{
  font-family:Arial;
  background:#111;
  color:white;
  text-align:center;
}

input{
  display:block;
  margin:10px auto;
  padding:10px;
  width:80%;
}

button{
  padding:12px;
  background:#ff0055;
  color:white;
  border:none;
}
</style>
</head>

<body>

<h2>Crear Evento</h2>

<input id="eventName" placeholder="Nombre evento">
<input id="bgUrl" placeholder="URL fondo DJ">
<input id="frameUrl" placeholder="URL frame impresión">

<label>
  <input type="checkbox" id="eventActive" checked>
  Evento activo
</label>

<button onclick="createEvent()">Crear</button>

<script>

function createEvent(){

  const name = document.getElementById("eventName").value;
  const active = document.getElementById("eventActive").checked;
  const background = document.getElementById("bgUrl").value;
  const frame = document.getElementById("frameUrl").value;

  fetch("/create-event", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      name,
      active,
      background,
      frame
    })
  })
  .then(r=>r.json())
  .then(data=>{
    if(data.success){
      alert("Evento creado 🔥");
    }
  });
}

</script>

</body>
</html>
