<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Recepción V2</title>

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  padding:25px;
  color:#fff;
  background:
  linear-gradient(135deg,#0b1f5e,#1e3a8a,#7f1d1d,#dc2626);
  min-height:100vh;
}

.wrap{
  max-width:850px;
  margin:auto;
}

.box{
  background:rgba(255,255,255,0.07);
  backdrop-filter:blur(10px);
  padding:22px;
  border-radius:20px;
  margin-bottom:20px;
  box-shadow:0 10px 30px rgba(0,0,0,.25);
}

input{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  margin:10px 0;
  box-sizing:border-box;
  font-size:16px;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  background:#ff0055;
  color:#fff;
  font-size:16px;
  cursor:pointer;
  margin-top:8px;
}

.guest{
  background:rgba(255,255,255,0.06);
  padding:16px;
  border-radius:16px;
  margin-bottom:12px;
}

.row{
  display:flex;
  gap:10px;
  margin-top:10px;
}

.small{
  flex:1;
  background:#334155;
  padding:10px;
  font-size:14px;
}

.green{
  color:#00ff99;
  font-weight:bold;
}

.qrWrap{
  margin-top:12px;
  display:flex;
  gap:15px;
  align-items:center;
  flex-wrap:wrap;
}

.qr{
  background:#fff;
  padding:8px;
  border-radius:10px;
}

.qrText{
  font-size:15px;
  max-width:220px;
  line-height:1.4;
  color:#f8fafc;
}

#app{
  display:none;
}

#eventTitle{
  text-align:center;
  font-size:32px;
  margin:0 0 10px 0;
  font-weight:bold;
  animation:fadeGlow 2s ease-in-out infinite alternate;
}

#counter{
  text-align:center;
  margin-bottom:10px;
}

#loginBox h1{
  text-align:center;
}

@keyframes fadeGlow{
  from{
    text-shadow:0 0 5px rgba(255,255,255,.2);
  }
  to{
    text-shadow:0 0 20px rgba(255,0,90,.6);
  }
}
</style>
</head>
<body>

<div class="wrap">

<div class="box" id="loginBox">
<h1>Recepción</h1>

<input type="text" id="eventInput" placeholder="Nombre del evento">

<button onclick="loginEvent()">Ingresar</button>

<div id="loginStatus"></div>
</div>

<div id="app">

<div class="box">
<h2 id="eventTitle"></h2>

<div id="counter">Cargando...</div>

<input type="text"
id="search"
placeholder="Buscar invitado"
oninput="renderGuests()">
</div>

<div id="guestList"></div>

</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<script>
let currentEvent = null;
let guests = [];

async function loginEvent(){

  const name =
  document.getElementById("eventInput")
  .value.trim();

  const status =
  document.getElementById("loginStatus");

  if(!name){
    status.innerText="Escribí nombre";
    return;
  }

  const res =
  await fetch("/event/"+encodeURIComponent(name));

  const data = await res.json();

  if(!data.success){
    status.innerText="Evento no encontrado";
    return;
  }

  currentEvent = data.event;

  document.getElementById("loginBox").style.display="none";
  document.getElementById("app").style.display="block";
  document.getElementById("eventTitle").innerText=currentEvent.name;

  loadGuests();
}

async function loadGuests(){

  const res =
  await fetch("/guests/"+currentEvent.id);

  guests = await res.json();

  renderGuests();
}

function guestName(g){
  return g.name || "Sin nombre";
}

function guestTable(g){
  return g.table || "-";
}

function renderGuests(){

  const txt =
  document.getElementById("search")
  .value.toLowerCase();

  const box =
  document.getElementById("guestList");

  const filtered =
  guests.filter(g =>
    guestName(g)
    .toLowerCase()
    .includes(txt)
  );

  box.innerHTML="";

  filtered.forEach(g=>{

    box.innerHTML += `
    <div class="guest">

      <strong>${guestName(g)}</strong><br>
      Mesa: ${guestTable(g)}

      <div class="row">

      ${
        g.arrived
        ? '<span class="green">✔ Presente</span>'
        : `<button class="small"
           onclick="markArrived(${g.id})">
           Llegó
           </button>`
      }

      <button class="small"
      onclick="showQR(${g.id})">
      QR
      </button>

      </div>

      <div id="qr_${g.id}"></div>

    </div>
    `;
  });

  document.getElementById("counter")
  .innerText =
  "Presentes: " +
  guests.filter(g=>g.arrived).length +
  " / " +
  guests.length;

}

async function markArrived(id){

  await fetch(
    "/arrive/"+currentEvent.id+"/"+id,
    {method:"POST"}
  );

  loadGuests();
}

function showQR(id){

  const guest =
  guests.find(g=>g.id===id);

  const code =
  currentEvent.name +
  "|" + id +
  "|" + guestName(guest);

  const box =
  document.getElementById("qr_"+id);

  box.innerHTML =
  `
  <div class="qrWrap">
    <canvas id="canvas_${id}" class="qr"></canvas>
    <div class="qrText">
      Escaneá y comenzá a participar del evento
    </div>
  </div>
  `;

  QRCode.toCanvas(
    document.getElementById("canvas_"+id),
    code,
    {width:150}
  );

}
</script>

</body>
</html>
