<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Recepción Premium</title>

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  padding:25px;
  color:#fff;
  background:
  linear-gradient(135deg,#0b1f5e,#1e3a8a,#7f1d1d,#dc2626);
  min-height:100vh;
}

.wrap{
  max-width:850px;
  margin:auto;
}

.box{
  background:rgba(255,255,255,.08);
  backdrop-filter:blur(12px);
  padding:22px;
  border-radius:22px;
  margin-bottom:20px;
  box-shadow:0 10px 35px rgba(0,0,0,.28);
}

input{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  margin:10px 0;
  box-sizing:border-box;
  font-size:16px;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  background:#ff0055;
  color:#fff;
  font-size:16px;
  cursor:pointer;
  margin-top:8px;
}

.guest{
  background:rgba(255,255,255,.07);
  padding:18px;
  border-radius:18px;
  margin-bottom:14px;
  box-shadow:0 8px 20px rgba(0,0,0,.18);
}

.guestName{
  font-size:28px;
  font-weight:bold;
  margin-bottom:6px;
}

.table{
  color:#e5e7eb;
  font-size:16px;
}

.row{
  display:flex;
  gap:10px;
  margin-top:12px;
}

.small{
  flex:1;
  background:#334155;
  padding:10px;
  font-size:14px;
}

.green{
  color:#00ff99;
  font-weight:bold;
  font-size:18px;
}

.qrWrap{
  margin-top:14px;
  display:flex;
  gap:16px;
  align-items:center;
  flex-wrap:wrap;
}

.qr{
  background:#fff;
  padding:8px;
  border-radius:12px;
}

.qrCard{
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.15);
  padding:14px;
  border-radius:16px;
  max-width:250px;
  box-shadow:0 0 18px rgba(255,0,90,.18);
}

.qrTitle{
  font-size:18px;
  font-weight:bold;
  margin-bottom:6px;
}

.qrText{
  font-size:15px;
  line-height:1.45;
  color:#f8fafc;
}

#app{
  display:none;
}

#venueLogo{
  display:none;
  max-width:220px;
  max-height:90px;
  margin:0 auto 15px auto;
  object-fit:contain;
  opacity:0;
  transform:translateY(-15px) scale(.92);
  filter:drop-shadow(0 0 14px rgba(255,255,255,.18));
}

#venueLogo.show{
  animation:logoEnter 1s ease forwards;
}

#eventTitle{
  text-align:center;
  font-size:34px;
  margin:0 0 10px 0;
  font-weight:bold;
  animation:fadeGlow 2s ease-in-out infinite alternate;
}

#counter{
  text-align:center;
  margin-bottom:10px;
  font-size:18px;
}

#loginBox h1{
  text-align:center;
}

/* SCREENSAVER */

#screensaver{
  position:fixed;
  inset:0;
  background:#000;
  display:none;
  z-index:9999;
  align-items:center;
  justify-content:center;
  flex-direction:column;
}

#screensaver img{
  max-width:420px;
  max-height:220px;
  object-fit:contain;
  animation:pulseLogo 2s ease-in-out infinite;
}

#screensaverText{
  margin-top:20px;
  color:#999;
  font-size:18px;
  letter-spacing:1px;
}

@keyframes pulseLogo{
  0%{transform:scale(1);opacity:.85;}
  50%{transform:scale(1.03);opacity:1;}
  100%{transform:scale(1);opacity:.85;}
}

@keyframes logoEnter{
  0%{opacity:0;transform:translateY(-15px) scale(.92);}
  60%{opacity:1;transform:translateY(3px) scale(1.02);}
  100%{opacity:1;transform:translateY(0) scale(1);}
}

@keyframes fadeGlow{
  from{text-shadow:0 0 6px rgba(255,255,255,.2);}
  to{text-shadow:0 0 22px rgba(255,0,90,.65);}
}
</style>
</head>
<body>

<div id="screensaver" onclick="wakeScreen()">
  <img id="ssLogo">
  <div id="screensaverText">
    Tocá la pantalla para continuar
  </div>
</div>

<div class="wrap">

<div class="box" id="loginBox">

<h1>Recepción</h1>

<input
type="text"
id="eventInput"
placeholder="Nombre del evento">

<button onclick="loginEvent()">
Ingresar
</button>

<div id="loginStatus"></div>

</div>

<div id="app">

<div class="box">

<img id="venueLogo">

<h2 id="eventTitle"></h2>

<div id="counter">Cargando...</div>

<input
type="text"
id="search"
placeholder="Buscar invitado"
oninput="renderGuests()">

</div>

<div id="guestList"></div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<script>

let currentEvent = null;
let guests = [];
let idleTimer = null;

/* ===================== */

function resetIdle(){

 clearTimeout(idleTimer);

 idleTimer = setTimeout(()=>{
  startScreensaver();
 },30000);

}

function startScreensaver(){

 if(!currentEvent) return;
 if(!currentEvent.logoVenue) return;

 ssLogo.src =
 currentEvent.logoVenue;

 screensaver.style.display =
 "flex";

}

function wakeScreen(){

 screensaver.style.display =
 "none";

 resetIdle();

}

["click","touchstart","mousemove","keydown"]
.forEach(evt=>{
 document.addEventListener(
  evt,
  resetIdle
 );
});

/* ===================== */

async function loginEvent(){

 const name =
 eventInput.value.trim();

 if(!name){
  loginStatus.innerText =
  "Escribí nombre";
  return;
 }

 const res =
 await fetch(
 "/event/" +
 encodeURIComponent(name)
 );

 const data =
 await res.json();

 if(!data.success){
  loginStatus.innerText =
  "Evento no encontrado";
  return;
 }

 currentEvent =
 data.event;

 loginBox.style.display =
 "none";

 app.style.display =
 "block";

 if(currentEvent.logoVenue){

  venueLogo.src =
  currentEvent.logoVenue;

  venueLogo.style.display =
  "block";

  setTimeout(()=>{
   venueLogo.classList
   .add("show");
  },150);

 }

 eventTitle.innerText =
 currentEvent.name;

 loadGuests();
 resetIdle();

}

/* ===================== */

async function loadGuests(){

 const res =
 await fetch(
 "/guests/" +
 currentEvent.id
 );

 guests =
 await res.json();

 renderGuests();

}

function guestName(g){
 return g.name || "Sin nombre";
}

function guestTable(g){
 return g.table || "-";
}

/* ===================== */

function renderGuests(){

 const txt =
 search.value
 .toLowerCase();

 const filtered =
 guests.filter(g =>
 guestName(g)
 .toLowerCase()
 .includes(txt)
 );

 guestList.innerHTML = "";

 filtered.forEach(g=>{

  guestList.innerHTML += `
  <div class="guest">

   <div class="guestName">
   ${guestName(g)}
   </div>

   <div class="table">
   Mesa: ${guestTable(g)}
   </div>

   <div class="row">

   ${
    g.arrived
    ? '<span class="green">✔ Presente</span>'
    : `<button class="small"
       onclick="markArrived(${g.id})">
       Llegó
       </button>`
   }

   <button class="small"
   onclick="showQR(${g.id})">
   QR
   </button>

   </div>

   <div id="qr_${g.id}"></div>

  </div>
  `;

 });

 counter.innerText =
 "Presentes: " +
 guests.filter(g=>g.arrived).length +
 " / " +
 guests.length;

}

/* ===================== */

async function markArrived(id){

 await fetch(
 "/arrive/" +
 currentEvent.id +
 "/" +
 id,
 {method:"POST"}
 );

 loadGuests();
 resetIdle();

}

/* ===================== */
/* QR FIX */
/* ===================== */

function showQR(id){

 const guest =
 guests.find(g=>g.id===id);

 const code =
 location.origin +
 "/?event=" +
 encodeURIComponent(
 currentEvent.name
 ) +
 "&name=" +
 encodeURIComponent(
 guest.name || "Invitado"
 ) +
 "&table=" +
 encodeURIComponent(
 guest.table || "-"
 );

 const box =
 document.getElementById(
 "qr_"+id
 );

 box.innerHTML = `
 <div class="qrWrap">

   <canvas id="canvas_${id}"
   class="qr"></canvas>

   <div class="qrCard">

     <div class="qrTitle">
     ✨ Tu acceso interactivo
     </div>

     <div class="qrText">
     Escaneá este código y entrá
     directo al evento desde tu celular.
     </div>

   </div>

 </div>
 `;

 QRCode.toCanvas(
  document.getElementById(
   "canvas_"+id
  ),
  code,
  {width:150}
 );

 resetIdle();

}

</script>

</body>
</html>
