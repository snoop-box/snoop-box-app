<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tótem Snoop Box</title>

<style>
body {
  margin: 0;
  background: radial-gradient(circle,#111,#000);
  font-family: Arial;
  color: white;
}

/* GRID */
#grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px,1fr));
  gap: 12px;
  padding: 12px;
}

.card {
  position: relative;
  border-radius: 12px;
  overflow: hidden;
}

.card img {
  width: 100%;
  height: 260px;
  object-fit: cover;
}

/* BORRAR */
.deleteBtn {
  position:absolute;
  top:8px;
  right:8px;
  background:red;
  border:none;
  color:white;
  width:26px;
  height:26px;
  border-radius:50%;
  cursor:pointer;
}

/* NOMBRE */
.name {
  position:absolute;
  bottom:0;
  width:100%;
  background:rgba(0,0,0,0.6);
  padding:6px;
}

/* MODAL */
#modal {
  position: fixed;
  width:100%;
  height:100%;
  top:0;
  left:0;
  display:none;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.85);
}

.frame {
  position:relative;
  width:300px;
  height:450px;
}

.frame img {
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
}

/* QR */
#qrBox {
  position:fixed;
  bottom:15px;
  left:15px;
  background:white;
  padding:10px;
  border-radius:12px;
  color:black;
  text-align:center;
}

#qrBox img {
  width:120px;
}

/* RANKING PRO */
#rankingBox {
  position:fixed;
  top:15px;
  right:15px;
  background:rgba(0,0,0,0.8);
  padding:15px;
  border-radius:12px;
  font-size:18px;
  border:2px solid gold;
  animation:pulse 2s infinite;
}

@keyframes pulse {
  0% { box-shadow:0 0 8px gold; }
  50% { box-shadow:0 0 20px gold; }
  100% { box-shadow:0 0 8px gold; }
}

button {
  padding:10px;
  margin:10px;
}
</style>
</head>

<body>

<div id="grid"></div>

<div id="rankingBox"></div>

<div id="qrBox">
  <img id="qrImg">
  <div>Subí tus fotos 📸</div>
</div>

<div id="modal">
  <div>
    <div class="frame">
      <img id="modalPhoto">
      <img id="frameOverlay">
    </div>
    <div style="text-align:center">
      <button onclick="printPhoto()">Imprimir</button>
      <button onclick="closeModal()">Cerrar</button>
    </div>
  </div>
</div>

<script>

const eventId = new URLSearchParams(location.search).get("event") || "default";

let photosData = [];
let selectedPhoto = "";
let frameUrl = "";

// CONFIG
async function loadConfig(){
  const res = await fetch("/event/"+eventId);
  const config = await res.json();

  if(config.frame){
    frameUrl = config.frame;
    frameOverlay.src = frameUrl;
  }

  const link = location.origin + "/?event=" + eventId;
  qrImg.src = "https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=" + encodeURIComponent(link);
}

// FOTOS
async function loadPhotos(){
  const res = await fetch("/photos/"+eventId);
  const data = await res.json();

  photosData = data.reverse();

  grid.innerHTML = "";

  photosData.forEach(p => {

    const div = document.createElement("div");
    div.className="card";

    div.innerHTML = `
      <img src="${p.url}">
      <div class="name">${p.name}</div>
      <button class="deleteBtn">X</button>
    `;

    div.onclick = () => openModal(p.url);

    div.querySelector(".deleteBtn").onclick = async(e)=>{
      e.stopPropagation();

      await fetch("/photo",{
        method:"DELETE",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({url:p.url})
      });

      loadPhotos();
    };

    grid.appendChild(div);
  });
}

// MODAL
function openModal(url){
  selectedPhoto = url;
  modal.style.display="flex";
  modalPhoto.src = url;
}

function closeModal(){
  modal.style.display="none";
}

// PRINT
function printPhoto(){
  const win = window.open("", "_blank");

  win.document.write(`
    <html>
    <body style="margin:0; display:flex; justify-content:center; align-items:center; height:100vh;">
      <div style="position:relative; width:600px; height:900px;">
        <img src="${selectedPhoto}" style="position:absolute; width:100%; height:100%; object-fit:cover;">
        <img src="${frameUrl}" style="position:absolute; width:100%; height:100%;">
      </div>
    </body>
    </html>
  `);

  win.document.close();

  setTimeout(()=>{
    win.print();
    win.close();
  },500);
}

// RANKING
async function loadRanking(){
  const res = await fetch("/ranking/"+eventId);
  const data = await res.json();

  let html = "<strong>🏆 Ranking</strong><br>";

  data.slice(0,3).forEach((r,i)=>{
    html += `${i+1}. Mesa ${r.table} (${r.points})<br>`;
  });

  rankingBox.innerHTML = html;
}

// INIT
loadConfig();
loadPhotos();
loadRanking();

setInterval(()=>{
  loadPhotos();
  loadRanking();
},4000);

</script>

</body>
</html>
