<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tótem Snoop Box</title>

<style>
body{
  margin:0;
  background:radial-gradient(circle,#111,#000);
  font-family:Arial;
  color:#fff;
}

#grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:12px;
  padding:12px;
}

.card{
  position:relative;
  border-radius:12px;
  overflow:hidden;
}

.card img{
  width:100%;
  height:260px;
  object-fit:cover;
}

.deleteBtn{
  position:absolute;
  top:8px;
  right:8px;
  background:red;
  border:none;
  color:#fff;
  width:26px;
  height:26px;
  border-radius:50%;
  cursor:pointer;
}

#cameraBtn{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#ff0055;
  padding:15px 20px;
  border-radius:12px;
  font-size:18px;
  cursor:pointer;
}

#cameraModal{
  position:fixed;
  inset:0;
  display:none;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,.9);
  z-index:1000;
}

#video{
  width:60%;
  max-width:700px;
  border-radius:20px;
  transform:scaleX(-1);
}

#countdown{
  position:absolute;
  font-size:120px;
  font-weight:bold;
}

#flash{
  position:fixed;
  inset:0;
  background:#fff;
  opacity:0;
  pointer-events:none;
  z-index:2000;
}

#qrBox{
  position:fixed;
  bottom:15px;
  left:15px;
  background:#fff;
  color:#000;
  padding:10px;
  border-radius:12px;
}

#qrBox img{
  width:120px;
}

#rankingBox{
  position:fixed;
  top:15px;
  right:15px;
  background:rgba(0,0,0,.8);
  padding:15px;
  border-radius:12px;
  border:2px solid gold;
}

#modal{
  position:fixed;
  inset:0;
  display:none;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,.9);
  z-index:1500;
}

#modalInner{
  text-align:center;
}

#modal img{
  max-width:320px;
  border-radius:14px;
}

#modal button{
  margin:10px;
  padding:12px 18px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}
</style>
</head>
<body>

<div id="grid"></div>

<div id="rankingBox"></div>

<div id="qrBox">
  <img id="qrImg">
  <div>Subí tus fotos 📸</div>
</div>

<div id="cameraBtn">📸 Sacar foto</div>

<div id="cameraModal">
  <video id="video" autoplay playsinline></video>
  <div id="countdown"></div>
</div>

<canvas id="canvas" style="display:none;"></canvas>
<div id="flash"></div>

<div id="modal">
  <div id="modalInner">
    <img id="modalPhoto">
    <br>
    <button onclick="closeModal()">Cerrar</button>
  </div>
</div>

<script>

const eventId =
new URLSearchParams(location.search)
.get("event") || "default";

let stream = null;
let selectedPhoto = "";

/* ===================== */

cameraBtn.onclick = startCamera;

/* ===================== */

function buildQR(){

 const link =
 location.origin +
 "/?event=" +
 eventId;

 qrImg.src =
 "https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=" +
 encodeURIComponent(link);

}

/* ===================== */

async function startCamera(){

 try{

  stream =
   await navigator.mediaDevices
   .getUserMedia({video:true});

  video.srcObject = stream;

  cameraModal.style.display =
   "flex";

  startCountdown();

 }catch(err){

  alert("No se pudo abrir cámara");

 }

}

/* ===================== */

function startCountdown(){

 let count = 3;

 countdown.innerText = count;

 const timer = setInterval(()=>{

  count--;

  if(count > 0){

   countdown.innerText = count;

  }else{

   clearInterval(timer);

   countdown.innerText = "";

   takePhoto();

  }

 },1000);

}

/* ===================== */

async function takePhoto(){

 const canvas =
 document.getElementById("canvas");

 canvas.width =
 video.videoWidth || 640;

 canvas.height =
 video.videoHeight || 480;

 const ctx =
 canvas.getContext("2d");

 ctx.translate(canvas.width,0);
 ctx.scale(-1,1);

 ctx.drawImage(
  video,
  0,
  0
 );

 flash.style.opacity = 1;

 setTimeout(()=>{
  flash.style.opacity = 0;
 },150);

 const blob =
 await (await fetch(
  canvas.toDataURL(
   "image/jpeg",
   0.9
  )
 )).blob();

 const fd =
 new FormData();

 fd.append(
  "photo",
  blob,
  "photo.jpg"
 );

 fd.append(
  "name",
  "Cabina"
 );

 fd.append(
  "table",
  "Totem"
 );

 fd.append(
  "event",
  eventId
 );

 const upload =
 await fetch("/upload",{
  method:"POST",
  body:fd
 });

 const result =
 await upload.json();

 if(result.success){

  loadPhotos();

 }else{

  alert("Error subiendo foto");

 }

 cameraModal.style.display =
  "none";

 if(stream){
  stream.getTracks()
  .forEach(t=>t.stop());
 }

}

/* ===================== */

async function loadPhotos(){

 try{

  const res =
   await fetch(
    "/photos/" + eventId
   );

  const data =
   await res.json();

  grid.innerHTML = "";

  if(!Array.isArray(data)){
   return;
  }

  data.forEach(p=>{

   const div =
    document.createElement("div");

   div.className = "card";

   div.innerHTML = `
    <img src="${p.url}">
    <button class="deleteBtn">X</button>
   `;

   div.onclick = ()=>{
    openModal(p.url);
   };

   div.querySelector(".deleteBtn")
   .onclick = async(e)=>{

    e.stopPropagation();

    await fetch("/photo",{
      method:"DELETE",
      headers:{
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        url:p.url
      })
    });

    loadPhotos();

   };

   grid.appendChild(div);

  });

 }catch(err){

  console.log("Error galería");

 }

}

/* ===================== */

async function loadRanking(){

 try{

  const res =
   await fetch(
    "/ranking/" + eventId
   );

  const data =
   await res.json();

  let html =
   "<strong>🏆 Ranking</strong><br>";

  data.slice(0,3)
  .forEach((r,i)=>{

   html +=
    (i+1) +
    ". Mesa " +
    (r.table || "-") +
    " (" +
    (r.points || 0) +
    ")<br>";

  });

  rankingBox.innerHTML =
   html;

 }catch(err){}

}

/* ===================== */

function openModal(url){

 selectedPhoto = url;

 modal.style.display =
  "flex";

 modalPhoto.src = url;

}

function closeModal(){

 modal.style.display =
  "none";

}

/* ===================== */

buildQR();
loadPhotos();
loadRanking();

setInterval(()=>{
 loadPhotos();
 loadRanking();
},4000);

</script>

</body>
</html>
