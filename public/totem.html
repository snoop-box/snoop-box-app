<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tótem Snoop Box</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  background: radial-gradient(circle,#111,#000);
  font-family: Arial;
  color: white;
}

/* GRID */
#grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px,1fr));
  gap: 12px;
  padding: 12px;
}

.card {
  position: relative;
  overflow: hidden;
  border-radius: 12px;
  cursor: pointer;
}

.card img {
  width: 100%;
  height: 260px;
  object-fit: cover;
}

.name {
  position: absolute;
  bottom: 0;
  width: 100%;
  padding: 8px;
  background: rgba(0,0,0,0.6);
}

/* MODAL */
#modal {
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.85);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-box {
  background: white;
  padding: 20px;
  border-radius: 16px;
}

/* FRAME */
.frame {
  position: relative;
  width: 300px;
  height: 450px;
  background: black;
}

.frame img.photo {
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
}

.frame img.overlay {
  position:absolute;
  width:100%;
  height:100%;
}

/* BOTONES */
button {
  padding:14px;
  margin:10px;
  border:none;
  border-radius:10px;
  font-size:16px;
}

.ok { background:green; color:white; }
.no { background:red; color:white; }

</style>
</head>

<body>

<div id="grid"></div>

<div id="modal">
  <div class="modal-box">

    <div class="frame">
      <img id="modalPhoto" class="photo">
      <img id="frameOverlay" class="overlay">
    </div>

    <div>
      <button class="ok" onclick="printPhoto()">Imprimir</button>
      <button class="no" onclick="closeModal()">Cancelar</button>
    </div>

  </div>
</div>

<script>

const eventId = new URLSearchParams(location.search).get("event") || "default";

let selectedPhoto = null;
let frameUrl = "";

// 🔥 CARGAR CONFIG EVENTO
async function loadConfig(){
  const res = await fetch("/event/" + eventId);
  const config = await res.json();

  if(config.frame){
    frameUrl = config.frame;
    document.getElementById("frameOverlay").src = frameUrl;
  }
}

// FOTOS
async function loadPhotos() {
  const res = await fetch("/photos/" + eventId);
  const data = await res.json();

  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  data.reverse().forEach(p => {

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <img src="${p.url}">
      <div class="name">${p.name}</div>
    `;

    div.onclick = () => openModal(p.url);

    grid.appendChild(div);
  });
}

// MODAL
function openModal(url) {
  selectedPhoto = url;
  modal.style.display = "flex";
  modalPhoto.src = url;
}

function closeModal() {
  modal.style.display = "none";
}

// 🔥 IMPRESIÓN CON FRAME DINÁMICO
function printPhoto(){

  const win = window.open("", "_blank");

  win.document.write(`
    <html>
    <body style="margin:0; display:flex; justify-content:center; align-items:center; height:100vh;">
      <div style="position:relative; width:600px; height:900px;">
        <img src="${selectedPhoto}" style="position:absolute; width:100%; height:100%; object-fit:cover;">
        <img src="${frameUrl}" style="position:absolute; width:100%; height:100%;">
      </div>
    </body>
    </html>
  `);

  win.document.close();

  setTimeout(()=>{
    win.print();
    win.close();
  },500);

  closeModal();
}

// INIT
loadConfig();
loadPhotos();
setInterval(loadPhotos,4000);

</script>

</body>
</html>
