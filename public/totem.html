<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tótem Snoop Box</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  background: radial-gradient(circle,#111,#000);
  font-family: Arial;
  color: white;
}

/* GRID */
#grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px,1fr));
  gap: 12px;
  padding: 12px;
}

/* CARD */
.card {
  position: relative;
  overflow: hidden;
  border-radius: 12px;
  cursor: pointer;
}

.card img {
  width: 100%;
  height: 260px;
  object-fit: cover;
  transition: transform 0.3s;
}

.card:hover img {
  transform: scale(1.08);
}

.name {
  position: absolute;
  bottom: 0;
  width: 100%;
  padding: 8px;
  font-size: 16px;
  background: rgba(0,0,0,0.6);
}

/* MODAL */
#modal {
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.85);
  display:none;
  justify-content: center;
  align-items: center;
}

.modal-box {
  background: white;
  padding: 20px;
  border-radius: 16px;
  text-align: center;
}

/* FRAME */
.frame {
  position: relative;
  width: 300px;
  height: 450px;
  background: black;
  overflow: hidden;
}

.frame img.photo {
  position: absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  object-fit: cover;
  object-position: center;
}

.frame img.overlay {
  position: absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
}

/* BOTONES */
.buttons {
  margin-top: 15px;
}

button {
  padding: 14px 24px;
  margin: 10px;
  font-size: 18px;
  border-radius: 10px;
  border: none;
}

.ok { background: green; color:white; }
.no { background: red; color:white; }

/* FLASH */
#flash {
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:white;
  opacity:0;
  pointer-events:none;
  transition: opacity 0.2s;
}

/* RANKING */
#rankingBox {
  position: fixed;
  top: 15px;
  right: 15px;
  background: rgba(0,0,0,0.75);
  padding: 15px 20px;
  border-radius: 12px;
  font-size: 18px;
  line-height: 1.6;
}

/* CARRUSEL */
#idleCarousel {
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction: column;
}

.carousel-img {
  max-width:90%;
  max-height:80%;
  object-fit: contain;
  opacity: 0;
  transition: opacity 0.6s;
}

.carousel-img.show {
  opacity: 1;
}

.carousel-name {
  margin-top: 15px;
  font-size: 22px;
}
</style>
</head>

<body>

<div id="grid"></div>
<div id="rankingBox"></div>

<!-- MODAL -->
<div id="modal">
  <div class="modal-box">

    <div class="frame">
      <img id="modalPhoto" class="photo">
      <img src="frame.png" class="overlay">
    </div>

    <div class="buttons">
      <button class="ok" onclick="printPhoto()">✔ Imprimir</button>
      <button class="no" onclick="closeModal()">❌ Seguir buscando</button>
    </div>

  </div>
</div>

<!-- CARRUSEL -->
<div id="idleCarousel" onclick="closeCarousel()">
  <img id="carouselImg" class="carousel-img">
  <div id="carouselName" class="carousel-name"></div>
</div>

<div id="flash"></div>

<script>

const eventId = new URLSearchParams(location.search).get("event") || "default";

let selectedPhoto = null;
let photosData = [];

let idleTimer = null;
let carouselIndex = 0;
let carouselInterval = null;
let isCarouselActive = false;

/* ACTIVIDAD */
function resetIdleTimer() {
  if (idleTimer) clearTimeout(idleTimer);
  idleTimer = setTimeout(startCarousel, 10000);
}

["click","touchstart","mousemove"].forEach(evt=>{
  document.addEventListener(evt, ()=>{
    closeCarousel();
    resetIdleTimer();
  });
});

/* FOTOS */
async function loadPhotos() {
  const res = await fetch("/photos/" + eventId);
  const data = await res.json();

  photosData = data.reverse();

  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  photosData.forEach(p => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <img src="${p.url}">
      <div class="name">${p.name}</div>
    `;

    div.onclick = () => openModal(p.url);

    grid.appendChild(div);
  });
}

/* MODAL */
function openModal(url) {
  selectedPhoto = url;
  modal.style.display = "flex";
  modalPhoto.src = url;
}

function closeModal() {
  modal.style.display = "none";
}

/* FLASH */
function flashEffect() {
  const f = document.getElementById("flash");
  f.style.opacity = 1;
  setTimeout(()=>f.style.opacity=0,200);
}

/* IMPRESIÓN SIN PANTALLA BLANCA */
function printPhoto() {
  flashEffect();

  const iframe = document.createElement("iframe");
  iframe.style.position = "fixed";
  iframe.style.right = "0";
  iframe.style.bottom = "0";
  iframe.style.width = "0";
  iframe.style.height = "0";
  iframe.style.border = "0";

  document.body.appendChild(iframe);

  const doc = iframe.contentWindow.document;

  doc.open();
  doc.write(`
    <html>
    <head>
      <style>
        @page {
          size: 4in 6in;
          margin: 0;
        }
        body {
          margin: 0;
        }
        .print-area {
          position: relative;
          width: 4in;
          height: 6in;
        }
        .photo {
          position: absolute;
          top:0;
          left:0;
          width:100%;
          height:100%;
          object-fit: cover;
        }
        .frame {
          position:absolute;
          top:0;
          left:0;
          width:100%;
          height:100%;
        }
      </style>
    </head>
    <body>
      <div class="print-area">
        <img src="${selectedPhoto}" class="photo">
        <img src="frame.png" class="frame">
      </div>
    </body>
    </html>
  `);
  doc.close();

  setTimeout(() => {
    iframe.contentWindow.focus();
    iframe.contentWindow.print();

    setTimeout(() => {
      document.body.removeChild(iframe);
    }, 1000);
  }, 300);

  closeModal();
}

/* RANKING */
async function loadRanking() {
  const res = await fetch("/ranking/" + eventId);
  const data = await res.json();

  let html = "<strong>🏆 Ranking</strong><br>";

  data.slice(0,3).forEach((r,i)=>{
    html += `${i+1}. Mesa ${r.table} (${r.points})<br>`;
  });

  rankingBox.innerHTML = html;
}

/* CARRUSEL */
function startCarousel() {
  if (photosData.length === 0) return;
  if (isCarouselActive) return;

  isCarouselActive = true;

  const carousel = document.getElementById("idleCarousel");
  carousel.style.display = "flex";

  carouselIndex = 0;
  showSlide();

  carouselInterval = setInterval(() => {
    carouselIndex++;
    if (carouselIndex >= photosData.length) carouselIndex = 0;
    showSlide();
  }, 2500);
}

function showSlide() {
  const img = document.getElementById("carouselImg");
  const name = document.getElementById("carouselName");

  img.classList.remove("show");

  setTimeout(()=>{
    img.src = photosData[carouselIndex].url;
    name.innerText = photosData[carouselIndex].name;
    img.classList.add("show");
  },200);
}

function closeCarousel() {
  if (!isCarouselActive) return;

  isCarouselActive = false;
  document.getElementById("idleCarousel").style.display = "none";
  clearInterval(carouselInterval);
}

/* REFRESH */
setInterval(()=>{
  loadPhotos();
  loadRanking();
},4000);

/* INIT */
loadPhotos();
loadRanking();
resetIdleTimer();

</script>

</body>
</html>
