<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Tótem Snoop Box</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:radial-gradient(circle,#111,#000);
color:#fff;
overflow-x:hidden;
}

header{
padding:18px;
text-align:center;
background:rgba(255,255,255,.05);
backdrop-filter:blur(10px);
}

#eventTitle{
font-size:34px;
font-weight:bold;
}

#grid{
display:grid;
grid-template-columns:
repeat(auto-fill,minmax(260px,1fr));
gap:14px;
padding:18px;
padding-right:270px;
}

.card{
position:relative;
background:#1a1a1a;
border-radius:18px;
overflow:hidden;
cursor:pointer;
box-shadow:
0 10px 25px rgba(0,0,0,.35);
}

.card img{
width:100%;
height:280px;
object-fit:cover;
}

.info{
padding:12px;
}

.user{
font-size:22px;
font-weight:bold;
}

.table{
margin-top:4px;
color:#ccc;
}

.deleteBtn{
position:absolute;
top:10px;
right:10px;
width:36px;
height:36px;
display:flex;
justify-content:center;
align-items:center;
border-radius:50%;
background:rgba(0,0,0,.8);
z-index:30;
cursor:pointer;
}

#side{
position:fixed;
top:0;
right:0;
width:250px;
height:100%;
padding:16px;
box-sizing:border-box;
background:rgba(0,0,0,.82);
backdrop-filter:blur(10px);
overflow:auto;
}

#rankTitle{
font-size:26px;
font-weight:bold;
text-align:center;
margin-bottom:16px;
}

.rankRow{
display:flex;
justify-content:space-between;
padding:12px;
margin-bottom:10px;
border-radius:14px;
background:rgba(255,255,255,.06);
}

.gold{border:1px solid gold;}
.silver{border:1px solid silver;}
.bronze{border:1px solid #cd7f32;}

#qrBox{
margin-top:20px;
background:#fff;
color:#000;
padding:12px;
border-radius:18px;
text-align:center;
}

#qrImg{
width:140px;
}

#cameraBtn{
position:fixed;
bottom:20px;
right:20px;
padding:18px 24px;
border:none;
border-radius:16px;
background:#ff0055;
color:#fff;
font-size:20px;
cursor:pointer;
z-index:200;
}

#cameraModal{
position:fixed;
inset:0;
display:none;
justify-content:center;
align-items:center;
background:rgba(0,0,0,.9);
z-index:500;
}

#video{
width:70%;
max-width:800px;
border-radius:20px;
transform:scaleX(-1);
}

#countdown{
position:absolute;
font-size:140px;
font-weight:bold;
}

#canvas{
display:none;
}

#toast{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
padding:16px 28px;
border-radius:18px;
background:rgba(20,20,30,.92);
opacity:0;
transition:.3s;
z-index:9999;
}

#toast.show{
opacity:1;
}

#printModal{
position:fixed;
inset:0;
display:none;
justify-content:center;
align-items:center;
background:rgba(0,0,0,.88);
z-index:900;
}

#printInner{
padding:24px;
border-radius:24px;
background:rgba(255,255,255,.55);
backdrop-filter:blur(12px);
}

#printFrame{
position:relative;
width:260px;
height:390px;
overflow:hidden;
border-radius:18px;
background:#000;
}

#printFrame img{
position:absolute;
inset:0;
width:100%;
height:100%;
}

#printPhoto{
object-fit:cover;
z-index:1;
}

#printFrameOverlay{
object-fit:cover;
z-index:10;
display:none;
pointer-events:none;
}

.printBtn{
margin-top:14px;
padding:14px 18px;
border:none;
border-radius:12px;
cursor:pointer;
}

.primary{
background:#ff0055;
color:white;
}

.dark{
background:#333;
color:white;
}

</style>
</head>

<body>

<header>
<div id="eventTitle">
Cargando...
</div>
</header>

<div id="grid"></div>

<div id="side">

<div id="rankTitle">
🏆 Ranking
</div>

<div id="rankingBox"></div>

<div id="qrBox">

<img id="qrImg">

<div>
Escaneá y participá
</div>

</div>

</div>

<button id="cameraBtn">
📸 Sacar Foto
</button>

<div id="cameraModal">
<video id="video" autoplay playsinline></video>
<div id="countdown"></div>
</div>

<canvas id="canvas"></canvas>

<div id="toast"></div>

<div id="printModal">

<div id="printInner">

<h3 style="color:#111">
Vista previa impresión
</h3>

<div id="printFrame">

<img id="printPhoto">

<img id="printFrameOverlay">

</div>

<button
class="printBtn primary"
onclick="printCurrentPhoto()">

🖨 Imprimir 10x15

</button>

<button
class="printBtn dark"
onclick="closePrintModal()">

Cerrar

</button>

</div>

</div>

<script>

const eventName=
new URLSearchParams(
location.search
).get("event") || "";

let frameUrl="";
let selectedPhoto="";
let stream=null;
let lastPhotoCount=0;

async function init(){

const r=
await fetch(
"/event/" +
encodeURIComponent(
eventName
));

const d=
await r.json();

eventTitle.innerText=

d.event?.name ||

eventName.toUpperCase();

frameUrl=

d.event?.frame_url ||

"";

buildQR();

loadPhotos();

loadRanking();

}

function buildQR(){

const link=

location.origin+

"/event/"+

eventName;

qrImg.src=

"https://api.qrserver.com/v1/create-qr-code/?size=180x180&data="+

encodeURIComponent(
link
);

}

async function loadPhotos(){

const r=
await fetch(
"/event-photos/"+eventName
);

const data=
await r.json();

grid.innerHTML="";

data.forEach(p=>{

const img=

p.image_url ||
p.photo_url ||
p.url ||
p.image;

grid.innerHTML +=`

<div class="card">

<div
class="deleteBtn"
onclick="
deletePhoto(
'${p.id}'
);
event.stopPropagation();
">

✖

</div>

<div
onclick="
openPrintModal(
'${img}'
)
">

<img src="${img}">

<div class="info">

<div class="user">

${p.guest_name || p.user || "Invitado"}

</div>

<div class="table">

Mesa
${p.guest_table || p.table || "-"}

</div>

</div>

</div>

</div>

`;

});

}

async function loadRanking(){

const r=
await fetch(
"/ranking/"+eventName
);

const data=
await r.json();

rankingBox.innerHTML="";

data
.slice(0,5)
.forEach((x,i)=>{

rankingBox.innerHTML +=`

<div class="rankRow">

<div>

${i+1}.
Mesa
${x.table}

</div>

<div>

${x.points || 0}

</div>

</div>

`;

});

}

function openPrintModal(url){

selectedPhoto=url;

printPhoto.src=url;

if(frameUrl){

printFrameOverlay.src=
frameUrl;

printFrameOverlay.style.display=
"block";

}

printModal.style.display=
"flex";

}

function closePrintModal(){

printModal.style.display=
"none";

}

function printCurrentPhoto(){

window.print();

}

function showToast(t){

toast.innerText=t;

toast.classList.add(
"show"
);

setTimeout(()=>{

toast.classList.remove(
"show"
);

},2500);

}

async function deletePhoto(id){

await fetch(
"/delete-photo/"+id,
{
method:"DELETE"
}
);

loadPhotos();

}

setInterval(async()=>{

const old=
lastPhotoCount;

await loadPhotos();

await loadRanking();

lastPhotoCount=
document.querySelectorAll(
".card"
).length;

if(
lastPhotoCount >
old
){

showToast(
"📸 Nueva foto subida"
);

}

},3000);

init();

</script>

</body>
</html>
