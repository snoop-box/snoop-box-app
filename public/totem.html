<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Tótem Snoop Box</title>

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:radial-gradient(circle,#111,#000);
  color:#fff;
}

header{
  padding:18px;
  text-align:center;
  background:rgba(255,255,255,.05);
}

#eventTitle{
  font-size:34px;
  font-weight:bold;
}

#cameraBtn{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#ff0055;
  color:#fff;
  border:none;
  border-radius:16px;
  padding:18px 24px;
  font-size:20px;
  cursor:pointer;
  z-index:100;
}

#grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:14px;
  padding:18px;
}

.card{
  background:#1a1a1a;
  border-radius:16px;
  overflow:hidden;
  box-shadow:0 10px 25px rgba(0,0,0,.25);
  cursor:pointer;
}

.card img{
  width:100%;
  height:280px;
  object-fit:cover;
}

.cardInfo{
  padding:10px;
  font-size:14px;
  color:#ddd;
}

#cameraModal{
  position:fixed;
  inset:0;
  display:none;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,.9);
  z-index:500;
}

#video{
  width:70%;
  max-width:800px;
  border-radius:20px;
  transform:scaleX(-1);
}

#countdown{
  position:absolute;
  font-size:140px;
  font-weight:bold;
}

#flash{
  position:fixed;
  inset:0;
  background:#fff;
  opacity:0;
  pointer-events:none;
  z-index:600;
}

#ranking{
  position:fixed;
  top:15px;
  right:15px;
  background:rgba(0,0,0,.8);
  border:1px solid rgba(255,255,255,.15);
  border-radius:16px;
  padding:14px;
  width:220px;
}

#qrBox{
  position:fixed;
  left:15px;
  bottom:15px;
  background:#fff;
  color:#000;
  padding:12px;
  border-radius:16px;
  text-align:center;
}

#qrBox img{
  width:120px;
}

/* POPUP PRO */

#printModal{
  position:fixed;
  inset:0;
  display:none;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,.82);
  z-index:900;
}

#printInner{
  background:rgba(255,255,255,.50);
  backdrop-filter:blur(12px);
  border-radius:24px;
  padding:25px;
  box-shadow:0 25px 60px rgba(0,0,0,.45);
  text-align:center;
  min-width:340px;
}

#printTitle{
  color:#111;
  font-size:24px;
  font-weight:bold;
  margin-bottom:14px;
}

#printFrame{
  position:relative;
  width:260px;
  height:390px;
  margin:auto;
  border-radius:18px;
  overflow:hidden;
  background:#000;
}

#printFrame img{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
}

#printPhoto{
  object-fit:contain;
}

#printFrameOverlay{
  object-fit:cover;
  pointer-events:none;
}

.btnRow{
  margin-top:18px;
}

.printBtn{
  border:none;
  padding:14px 18px;
  border-radius:12px;
  cursor:pointer;
  font-size:16px;
  margin:0 6px;
}

.primary{
  background:#ff0055;
  color:#fff;
}

.dark{
  background:#333;
  color:#fff;
}
</style>
</head>
<body>

<header>
  <div id="eventTitle">Cargando...</div>
</header>

<div id="grid"></div>

<div id="ranking">Ranking...</div>

<div id="qrBox">
  <img id="qrImg">
  <div>Subí tus fotos 📸</div>
</div>

<button id="cameraBtn">📸 Sacar Foto</button>

<div id="cameraModal">
  <video id="video" autoplay playsinline></video>
  <div id="countdown"></div>
</div>

<canvas id="canvas" style="display:none;"></canvas>
<div id="flash"></div>

<!-- POPUP PRO -->

<div id="printModal">

  <div id="printInner">

    <div id="printTitle">
      Vista previa impresión
    </div>

    <div id="printFrame">
      <img id="printPhoto">
      <img id="printFrameOverlay">
    </div>

    <div class="btnRow">

      <button class="printBtn primary"
      onclick="printCurrentPhoto()">
      🖨 Imprimir 10x15
      </button>

      <button class="printBtn dark"
      onclick="closePrintModal()">
      Cerrar
      </button>

    </div>

  </div>

</div>

<script>

const eventName =
new URLSearchParams(location.search)
.get("event") || "";

let stream = null;
let frameUrl = "";
let photos = [];
let selectedPhoto = "";

/* ========================= */

async function init(){

 if(!eventName){
  eventTitle.innerText =
  "Falta ?event=";
  return;
 }

 const res =
 await fetch("/event/" +
 encodeURIComponent(eventName));

 const data =
 await res.json();

 if(!data.success){
  eventTitle.innerText =
  "Evento no encontrado";
  return;
 }

 const ev = data.event;

 eventTitle.innerText =
 ev.name;

 frameUrl =
 ev.frame || "";

 buildQR();
 loadPhotos();
 loadRanking();

}

/* ========================= */

function buildQR(){

 const link =
 location.origin +
 "/?event=" +
 eventName;

 qrImg.src =
 "https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=" +
 encodeURIComponent(link);

}

/* ========================= */

cameraBtn.onclick =
startCamera;

async function startCamera(){

 try{

  stream =
   await navigator.mediaDevices
   .getUserMedia({video:true});

  video.srcObject =
   stream;

  cameraModal.style.display =
   "flex";

  countdownStart();

 }catch(err){

  alert("No se pudo abrir cámara");

 }

}

function countdownStart(){

 let n = 3;

 countdown.innerText = n;

 const timer =
 setInterval(()=>{

  n--;

  if(n>0){

   countdown.innerText = n;

  }else{

   clearInterval(timer);

   countdown.innerText = "";

   capturePhoto();

  }

 },1000);

}

async function capturePhoto(){

 const canvas =
 document.getElementById("canvas");

 canvas.width =
 video.videoWidth || 640;

 canvas.height =
 video.videoHeight || 480;

 const ctx =
 canvas.getContext("2d");

 ctx.translate(canvas.width,0);
 ctx.scale(-1,1);

 ctx.drawImage(video,0,0);

 flash.style.opacity = 1;

 setTimeout(()=>{
  flash.style.opacity = 0;
 },180);

 const image =
 canvas.toDataURL(
 "image/jpeg",
 0.9
 );

 await fetch("/upload-photo",{
  method:"POST",
  headers:{
   "Content-Type":
   "application/json"
  },
  body:JSON.stringify({
   eventName:eventName,
   user:"Totem",
   image:image
  })
 });

 cameraModal.style.display =
 "none";

 if(stream){
  stream.getTracks()
  .forEach(t=>t.stop());
 }

 loadPhotos();

}

/* ========================= */

async function loadPhotos(){

 const res =
 await fetch("/photos/" +
 encodeURIComponent(eventName));

 photos =
 await res.json();

 grid.innerHTML = "";

 photos.forEach((p,i)=>{

  const url =
  p.url || p.image;

  const div =
  document.createElement("div");

  div.className = "card";

  div.innerHTML = `
   <img src="${url}">
   <div class="cardInfo">
   Foto ${photos.length-i}
   </div>
  `;

  div.onclick =
   ()=>openPrintModal(url);

  grid.appendChild(div);

 });

}

/* ========================= */

function openPrintModal(url){

 selectedPhoto = url;

 printPhoto.src = url;

 if(frameUrl){

  printFrameOverlay.src =
  frameUrl;

  printFrameOverlay.style
  .display = "block";

 }else{

  printFrameOverlay.style
  .display = "none";

 }

 printModal.style.display =
 "flex";

}

function closePrintModal(){

 printModal.style.display =
 "none";

}

/* ========================= */

function printCurrentPhoto(){

 const win =
 window.open("","_blank");

 win.document.write(`
 <html>
 <head>
 <style>
 body{
  margin:0;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
 }
 .box{
  position:relative;
  width:4in;
  height:6in;
 }
 .box img{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
 }
 .photo{
  object-fit:contain;
 }
 .frame{
  object-fit:cover;
 }
 </style>
 </head>
 <body>
   <div class="box">
    <img class="photo"
    src="${selectedPhoto}">
    ${
      frameUrl
      ? `<img class="frame" src="${frameUrl}">`
      : ""
    }
   </div>
 </body>
 </html>
 `);

 win.document.close();

 setTimeout(()=>{
  win.print();
  win.close();
 },600);

}

/* ========================= */

async function loadRanking(){

 const res =
 await fetch("/ranking/" +
 encodeURIComponent(eventName));

 const data =
 await res.json();

 let html =
 "<strong>🏆 Ranking</strong><br><br>";

 if(!data.length){

  html += "Sin datos";

 }else{

  data.slice(0,5)
  .forEach((r,i)=>{

   html +=
   (i+1)+
   ". Mesa " +
   (r.table||"-") +
   " (" +
   (r.points||0) +
   ")<br>";

  });

 }

 ranking.innerHTML = html;

}

setInterval(()=>{
 loadPhotos();
 loadRanking();
},4000);

init();

</script>

</body>
</html>
