<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tótem Snoop Box</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  background: black;
  font-family: Arial;
  color: white;
}

#grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px,1fr));
  gap: 5px;
  padding: 5px;
}

img {
  width: 100%;
  height: 150px;
  object-fit: cover;
  cursor: pointer;
}

/* MODAL */
#modal {
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.9);
  display:none;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

#modal img {
  max-width: 90%;
  max-height: 70%;
}

.buttons {
  margin-top: 20px;
}

button {
  padding: 15px 30px;
  margin: 10px;
  font-size: 18px;
  border: none;
  border-radius: 10px;
}

.ok { background: green; color:white; }
.no { background: red; color:white; }

</style>
</head>

<body>

<div id="grid"></div>

<div id="modal">
  <img id="modalImg">
  <div class="buttons">
    <button class="ok" onclick="printPhoto()">✔ Imprimir</button>
    <button class="no" onclick="closeModal()">❌ Cancelar</button>
  </div>
</div>

<script>

const eventId = new URLSearchParams(location.search).get("event") || "default";

let selectedPhoto = null;

// CARGAR FOTOS
async function loadPhotos() {
  const res = await fetch("/photos/" + eventId);
  const data = await res.json();

  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  data.reverse().forEach(p => {
    const img = document.createElement("img");
    img.src = p.url;

    img.onclick = () => openModal(p.url);

    grid.appendChild(img);
  });
}

// MODAL
function openModal(url) {
  selectedPhoto = url;
  document.getElementById("modal").style.display = "flex";
  document.getElementById("modalImg").src = url;
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
}

// IMPRIMIR
function printPhoto() {
  const win = window.open("");

  win.document.write(`
    <html>
    <body style="margin:0; display:flex; justify-content:center; align-items:center; height:100vh; background:white;">
      <div style="border:20px solid black; padding:10px;">
        <img src="${selectedPhoto}" style="width:400px;">
      </div>
    </body>
    </html>
  `);

  win.document.close();
  win.print();

  closeModal();
}

// AUTO REFRESH
setInterval(loadPhotos, 3000);

// INIT
loadPhotos();

</script>

</body>
</html>
