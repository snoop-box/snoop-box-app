<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Tótem Snoop Box</title>

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:radial-gradient(circle,#111,#000);
  color:#fff;
}

header{
  padding:18px;
  text-align:center;
  background:rgba(255,255,255,.05);
}

#logo{
  max-width:220px;
  max-height:90px;
  object-fit:contain;
  display:none;
  margin:0 auto 10px auto;
}

#eventTitle{
  font-size:34px;
  font-weight:bold;
}

#framePreview{
  font-size:14px;
  color:#ccc;
  margin-top:6px;
}

#cameraBtn{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#ff0055;
  color:#fff;
  border:none;
  border-radius:16px;
  padding:18px 24px;
  font-size:20px;
  cursor:pointer;
  z-index:100;
}

#grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:14px;
  padding:18px;
}

.card{
  background:#1a1a1a;
  border-radius:16px;
  overflow:hidden;
  box-shadow:0 10px 25px rgba(0,0,0,.25);
}

.card img{
  width:100%;
  height:280px;
  object-fit:cover;
}

.cardInfo{
  padding:10px;
  font-size:14px;
  color:#ddd;
}

#cameraModal{
  position:fixed;
  inset:0;
  display:none;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,.9);
  z-index:500;
}

#video{
  width:70%;
  max-width:800px;
  border-radius:20px;
  transform:scaleX(-1);
}

#countdown{
  position:absolute;
  font-size:140px;
  font-weight:bold;
}

#flash{
  position:fixed;
  inset:0;
  background:#fff;
  opacity:0;
  pointer-events:none;
  z-index:600;
}

#ranking{
  position:fixed;
  top:15px;
  right:15px;
  background:rgba(0,0,0,.8);
  border:1px solid rgba(255,255,255,.15);
  border-radius:16px;
  padding:14px;
  width:220px;
}

#qrBox{
  position:fixed;
  left:15px;
  bottom:15px;
  background:#fff;
  color:#000;
  padding:12px;
  border-radius:16px;
  text-align:center;
}

#qrBox img{
  width:120px;
}
</style>
</head>
<body>

<header>
  <img id="logo">
  <div id="eventTitle">Cargando...</div>
  <div id="framePreview"></div>
</header>

<div id="grid"></div>

<div id="ranking">Ranking...</div>

<div id="qrBox">
  <img id="qrImg">
  <div>Subí tus fotos 📸</div>
</div>

<button id="cameraBtn">📸 Sacar Foto</button>

<div id="cameraModal">
  <video id="video" autoplay playsinline></video>
  <div id="countdown"></div>
</div>

<canvas id="canvas" style="display:none;"></canvas>
<div id="flash"></div>

<script>

const eventName =
new URLSearchParams(location.search)
.get("event") || "";

let stream = null;
let frameUrl = "";
let photos = [];

/* ========================= */

async function init(){

 if(!eventName){
  document.getElementById("eventTitle")
  .innerText = "Falta ?event=";
  return;
 }

 const res =
 await fetch("/event/" +
 encodeURIComponent(eventName));

 const data =
 await res.json();

 if(!data.success){
  document.getElementById("eventTitle")
  .innerText = "Evento no encontrado";
  return;
 }

 const ev = data.event;

 document.getElementById("eventTitle")
 .innerText = ev.name;

 if(ev.logoVenue){
  const logo =
  document.getElementById("logo");
  logo.src = ev.logoVenue;
  logo.style.display = "block";
 }

 frameUrl = ev.frame || "";

 document.getElementById("framePreview")
 .innerText =
 frameUrl
 ? "Frame cargado ✔"
 : "Sin frame";

 buildQR();
 loadPhotos();
 loadRanking();

}

/* ========================= */

function buildQR(){

 const link =
 location.origin +
 "/?event=" +
 eventName;

 document.getElementById("qrImg")
 .src =
 "https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=" +
 encodeURIComponent(link);

}

/* ========================= */

document.getElementById("cameraBtn")
.onclick = startCamera;

async function startCamera(){

 try{

  stream =
   await navigator.mediaDevices
   .getUserMedia({video:true});

  video.srcObject = stream;

  cameraModal.style.display =
   "flex";

  countdownStart();

 }catch(err){

  alert("No se pudo abrir cámara");

 }

}

function countdownStart(){

 let n = 3;

 countdown.innerText = n;

 const timer =
 setInterval(()=>{

  n--;

  if(n>0){

   countdown.innerText = n;

  }else{

   clearInterval(timer);

   countdown.innerText = "";

   capturePhoto();

  }

 },1000);

}

async function capturePhoto(){

 const canvas =
 document.getElementById("canvas");

 canvas.width =
 video.videoWidth || 640;

 canvas.height =
 video.videoHeight || 480;

 const ctx =
 canvas.getContext("2d");

 ctx.translate(canvas.width,0);
 ctx.scale(-1,1);

 ctx.drawImage(video,0,0);

 flash.style.opacity = 1;

 setTimeout(()=>{
  flash.style.opacity = 0;
 },180);

 const image =
 canvas.toDataURL(
  "image/jpeg",
  0.9
 );

 await fetch("/upload-photo",{
  method:"POST",
  headers:{
   "Content-Type":"application/json"
  },
  body:JSON.stringify({
   eventName:eventName,
   user:"Totem",
   image:image
  })
 });

 cameraModal.style.display =
  "none";

 if(stream){
  stream.getTracks()
  .forEach(t=>t.stop());
 }

 loadPhotos();

}

/* ========================= */

async function loadPhotos(){

 const res =
 await fetch("/photos/" +
 encodeURIComponent(eventName));

 photos =
 await res.json();

 const grid =
 document.getElementById("grid");

 grid.innerHTML = "";

 photos.forEach((p,i)=>{

  const div =
  document.createElement("div");

  div.className = "card";

  div.innerHTML = `
   <img src="${p.url || p.image}">
   <div class="cardInfo">
   Foto ${photos.length-i}
   </div>
  `;

  grid.appendChild(div);

 });

}

/* ========================= */

async function loadRanking(){

 const res =
 await fetch("/ranking/" +
 encodeURIComponent(eventName));

 const data =
 await res.json();

 const box =
 document.getElementById("ranking");

 let html =
 "<strong>🏆 Ranking</strong><br><br>";

 if(!data.length){
  html += "Sin datos";
 }else{

  data.slice(0,5)
  .forEach((r,i)=>{

   html +=
   (i+1) +
   ". Mesa " +
   (r.table || "-") +
   " (" +
   (r.points || 0) +
   ")<br>";

  });

 }

 box.innerHTML = html;

}

setInterval(()=>{
 loadPhotos();
 loadRanking();
},4000);

init();

</script>

</body>
</html>
