<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tótem Snoop Box</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  background: black;
  font-family: Arial;
  color: white;
}

/* GRID */
#grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px,1fr));
  gap: 6px;
  padding: 6px;
}

.card {
  text-align: center;
}

.card img {
  width: 100%;
  height: 140px;
  object-fit: cover;
  cursor: pointer;
  border-radius: 8px;
}

.name {
  font-size: 12px;
  margin-top: 3px;
  opacity: 0.8;
}

/* MODAL */
#modal {
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.95);
  display:none;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

/* MARCO */
.frame {
  position: relative;
  width: 300px;
  height: 450px;
}

.frame img.photo {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
}

.frame img.overlay {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
}

/* BOTONES */
.buttons {
  margin-top: 20px;
}

button {
  padding: 15px 25px;
  margin: 10px;
  font-size: 18px;
  border-radius: 10px;
  border: none;
}

.ok { background: green; color:white; }
.no { background: red; color:white; }

</style>
</head>

<body>

<div id="grid"></div>

<div id="modal">
  <div class="frame">
    <img id="modalPhoto" class="photo">
    <img src="frame.png" class="overlay">
  </div>

  <div class="buttons">
    <button class="ok" onclick="printPhoto()">✔ Imprimir</button>
    <button class="no" onclick="closeModal()">❌ Seguir buscando</button>
  </div>
</div>

<script>

const eventId = new URLSearchParams(location.search).get("event") || "default";

let selectedPhoto = null;
let slideshowIndex = 0;
let photosData = [];
let userInteracting = false;

// CARGAR FOTOS
async function loadPhotos() {
  const res = await fetch("/photos/" + eventId);
  const data = await res.json();

  photosData = data.reverse();

  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  photosData.forEach(p => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <img src="${p.url}">
      <div class="name">${p.name}</div>
    `;

    div.onclick = () => {
      userInteracting = true;
      openModal(p.url);
    };

    grid.appendChild(div);
  });
}

// MODAL
function openModal(url) {
  selectedPhoto = url;
  document.getElementById("modal").style.display = "flex";
  document.getElementById("modalPhoto").src = url;
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
}

// IMPRIMIR
function printPhoto() {

  const win = window.open("");

  win.document.write(`
    <html>
    <body style="margin:0; display:flex; justify-content:center; align-items:center; height:100vh;">
      <div style="position:relative; width:600px; height:900px;">
        <img src="${selectedPhoto}" style="position:absolute; width:100%;">
        <img src="frame.png" style="position:absolute; width:100%;">
      </div>
    </body>
    </html>
  `);

  win.document.close();
  win.print();

  closeModal();
}

// SLIDESHOW
function startSlideshow() {
  setInterval(() => {
    if (userInteracting) return;
    if (photosData.length === 0) return;

    slideshowIndex++;
    if (slideshowIndex >= photosData.length) slideshowIndex = 0;

    openModal(photosData[slideshowIndex].url);

    setTimeout(() => {
      closeModal();
    }, 2000);

  }, 3000);
}

// INIT
loadPhotos();
setInterval(loadPhotos, 4000);
startSlideshow();

</script>

</body>
</html>
