<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tótem Snoop Box</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  background: radial-gradient(circle,#111,#000);
  font-family: Arial;
  color: white;
}

/* GRID */
#grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px,1fr));
  gap: 12px;
  padding: 12px;
}

/* CARD */
.card {
  position: relative;
  overflow: hidden;
  border-radius: 12px;
  cursor: pointer;
}

.card img {
  width: 100%;
  height: 260px;
  object-fit: cover;
  transition: transform 0.3s;
}

.card:hover img {
  transform: scale(1.08);
}

.name {
  position: absolute;
  bottom: 0;
  width: 100%;
  padding: 8px;
  font-size: 16px;
  background: rgba(0,0,0,0.6);
}

/* MODAL */
#modal {
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.85);
  display:none;
  justify-content: center;
  align-items: center;
}

.modal-box {
  background: white;
  padding: 20px;
  border-radius: 16px;
  text-align: center;
}

/* FRAME */
.frame {
  position: relative;
  width: 300px;
  height: 450px;
  background: black;
  overflow: hidden;
}

/* FOTO CORREGIDA */
.frame img.photo {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center;
}

/* OVERLAY */
.frame img.overlay {
  position: absolute;
  top:0;
  left:0;
  width: 100%;
  height: 100%;
}

/* BOTONES */
.buttons {
  margin-top: 15px;
}

button {
  padding: 14px 24px;
  margin: 10px;
  font-size: 18px;
  border-radius: 10px;
  border: none;
}

.ok { background: green; color:white; }
.no { background: red; color:white; }

/* FLASH */
#flash {
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:white;
  opacity:0;
  pointer-events:none;
  transition: opacity 0.2s;
}

/* RANKING */
#rankingBox {
  position: fixed;
  top: 15px;
  right: 15px;
  background: rgba(0,0,0,0.75);
  padding: 15px 20px;
  border-radius: 12px;
  font-size: 18px;
  line-height: 1.6;
}

/* CARRUSEL */
#idleCarousel {
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction: column;
}

.carousel-img {
  max-width:90%;
  max-height:80%;
  object-fit: contain;
  opacity: 0;
  transition: opacity 0.6s;
}

.carousel-img.show {
  opacity: 1;
}

.carousel-name {
  margin-top: 15px;
  font-size: 22px;
}
</style>
</head>

<body>

<div id="grid"></div>
<div id="rankingBox"></div>

<!-- MODAL -->
<div id="modal">
  <div class="modal-box">

    <div class="frame">
      <img id="modalPhoto" class="photo">
      <img src="frame.png" class="overlay">
    </div>

    <div class="buttons">
      <button class="ok" onclick="printPhoto()">✔ Imprimir</button>
      <button class="no" onclick="closeModal()">❌ Seguir buscando</button>
    </div>

  </div>
</div>

<div id="flash"></div>

<script>

const eventId = new URLSearchParams(location.search).get("event") || "default";
let selectedPhoto = null;

// FOTOS
async function loadPhotos() {
  const res = await fetch("/photos/" + eventId);
  const data = await res.json();

  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  data.reverse().forEach(p => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <img src="${p.url}">
      <div class="name">${p.name}</div>
    `;

    div.onclick = () => openModal(p.url);

    grid.appendChild(div);
  });
}

// MODAL
function openModal(url) {
  selectedPhoto = url;
  modal.style.display = "flex";
  modalPhoto.src = url;
}

function closeModal() {
  modal.style.display = "none";
}

// FLASH
function flashEffect() {
  const f = document.getElementById("flash");
  f.style.opacity = 1;
  setTimeout(()=>f.style.opacity=0,200);
}

// IMPRIMIR CORREGIDO
function printPhoto() {
  flashEffect();

  const win = window.open("", "_blank");

  win.document.write(`
    <html>
    <body style="margin:0; display:flex; justify-content:center; align-items:center; height:100vh;">
      <div style="position:relative; width:600px; height:900px;">
        <img src="${selectedPhoto}" style="
          position:absolute;
          top:0;
          left:0;
          width:100%;
          height:100%;
          object-fit: cover;
          object-position: center;
        ">
        <img src="frame.png" style="
          position:absolute;
          top:0;
          left:0;
          width:100%;
          height:100%;
        ">
      </div>
    </body>
    </html>
  `);

  win.document.close();

  setTimeout(()=>{
    win.print();
    win.close();
  },500);

  closeModal();
}

// RANKING
async function loadRanking() {
  const res = await fetch("/ranking/" + eventId);
  const data = await res.json();

  let html = "<strong>🏆 Ranking</strong><br>";

  data.slice(0,3).forEach((r,i)=>{
    html += `${i+1}. Mesa ${r.table} (${r.points})<br>`;
  });

  rankingBox.innerHTML = html;
}

// REFRESH
setInterval(()=>{
  loadPhotos();
  loadRanking();
},4000);

// INIT
loadPhotos();
loadRanking();

</script>

</body>
</html>
