<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tótem Snoop Box</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  background: radial-gradient(circle,#111,#000);
  font-family: Arial;
  color: white;
}

/* GRID */
#grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px,1fr));
  gap: 12px;
  padding: 12px;
}

/* CARD */
.card {
  position: relative;
  overflow: hidden;
  border-radius: 12px;
  cursor: pointer;
}

.card img {
  width: 100%;
  height: 260px;
  object-fit: cover;
  transition: transform 0.3s;
}

.card:hover img {
  transform: scale(1.08);
}

.name {
  position: absolute;
  bottom: 0;
  width: 100%;
  padding: 6px;
  font-size: 14px;
  background: rgba(0,0,0,0.6);
}

/* MODAL */
#modal {
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.85);
  display:none;
  justify-content: center;
  align-items: center;
}

/* CAJA BLANCA */
.modal-box {
  background: white;
  padding: 20px;
  border-radius: 16px;
  text-align: center;
}

/* FRAME */
.frame {
  position: relative;
  width: 300px;
  height: 450px;
  background: black;
  overflow: hidden;
}

/* FOTO (CORREGIDA) */
.frame img.photo {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: contain;
  background: black;
}

/* MARCO */
.frame img.overlay {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
}

/* BOTONES */
.buttons {
  margin-top: 15px;
}

button {
  padding: 14px 24px;
  margin: 10px;
  font-size: 18px;
  border-radius: 10px;
  border: none;
}

.ok { background: green; color:white; }
.no { background: red; color:white; }

/* FLASH */
#flash {
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:white;
  opacity:0;
  pointer-events:none;
  transition: opacity 0.2s;
}

/* RANKING */
#rankingBox {
  position: fixed;
  top: 10px;
  right: 10px;
  background: rgba(0,0,0,0.7);
  padding: 10px;
  border-radius: 10px;
  font-size: 14px;
}
</style>
</head>

<body>

<div id="grid"></div>
<div id="rankingBox"></div>

<div id="modal">
  <div class="modal-box">

    <div class="frame">
      <img id="modalPhoto" class="photo">
      <img src="frame.png" class="overlay">
    </div>

    <div class="buttons">
      <button class="ok" onclick="printPhoto()">✔ Imprimir</button>
      <button class="no" onclick="closeModal()">❌ Seguir buscando</button>
    </div>

  </div>
</div>

<div id="flash"></div>

<script>

const eventId = new URLSearchParams(location.search).get("event") || "default";

let selectedPhoto = null;

// CARGAR FOTOS
async function loadPhotos() {
  const res = await fetch("/photos/" + eventId);
  const data = await res.json();

  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  data.reverse().forEach(p => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <img src="${p.url}">
      <div class="name">${p.name}</div>
    `;

    div.onclick = () => openModal(p.url);

    grid.appendChild(div);
  });
}

// MODAL
function openModal(url) {
  selectedPhoto = url;
  document.getElementById("modal").style.display = "flex";
  document.getElementById("modalPhoto").src = url;
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
}

// FLASH
function flashEffect() {
  const f = document.getElementById("flash");
  f.style.opacity = 1;
  setTimeout(()=>f.style.opacity=0,200);
}

// IMPRIMIR (CORREGIDO)
function printPhoto() {

  flashEffect();

  const win = window.open("", "_blank");

  win.document.write(`
    <html>
    <head>
      <style>

        @page {
          size: 10cm 15cm;
          margin: 0;
        }

        body {
          margin:0;
          padding:0;
          display:flex;
          justify-content:center;
          align-items:center;
          height:100vh;
          background:white;
        }

        .sheet {
          width: 100%;
          height: 100%;
          display:flex;
          justify-content:center;
          align-items:center;
        }

        .print {
          position: relative;
          width: 1240px;
          height: 1860px;
        }

        .print img.photo {
          position: absolute;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          object-fit: cover;
        }

        .print img.frame {
          position: absolute;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
        }

      </style>
    </head>

    <body>
      <div class="sheet">
        <div class="print">
          <img src="${selectedPhoto}" class="photo">
          <img src="frame.png" class="frame">
        </div>
      </div>
    </body>
    </html>
  `);

  win.document.close();

  setTimeout(() => {
    win.print();
    win.close();
  }, 500);

  closeModal();
}

// RANKING
async function loadRanking() {
  const res = await fetch("/ranking/" + eventId);
  const data = await res.json();

  let html = "<strong>🏆 Ranking</strong><br>";

  data.slice(0,3).forEach((r,i)=>{
    html += `${i+1}. Mesa ${r.table} (${r.points})<br>`;
  });

  document.getElementById("rankingBox").innerHTML = html;
}

// REFRESH
setInterval(()=>{
  loadPhotos();
  loadRanking();
},4000);

// INIT
loadPhotos();
loadRanking();

</script>

</body>
</html>
