<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Tótem Snoop Box</title>

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:radial-gradient(circle,#111,#000);
  color:#fff;
  overflow-x:hidden;
}

header{
  padding:18px;
  text-align:center;
  background:rgba(255,255,255,.04);
  backdrop-filter:blur(8px);
}

#eventTitle{
  font-size:34px;
  font-weight:bold;
}

#cameraBtn{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#ff0055;
  color:#fff;
  border:none;
  border-radius:16px;
  padding:18px 24px;
  font-size:20px;
  cursor:pointer;
  z-index:100;
}

#grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:14px;
  padding:18px;
  padding-right:270px;
}

.card{
  background:#1a1a1a;
  border-radius:18px;
  overflow:hidden;
  box-shadow:0 10px 25px rgba(0,0,0,.35);
  cursor:pointer;
  transition:.25s;
}

.card:hover{
  transform:translateY(-4px);
}

.card img{
  width:100%;
  height:280px;
  object-fit:cover;
}

.info{
  padding:12px;
}

.user{
  font-size:22px;
  font-weight:bold;
}

.table{
  color:#ddd;
  margin-top:4px;
}

/* SIDE PANEL */

#side{
  position:fixed;
  top:0;
  right:0;
  width:250px;
  height:100%;
  background:rgba(0,0,0,.82);
  backdrop-filter:blur(10px);
  padding:16px;
  box-sizing:border-box;
  overflow:auto;
}

#rankTitle{
  text-align:center;
  font-size:26px;
  font-weight:bold;
  margin-bottom:14px;
}

.rankRow{
  display:flex;
  justify-content:space-between;
  padding:12px;
  border-radius:14px;
  background:rgba(255,255,255,.06);
  margin-bottom:10px;
}

.gold{border:1px solid gold;}
.silver{border:1px solid silver;}
.bronze{border:1px solid #cd7f32;}

#qrBox{
  margin-top:20px;
  text-align:center;
  background:#fff;
  color:#000;
  padding:12px;
  border-radius:16px;
}

#qrBox img{
  width:140px;
}

#qrText{
  font-size:14px;
  margin-top:8px;
}

/* CAMERA */

#cameraModal{
  position:fixed;
  inset:0;
  display:none;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,.92);
  z-index:500;
}

#video{
  width:70%;
  max-width:800px;
  border-radius:20px;
  transform:scaleX(-1);
}

#countdown{
  position:absolute;
  font-size:140px;
  font-weight:bold;
}

#flash{
  position:fixed;
  inset:0;
  background:#fff;
  opacity:0;
  pointer-events:none;
  z-index:600;
}

#canvas{
  display:none;
}

/* POPUP */

#printModal{
  position:fixed;
  inset:0;
  display:none;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,.88);
  z-index:900;
}

#printInner{
  background:rgba(255,255,255,.5);
  backdrop-filter:blur(12px);
  border-radius:24px;
  padding:24px;
  text-align:center;
}

#printFrame{
  position:relative;
  width:260px;
  height:390px;
  overflow:hidden;
  border-radius:18px;
  background:#000;
}

#printFrame img{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
}

#printPhoto{
  object-fit:contain;
}

#printFrameOverlay{
  object-fit:cover;
}

.printBtn{
  border:none;
  padding:14px 18px;
  border-radius:12px;
  margin-top:14px;
  cursor:pointer;
  font-size:16px;
}

.primary{
  background:#ff0055;
  color:#fff;
}

.dark{
  background:#333;
  color:#fff;
}
</style>
</head>
<body>

<header>
<div id="eventTitle">Cargando...</div>
</header>

<div id="grid"></div>

<div id="side">

<div id="rankTitle">
🏆 Ranking
</div>

<div id="rankingBox"></div>

<div id="qrBox">
<img id="qrImg">
<div id="qrText">
Escaneá y participá
</div>
</div>

</div>

<button id="cameraBtn">
📸 Sacar Foto
</button>

<div id="cameraModal">
<video id="video" autoplay playsinline></video>
<div id="countdown"></div>
</div>

<canvas id="canvas"></canvas>
<div id="flash"></div>

<div id="printModal">

<div id="printInner">

<div style="font-size:24px;font-weight:bold;color:#111;margin-bottom:14px;">
Vista previa impresión
</div>

<div id="printFrame">
<img id="printPhoto">
<img id="printFrameOverlay">
</div>

<button class="printBtn primary"
onclick="printCurrentPhoto()">
🖨 Imprimir 10x15
</button>

<button class="printBtn dark"
onclick="closePrintModal()">
Cerrar
</button>

</div>

</div>

<script>

const eventName =
new URLSearchParams(location.search)
.get("event") || "";

let frameUrl = "";
let stream = null;
let selectedPhoto = "";

/* ===================== */

async function init(){

 if(!eventName){
  eventTitle.innerText =
  "Falta ?event=";
  return;
 }

 const res =
 await fetch("/event/" +
 encodeURIComponent(eventName));

 const data =
 await res.json();

 if(!data.success){
  eventTitle.innerText =
  "Evento no encontrado";
  return;
 }

 eventTitle.innerText =
 data.event.name;

 frameUrl =
 data.event.frame || "";

 buildQR();

 loadPhotos();
 loadRanking();

}

function buildQR(){

 const link =
 location.origin +
 "/?event=" +
 eventName;

 qrImg.src =
 "https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=" +
 encodeURIComponent(link);

}

/* ===================== */

cameraBtn.onclick =
startCamera;

async function startCamera(){

 stream =
 await navigator.mediaDevices
 .getUserMedia({video:true});

 video.srcObject =
 stream;

 cameraModal.style.display =
 "flex";

 let n=3;
 countdown.innerText=n;

 const t =
 setInterval(()=>{

  n--;

  if(n>0){

   countdown.innerText=n;

  }else{

   clearInterval(t);
   countdown.innerText="";
   capturePhoto();

  }

 },1000);

}

async function capturePhoto(){

 canvas.width =
 video.videoWidth || 640;

 canvas.height =
 video.videoHeight || 480;

 const ctx =
 canvas.getContext("2d");

 ctx.translate(canvas.width,0);
 ctx.scale(-1,1);
 ctx.drawImage(video,0,0);

 flash.style.opacity=1;

 setTimeout(()=>{
  flash.style.opacity=0;
 },180);

 const image =
 canvas.toDataURL(
 "image/jpeg",0.9
 );

 await fetch("/upload-photo",{
  method:"POST",
  headers:{
   "Content-Type":"application/json"
  },
  body:JSON.stringify({
   eventName:eventName,
   user:"Totem",
   table:"00",
   image:image
  })
 });

 if(stream){
  stream.getTracks()
  .forEach(t=>t.stop());
 }

 cameraModal.style.display="none";

 loadPhotos();
 loadRanking();

}

/* ===================== */

async function loadPhotos(){

 const res =
 await fetch("/photos/" +
 encodeURIComponent(eventName));

 const data =
 await res.json();

 grid.innerHTML="";

 data.forEach(p=>{

  const url =
  p.url || p.image;

  grid.innerHTML += `
  <div class="card"
  onclick="openPrintModal('${url}')">

    <img src="${url}">

    <div class="info">
      <div class="user">
      ${p.user || "Invitado"}
      </div>
      <div class="table">
      Mesa ${p.table || "-"}
      </div>
    </div>

  </div>
  `;

 });

}

/* ===================== */

async function loadRanking(){

 const res =
 await fetch("/ranking/" +
 encodeURIComponent(eventName));

 const data =
 await res.json();

 rankingBox.innerHTML="";

 data.slice(0,5).forEach((r,i)=>{

 let cls="";

 if(i===0) cls="gold";
 if(i===1) cls="silver";
 if(i===2) cls="bronze";

 rankingBox.innerHTML += `
 <div class="rankRow ${cls}">
  <div>${i+1}. Mesa ${r.table}</div>
  <div>${r.points||0}</div>
 </div>
 `;

 });

}

/* ===================== */

function openPrintModal(url){

 selectedPhoto = url;

 printPhoto.src = url;

 if(frameUrl){

  printFrameOverlay.src =
  frameUrl;

  printFrameOverlay.style.display=
  "block";

 }else{

  printFrameOverlay.style.display=
  "none";

 }

 printModal.style.display =
 "flex";

}

function closePrintModal(){

 printModal.style.display =
 "none";

}

function printCurrentPhoto(){

 const win =
 window.open("","_blank");

 win.document.write(`
 <html>
 <body style="margin:0;display:flex;justify-content:center;align-items:center;height:100vh;">
 <div style="position:relative;width:4in;height:6in;">
 <img src="${selectedPhoto}" style="position:absolute;width:100%;height:100%;object-fit:contain;">
 ${
 frameUrl
 ? `<img src="${frameUrl}" style="position:absolute;width:100%;height:100%;">`
 : ""
 }
 </div>
 </body>
 </html>
 `);

 win.document.close();

 setTimeout(()=>{
  win.print();
  win.close();
 },600);

}

/* ===================== */

setInterval(()=>{
 loadPhotos();
 loadRanking();
},5000);

init();

</script>

</body>
</html>
