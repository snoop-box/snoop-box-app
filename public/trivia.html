<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Snoop Trivia</title>

<style>

body{

  margin:0;
  font-family:Arial,sans-serif;
  min-height:100vh;
  color:#fff;

  background:
  linear-gradient(
    135deg,
    #071a52,
    #111,
    #5c0b0b
  );

}

.wrap{

  max-width:700px;
  margin:auto;
  padding:24px;

}

.hero{

  background:
  rgba(255,255,255,.08);

  backdrop-filter:
  blur(12px);

  border-radius:24px;

  padding:28px;

  text-align:center;

  margin-bottom:24px;

  box-shadow:
  0 18px 40px
  rgba(0,0,0,.25);

}

.logo{

  max-width:150px;
  max-height:70px;

  object-fit:contain;

  display:block;

  margin:auto auto 18px auto;

}

.title{

  font-size:52px;
  font-weight:bold;
  margin-bottom:10px;

}

.sub{

  color:#ddd;
  font-size:16px;

}

.card{

  background:
  rgba(255,255,255,.08);

  backdrop-filter:
  blur(12px);

  border-radius:22px;

  padding:24px;

  margin-bottom:22px;

  box-shadow:
  0 10px 30px
  rgba(0,0,0,.2);

}

.question{

  font-size:22px;
  font-weight:bold;

  margin-bottom:18px;

}

.option{

  width:100%;

  padding:16px;

  margin-bottom:14px;

  border:none;

  border-radius:14px;

  background:
  rgba(255,255,255,.12);

  color:#fff;

  font-size:16px;

  cursor:pointer;

  transition:.2s;

}

.option:hover{
.option.correct{

  background:#00c853 !important;
  color:#fff;

}

.option.wrong{

  background:#d50000 !important;
  color:#fff;

}

.option.locked{

  pointer-events:none;
  opacity:.92;

}

  background:
  rgba(255,255,255,.22);

}

.submit{

  width:100%;

  padding:18px;

  border:none;

  border-radius:16px;

  background:#ff0055;

  color:#fff;

  font-size:18px;

  font-weight:bold;

  cursor:pointer;

  margin-top:12px;

}

.done{

  text-align:center;

  padding:40px;

  background:
  rgba(255,255,255,.08);

  border-radius:24px;

  font-size:22px;

  font-weight:bold;

}

.score{

  margin-top:12px;

  color:#ffd700;

  font-size:28px;

}

.loader{

  text-align:center;
  padding:40px;
  color:#ddd;

}

</style>

</head>
<body>

<div class="wrap">

<div class="hero">

<img
id="logo"
class="logo"
style="display:none;">

<div class="title">

🧠 TRIVIA

</div>

<div class="sub">

Respondé y sumá puntos

</div>

</div>

<div id="content">

<div class="loader">

Cargando trivia...

</div>

</div>

</div>

<script>

const session =
JSON.parse(

  localStorage.getItem(
    "snoopGuest"
  )

);

if(!session){

  window.location.href =
  "/login.html";

}

const guest =
session.guest;

const eventSlug =
session.event;

let questions = [];

let answers = {};

/* ====================== */

async function init(){

  await loadEvent();

  await checkStatus();

}

/* ====================== */

async function loadEvent(){

  try{

    const res =
    await fetch(
      "/event-config/" +
      eventSlug
    );

    const data =
    await res.json();

    if(data.success){

      if(data.event.logo_url){

        const logo =
        document.getElementById(
          "logo"
        );

        logo.src =
        data.event.logo_url;

        logo.style.display =
        "block";

      }

    }

  }

  catch(err){

    console.error(err);

  }

}

/* ====================== */

async function checkStatus(){

  try{

    const res =
    await fetch(

      `/trivia-status/${eventSlug}/${guest.guest_name}`

    );

    const data =
    await res.json();

    if(data.answered){

      renderDone(
        data.data.score
      );

      return;

    }

    await loadTrivia();

  }

  catch(err){

    console.error(err);

  }

}

/* ====================== */

async function loadTrivia(){

  try{

    const res =
    await fetch(
      "/trivia/" +
      eventSlug
    );

    questions =
    await res.json();

    // mezclar preguntas
    questions =
    questions.sort(
      ()=>Math.random()-0.5
    );

    // tomar solo 3
    questions =
    questions.slice(0,3);

    renderTrivia();

  }

  catch(err){

    console.error(err);

  }

}

/* ====================== */

function renderTrivia(){

  const content =
  document.getElementById(
    "content"
  );

  if(!questions.length){

    content.innerHTML = `

    <div class="done">

      Todavía no hay trivia cargada

    </div>

    `;

    return;

  }

  let html = "";

  questions.forEach((q,index)=>{

    html += `

    <div class="card">

      <div class="question">

        ${index + 1}.
        ${q.question}

      </div>

      ${q.options.map((opt,i)=>`

        <button
        class="option"
        onclick="selectOption(
          ${index},
          ${i},
          this
        )">

          ${opt}

        </button>

      `).join("")}

    </div>

    `;

  });

  html += `

  <button
id="finishBtn"
class="submit"
onclick="submitTrivia()">

    Finalizar Trivia

  </button>

  `;

  content.innerHTML =
  html;

}

/* ====================== */

function selectOption(
questionIndex,
optionIndex,
btn
){

  if(
    answers[questionIndex]
    !== undefined
  ){
    return;
  }

  const question =
  questions[questionIndex];

  const parent =
  btn.parentElement;

  const buttons =
  parent.querySelectorAll(
    ".option"
  );

  answers[questionIndex] =
  optionIndex;

  buttons.forEach((b,i)=>{

    b.disabled = true;

    if(
      i ==
      question.correct_answer
    ){

      b.style.background =
      "#00c853";

    }

  });

  if(
    optionIndex !=
    question.correct_answer
  ){

    btn.style.background =
    "#d50000";

  }

}

/* ====================== */

async function submitTrivia(){

if(
Object.keys(answers).length
< questions.length
){

  alert(
  "Respondé todas las preguntas"
  );

  return;

}

let score = 0;

questions.forEach((q,index)=>{

  const card =
  document
  .querySelectorAll(".card")[index];

  const buttons =
  card.querySelectorAll(".option");

  buttons.forEach((btn,i)=>{

    btn.classList.add(
      "locked"
    );

    if(
      i ==
      q.correct_answer
    ){

      btn.classList.add(
        "correct"
      );

    }

    if(
      answers[index] == i &&
      i != q.correct_answer
    ){

      btn.classList.add(
        "wrong"
      );

    }

  });

  if(
Number(answers[index]) ===
Number(q.correct_answer)
){

  score += 3;

}

});

try{

document
.getElementById(
"finishBtn"
)
.disabled = true;

const res =
await fetch(

  "/submit-trivia",

  {

    method:"POST",

    headers:{
      "Content-Type":
      "application/json"
    },

    body:JSON.stringify({

      event_slug:
      eventSlug,

      guest_name:
      guest.guest_name,

      score

    })

  }

);

const data =
await res.json();

if(data.success){

  setTimeout(()=>{

    renderDone(score);

  },1800);

}

}

catch(err){

console.error(err);

document
.getElementById(
  "finishBtn"
)
.disabled = false;

alert(
"Error enviando trivia"
);

}

}

/* ====================== */

function renderDone(score){

  document
  .getElementById(
    "content"
  )
  .innerHTML = `

  <div class="done">

    ✅ Trivia completada

    <div class="score">

      +${score} pts

    </div>

    <button
    class="submit"
    onclick="goBack()"
    style="margin-top:25px;">

      Volver

    </button>

  </div>

  `;

}
/* ====================== */

function goBack(){

  window.location.href =
  "/index.html";

}

/* ====================== */

init();

</script>

</body>
</html>
